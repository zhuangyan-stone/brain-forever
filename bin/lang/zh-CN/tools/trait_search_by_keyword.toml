[description]
other = "根据关键词和关键词类型（A-F/*），从用户个人知识库中检索相关的个人特征。当LLM已经知道具体的关键词时，可直接调用此工具进行精确匹配检索。"

[param_keyword_desc]
other = "关键词文本，必须与 keywords 表中的 word 字段进行精确匹配。"

[param_kind_desc]
other = """关键词类型字母及定义（A-F 或 *），用于限定搜索范围：

A=时间（Time）：特征中提及的时间点或时间段。示例：2026-11-20、初中时期

B=地点（Place）：特征中提及的地理位置，应尽量具体化。示例：昆明、西安、北京朝阳区望京花园、南非开普敦

C=人（Person）：用户提及的除用户自己以外的其他人，应优先使用具体明确的名称或角色。示例：李白、哥哥、林志玲、李渔

D=事物（Thing/Entity）：特征中提及的具象或抽象实体。具象包括物品（手机、冰箱、诗集）、动物、植物、用户自身属性、建筑物等；抽象包括领域/学科（工作、医学、编程）、状态/情绪（压力、焦虑）、品质/属性（信用、自由）。注意：具体人物归type C而非D。示例：篮球、工作、压力、中医

E=关系（Relationship）：特征中提及的人或物与用户之间的关系，以用户为原点。示例：前女友、梦中情人、宠物、朋友

F=行为（Behavior）：用户或用户提及的动作、行为、事件，为动词或动宾词组。示例：损坏、抗洪、打球、去世

*=任意类型（Any）：不限定类型，匹配所有类型的关键词。当不确定关键词所属类型时使用。"""

[pending]
other = "正在通过关键词查询用户特征..."
