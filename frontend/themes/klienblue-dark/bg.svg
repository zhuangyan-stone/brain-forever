<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <!-- Klein Blue 澶滆摑 鈥?姣曞姞绱㈡櫄骞撮鏍肩殑鍑犱綍鑹插潡锛堟殫鑹茬増锛?-->
  
  <!-- 搴曡壊 鈥?娣辫摑榛?-->
  <rect width="1440" height="900" fill="#0B1120"/>

  <!-- 宸︿笅澶у渾 鈥?鍏嬭幈鍥犺摑 -->
  <circle cx="-100" cy="800" r="320" fill="#2B59FF" opacity="0.10"/>

  <!-- 鍑犱綍鑹插潡缁勫悎 -->
  <g opacity="0.25">
    <!-- 宸︿笂鐨勫厠鑾卞洜钃濊壊鍧楋紙鍙戝厜锛?-->
