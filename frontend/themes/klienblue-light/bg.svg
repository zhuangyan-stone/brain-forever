<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- Klein Blue 湛蓝 — 毕加索晚年风格的几何色块 -->
  
  <!-- 底色 — 温暖米白 -->
  <rect width="1440" height="900" fill="#F6F7FB"/>

  <!-- 几何色块组合 -->
  <g opacity="0.35">
    <!-- 左上的克莱因蓝色块 -->
    <path d="M0,0 L280,0 L320,140 L200,200 L0,180 Z" fill="#1A4BC8"/>
    <!-- 右上暖粉色块 -->
    <path d="M1200,0 L1440,0 L1440,220 L1100,180 Z" fill="#E8C4B8"/>
    <!-- 中左黄色块 -->
    <path d="M80,300 L260,260 L340,400 L120,420 Z" fill="#E8D48B"/>
    <!-- 中央克莱因蓝色块 -->
    <path d="M400,200 L620,180 L680,380 L380,450 Z" fill="#1A4BC8"/>
    <!-- 右中暖粉色块 -->
    <path d="M900,280 L1200,220 L1280,420 L850,500 Z" fill="#D4A898"/>
    <!-- 下方米白色块 -->
    <path d="M0,600 L300,550 L280,750 L0,780 Z" fill="#EDE4D4"/>
    <!-- 右下克莱因蓝色块 -->
    <path d="M1000,550 L1440,500 L1440,750 L900,750 Z" fill="#1A4BC8"/>
    <!-- 底部深色块 -->
    <path d="M300,750 L900,750 L1000,900 L200,900 Z" fill="#D8DCE8"/>
  </g>

  <!-- 小色块点缀 -->
  <g opacity="0.20">
    <rect x="50" y="480" width="40" height="40" rx="3" fill="#E8C4B8" transform="rotate(-15, 70, 500)"/>
    <rect x="600" y="520" width="30" height="30" rx="3" fill="#E8D48B" transform="rotate(20, 615, 535)"/>
    <rect x="1300" y="350" width="35" height="35" rx="3" fill="#D4A898" transform="rotate(-10, 1317, 367)"/>
    <circle cx="450" cy="550" r="12" fill="#1A4BC8"/>
    <circle cx="780" cy="480" r="8" fill="#E8C4B8"/>
    <rect x="720" y="120" width="25" height="25" rx="2" fill="#E8D48B" transform="rotate(30, 732, 132)"/>
    <circle cx="160" cy="440" r="6" fill="#D4A898"/>
  </g>
</svg>
