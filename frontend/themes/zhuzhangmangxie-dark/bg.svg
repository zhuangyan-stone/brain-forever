<!-- 褰掑幓锛屼篃鏃犻闆ㄤ篃鏃犳櫞 鈥?宸︿笅绔规灄椤堕儴锛屼笌绔瑰悓鎽?-->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="-0.6, 80, 520; 0.6, 80, 520; -0.6, 80, 520"
      dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
      keyTimes="0; 0.5; 1"/>
    <g font-family="'FangSong', 'KaiTi', 'STKaiti', 'SimSun', 'Noto Serif SC', serif" fill="#5C9E5C" opacity="0.28" font-size="14">
    <text x="35" y="520">
      <tspan x="35" dy="0">
        <tspan><animate attributeName="font-size" values="14; 15; 14" dur="4.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>褰?/tspan>
        <tspan><animate attributeName="font-size" values="14; 11; 14" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>鍘?/tspan>
        <tspan><animate attributeName="font-size" values="14; 12; 14" dur="4.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>锛?/tspan>
        <tspan><animate attributeName="font-size" values="14; 17; 14" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>涔?/tspan>
        <tspan><animate attributeName="font-size" values="14; 11; 14" dur="3.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>鏃?/tspan>
        <tspan><animate attributeName="font-size" values="14; 16; 14" dur="4.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>椋?/tspan>
        <tspan><animate attributeName="font-size" values="14; 12; 14" dur="3.7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>闆?/tspan>
        <tspan><animate attributeName="font-size" values="14; 17; 14" dur="4.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>涔?/tspan>
        <tspan><animate attributeName="font-size" values="14; 11; 14" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>鏃?/tspan>
        <tspan><animate attributeName="font-size" values="14; 18; 14" dur="4.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>鏅?/tspan>
      </tspan>
    </text>
    </g>
  </g>

  <!-- 鏆壊绔瑰奖 -->
  <g opacity="0.18">
    <!-- 杩戜笡 + 涓笡锛堝乏渚э級鈥斺€?寰杞绘憜 -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-0.6, 140, 900; 0.6, 140, 900; -0.6, 140, 900"
        dur="3.5s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
        keyTimes="0; 0.5; 1"/>
      <use href="#bamboo" x="50" y="550" transform="scale(1.2)" />
      <use href="#bamboo2" x="100" y="570" transform="scale(1.0)" />
      <use href="#bamboo3" x="150" y="600" transform="scale(1.1)" />
      <use href="#bamboo" x="260" y="640" transform="scale(0.9)" />
    </g>

    <!-- 杩滀笡锛堢敾闈㈠彸渚э紝Y杞翠腑闂达級 -->
    <use href="#bamboo2" x="2050" y="580" transform="scale(0.6)" />
    <use href="#bamboo3" x="2390" y="550" transform="scale(0.55)" />

  <!-- 鍓嶆櫙鍏夋枒锛氭ā鎷熺┛杩囩鍙剁殑姗欒壊鍏夌偣锛屽ぇ灏忚剦鍔?-->
  <circle cx="50" cy="600" r="8" fill="#D4903A" opacity="0.5">
    <animate attributeName="r" values="8; 10; 8" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="100" cy="650" r="6.5" fill="#D4903A" opacity="0.4">
    <animate attributeName="r" values="6.5; 4.5; 6.5" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="180" cy="580" r="4" fill="#D4903A" opacity="0.6">
    <animate attributeName="r" values="4; 5.5; 4" dur="5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="110" cy="520" r="4.8" fill="#D4903A" opacity="0.45">
    <animate attributeName="r" values="4.8; 3; 4.8" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="90" cy="670" r="6.2" fill="#D4903A" opacity="0.55">
    <animate attributeName="r" values="6.2; 8; 6.2" dur="4.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>

  <circle cx="1300" cy="250" r="6.5" fill="#D4903A" opacity="0.3">
    <animate attributeName="r" values="6.5; 8.5; 6.5" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="1290" cy="260" r="8" fill="#D4903A" opacity="0.6">
    <animate attributeName="r" values="8; 5.5; 8" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="1300" cy="380" r="4" fill="#D4903A" opacity="0.4">
    <animate attributeName="r" values="4; 5.5; 4" dur="5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>
  <circle cx="1280" cy="420" r="4.8" fill="#D4903A" opacity="0.45">
    <animate attributeName="r" values="4.8; 3.2; 4.8" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
  </circle>

  </g>
</svg>
