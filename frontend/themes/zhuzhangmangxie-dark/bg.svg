      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
