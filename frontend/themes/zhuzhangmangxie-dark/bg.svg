<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <!-- 竹子组件 v1：叶稍上仰 -->
    <g id="bamboo">
      <rect x="-3" y="0" width="6" height="300" rx="2" fill="#658055" opacity="0.85"/>
      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <g transform="rotate(6, 3, 30)">
        <path d="M3,30 Q22,20 42,28 Q22,36 3,30" fill="#95AE85" opacity="0.7"/>
      </g>
      <g transform="rotate(-10, -3, 80)">
        <path d="M-3,80 Q-22,70 -42,78 Q-22,86 -3,80" fill="#95AE85" opacity="0.65"/>
      </g>
      <g transform="rotate(-4, 3, 140)">
        <path d="M3,140 Q22,130 42,138 Q22,146 3,140" fill="#95AE85" opacity="0.7"/>
      </g>
      <g transform="rotate(8, -3, 200)">
        <path d="M-3,200 Q-22,190 -42,198 Q-22,206 -3,200" fill="#95AE85" opacity="0.65"/>
      </g>
    </g>

    <!-- 竹子组件 v2：叶稍下垂 -->
    <g id="bamboo2">
      <rect x="-3" y="0" width="6" height="300" rx="2" fill="#658055" opacity="0.85"/>
      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <g transform="rotate(-5, 3, 30)">
        <path d="M3,30 Q22,20 42,28 Q22,36 3,30" fill="#95AE85" opacity="0.7"/>
      </g>
      <g transform="rotate(8, -3, 80)">
        <path d="M-3,80 Q-22,70 -42,78 Q-22,86 -3,80" fill="#95AE85" opacity="0.65"/>
      </g>
      <g transform="rotate(7, 3, 140)">
        <path d="M3,140 Q22,130 42,138 Q22,146 3,140" fill="#95AE85" opacity="0.7"/>
      </g>
      <g transform="rotate(-6, -3, 200)">
        <path d="M-3,200 Q-22,190 -42,198 Q-22,206 -3,200" fill="#95AE85" opacity="0.65"/>
      </g>
    </g>

    <!-- 竹子组件 v3：叶稍大角度 -->
    <g id="bamboo3">
      <rect x="-3" y="0" width="6" height="300" rx="2" fill="#658055" opacity="0.85"/>
      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#95AE85" opacity="0.7"/>
      <g transform="rotate(12, 3, 30)">
        <path d="M3,30 Q22,20 42,28 Q22,36 3,30" fill="#95AE85" opacity="0.7"/>
      </g>
      <g transform="rotate(-15, -3, 80)">
        <path d="M-3,80 Q-22,70 -42,78 Q-22,86 -3,80" fill="#95AE85" opacity="0.65"/>
      </g>
      <g transform="rotate(10, 3, 140)">
        <path d="M3,140 Q22,130 42,138 Q22,146 3,140" fill="#95AE85" opacity="0.7"/>
      </g>
      <g transform="rotate(-12, -3, 200)">
        <path d="M-3,200 Q-22,190 -42,198 Q-22,206 -3,200" fill="#95AE85" opacity="0.65"/>
      </g>
    </g>
  </defs>

<!-- 题词：苏轼《定风波》左上角 -->
  <g font-family="'FangSong', 'KaiTi', 'STKaiti', 'SimSun', 'Noto Serif SC', serif" fill="#5C9E5C" opacity="0.28" font-size="14">
    <text x="50" y="180">
      <tspan x="50" dy="0" font-size="28" font-weight="bold" opacity="0.5">定风波</tspan>
      <tspan x="50" dy="36">莫听穿林打叶声，何妨吟啸且徐行</tspan>
      <tspan x="50" dy="25">竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生</tspan>
      <tspan x="50" dy="25">料峭春风吹酒醒，微冷，山头斜照却相迎</tspan>
      <tspan x="50" dy="25">回首向来萧瑟处，归去，也无风雨也无晴</tspan>
    </text>
  </g>

  <!-- 暮色竹影 -->
  <g opacity="0.18">
    <!-- 近丛 -->
    <use href="#bamboo" x="50" y="550" transform="scale(1.2)" />
    <use href="#bamboo2" x="100" y="570" transform="scale(1.0)" />
    
    <!-- 中丛 -->
    <use href="#bamboo3" x="150" y="600" transform="scale(1.1)" />
    <use href="#bamboo" x="260" y="640" transform="scale(0.9)" />

    <!-- 远丛（画面右侧，Y轴中间） -->
    <use href="#bamboo2" x="2050" y="580" transform="scale(0.6)" />
    <use href="#bamboo3" x="2390" y="550" transform="scale(0.55)" />

  <!-- 前景光斑：模拟穿过竹叶的橙色光点 -->
  <circle cx="50" cy="600" r="8" fill="#D4903A" opacity="0.5"/>
  <circle cx="100" cy="650" r="6.5" fill="#D4903A" opacity="0.4"/>
  <circle cx="180" cy="580" r="4" fill="#D4903A" opacity="0.6"/>
  <circle cx="110" cy="520" r="4.8" fill="#D4903A" opacity="0.45"/>
  <circle cx="90" cy="670" r="6.2" fill="#D4903A" opacity="0.55"/>

  <circle cx="1300" cy="250" r="6.5" fill="#D4903A" opacity="0.3"/>
  <circle cx="1290" cy="260" r="8" fill="#D4903A" opacity="0.6"/>
  <circle cx="1300" cy="380" r="4" fill="#D4903A" opacity="0.4"/>
  <circle cx="1280" cy="420" r="4.8" fill="#D4903A" opacity="0.45"/>

  </g>
</svg>
