<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <style>
    @keyframes birdDrift1 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(12px, -4px); }
      50% { transform: translate(24px, 0px); }
      75% { transform: translate(12px, 3px); }
    }
    @keyframes birdDrift2 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(-10px, -3px); }
      50% { transform: translate(-20px, 0px); }
      75% { transform: translate(-10px, 2px); }
    }
    @keyframes birdDrift3 {
      0%, 100% { transform: translate(0px, 0px); }
      33% { transform: translate(8px, -2px); }
      66% { transform: translate(16px, 1px); }
    }
    .bird-1 { animation: birdDrift1 6s ease-in-out infinite; }
    .bird-2 { animation: birdDrift2 7s ease-in-out infinite; }
    .bird-3 { animation: birdDrift3 5s ease-in-out infinite; }
  </style>
  <!-- 杩滃北 鈥?娓呭ⅷ鍏ュ锛堟瀬娣★級 -->
  <path d="M0,450 C120,370 200,390 320,350 C400,330 460,350 540,320 
           C620,290 700,330 800,310 C880,290 960,320 1040,300 
           C1120,280 1200,310 1320,290 C1380,280 1440,300 1440,300 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.18"/>
  <!-- 杩滃北浜?鈥?娣″ⅷ -->
  <path d="M0,430 C140,350 240,370 360,330 C440,310 500,330 580,300 
           C660,270 740,310 840,290 C920,270 1000,300 1080,280 
           C1160,260 1240,290 1360,270 C1420,260 1440,280 1440,280 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.12"/>
  <!-- 涓櫙灞?鈥?閲嶅ⅷ -->
  <path d="M0,520 C100,450 180,470 280,430 C360,410 420,430 500,400 
           C580,370 660,410 760,390 C840,370 920,400 1000,380 
           C1080,360 1160,390 1260,370 C1340,360 1440,390 1440,390 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.28"/>
  <!-- 涓櫙灞变簩 鈥?娴撳ⅷ -->
  <path d="M0,500 C120,420 220,440 340,400 C420,380 480,400 560,370 
           C640,340 720,380 820,360 C900,340 980,370 1060,350 
           C1140,330 1220,360 1340,340 C1400,330 1440,350 1440,350 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.22"/>
  <!-- 杩戞櫙灞?宀?鈥?鐒﹀ⅷ -->
  <path d="M0,620 C80,570 160,590 240,550 C320,530 400,570 500,540 
           C600,510 700,550 800,530 C880,510 960,540 1040,520 
           C1120,500 1200,530 1320,510 C1380,500 1440,520 1440,520 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.40"/>
  <!-- 鏈€杩戝哺 鈥?鐒﹀ⅷ鏇存祿 -->
  <path d="M0,720 C100,670 200,690 300,650 C400,630 500,670 600,640 
           C700,610 800,650 900,630 C1000,610 1100,640 1200,620 
           C1300,600 1400,630 1440,610 L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.30"/>
  <!-- 澶滄湀鐣欑櫧 鈥?澧ㄨ壊涓殑涓€鎶圭┖鐏?-->
  <circle cx="1100" cy="160" r="40" fill="#ffffff" opacity="0.10"/>
  <!-- 椋為笩 鈥?娣″ⅷ鐐圭瑪浜庡鑹?-->
  <g class="bird-1">
    <path fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.18">
      <animate attributeName="d" dur="2.5s" repeatCount="indefinite"
        values="M850,220 Q860,210 870,220 Q880,210 890,220;
                M850,220 Q860,220 870,220 Q880,220 890,220;
                M850,220 Q860,210 870,220 Q880,210 890,220"/>
    </path>
  </g>
  <g class="bird-2">
    <path fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.14">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="M1050,190 Q1060,180 1070,190 Q1080,180 1090,190;
                M1050,190 Q1060,190 1070,190 Q1080,190 1090,190;
                M1050,190 Q1060,180 1070,190 Q1080,180 1090,190"/>
    </path>
  </g>
  <g>
    <path fill="none" stroke="#ffffff" stroke-width="1" opacity="0.12">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        values="M780,250 Q790,240 800,250;
                M780,250 Q790,250 800,250;
                M780,250 Q790,240 800,250"/>
    </path>
  </g>
  <g class="bird-3">
    <path fill="none" stroke="#ffffff" stroke-width="1" opacity="0.10">
      <animate attributeName="d" dur="2.5s" repeatCount="indefinite"
        values="M920,200 Q930,192 940,200 Q950,192 960,200;
                M920,200 Q930,200 940,200 Q950,200 960,200;
                M920,200 Q930,192 940,200 Q950,192 960,200"/>
    </path>
  </g>
</svg>
