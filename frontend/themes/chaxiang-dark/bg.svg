<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- 陈年老茶 — 夜深茶暖，醇厚温润 -->
  <g fill="none" stroke="#A09070" stroke-linecap="round">
    <!-- 茶杯 + 茶烟（整体放大 180%，移至画面左侧） -->
    <g transform="translate(150, 580) scale(1.8) translate(-1300, -640)">
      <!-- 茶杯轮廓（上下翻转后底大口小） -->
      <g transform="matrix(1 0 0 -1 0 1470)">
        <path d="M1280,750 L1290,720 L1310,720 L1320,750 Z" stroke-width="1.5" opacity="0.12"/>
        <path d="M1285,750 L1315,750" stroke-width="1.5" opacity="0.12"/>
        <ellipse cx="1300" cy="720" rx="10" ry="3" fill="#A09070" opacity="0.06" stroke="none"/>
        
        <!-- 透明茶汤（透光琥珀色） — 三分残 -->
        <path d="M1287,729 L1290,720 L1310,720 L1313,729 Z" fill="#C89050" opacity="0.12" stroke="none"/>
      </g>
      
      <!-- 暖烟残尽 — 夜深茶凉 -->
      <g transform="translate(1260, 712)" opacity="0.38">
        <path d="M40,8 Q35,0 40,-8 Q45,-16 40,-24" stroke-width="1.2"/>
        <path d="M48,10 Q43,2 48,-6 Q53,-14 48,-20" stroke-width="1"/>
        <path d="M35,8 Q30,0 35,-6" stroke-width="0.8"/>
      </g>
    </g>
    
    <!-- 茶山层叠 — 夜色 -->
    <path d="M0,580 C200,530 350,600 500,540 C650,480 800,580 1000,530 C1200,480 1400,560 1440,540 L1440,900 L0,900 Z" 
          fill="#6A7A5A" opacity="0.08" stroke="none"/>
    <path d="M0,660 C300,620 500,670 700,620 C900,570 1100,650 1440,610 L1440,900 L0,900 Z" 
          fill="#4A5A3A" opacity="0.05" stroke="none"/>    
  </g>
</svg>
