<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <!-- 作者：南郁 -->
  
  <!-- 底色 — 不锈钢银 -->
  <rect width="1440" height="900" fill="#E8EAEC"/>

  <!-- 底部银光 — 像不锈钢的冷冽光泽 -->
  <ellipse cx="720" cy="920" rx="800" ry="220" fill="#FFFFFF" opacity="0.86"/>

  <!-- 工业几何结构 — 两侧垂直钢柱 -->
  <g opacity="0.12">
    <rect x="0" y="0" width="10" height="900" fill="#3A3E42"/>
    <rect x="1430" y="0" width="10" height="900" fill="#3A3E42"/>
  </g>

  <!-- 古典闹钟 — 时间的力量（原齿轮位） -->
  <g transform="translate(1200, 700) scale(0.96)" opacity="0.15">
    <!-- 钟体外壳 -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#C06A30" stroke-width="5"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#C06A30" stroke-width="1.5"/>
    <!-- 钟面内圈 -->
    <circle cx="0" cy="0" r="82" fill="none" stroke="#C06A30" stroke-width="0.8" opacity="0.5"/>

    <!-- 顶部两个铃铛 -->
    <ellipse cx="-30" cy="-95" rx="28" ry="18" fill="none" stroke="#C06A30" stroke-width="3"/>
    <ellipse cx="30" cy="-95" rx="28" ry="18" fill="none" stroke="#C06A30" stroke-width="3"/>

    <!-- 铃锤 -->
    <line x1="0" y1="-95" x2="0" y2="-118" stroke="#C06A30" stroke-width="2.5"/>
    <circle cx="0" cy="-121" r="5" fill="#C06A30"/>

    <!-- 12个钟点刻度 -->
    <g stroke="#C06A30" stroke-width="2.5" stroke-linecap="round">
      <g transform="rotate(0)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(30)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(150)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(210)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(330)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
    </g>

    <!-- 时针（短粗，指向约2点45分） -->
    <line x1="0" y1="0" x2="47" y2="-6" stroke="#C06A30" stroke-width="4" stroke-linecap="round"/>
    <!-- 分针（细长，指向9点，即45分） -->
    <line x1="0" y1="0" x2="-65" y2="0" stroke="#C06A30" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 秒针（最细，每秒一格，60秒转一圈） -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;6;12;18;24;30;36;42;48;54;60;66;72;78;84;90;96;102;108;114;120;126;132;138;144;150;156;162;168;174;180;186;192;198;204;210;216;222;228;234;240;246;252;258;264;270;276;282;288;294;300;306;312;318;324;330;336;342;348;354;360"
        keyTimes="0;0.016667;0.033333;0.05;0.066667;0.083333;0.1;0.116667;0.133333;0.15;0.166667;0.183333;0.2;0.216667;0.233333;0.25;0.266667;0.283333;0.3;0.316667;0.333333;0.35;0.366667;0.383333;0.4;0.416667;0.433333;0.45;0.466667;0.483333;0.5;0.516667;0.533333;0.55;0.566667;0.583333;0.6;0.616667;0.633333;0.65;0.666667;0.683333;0.7;0.716667;0.733333;0.75;0.766667;0.783333;0.8;0.816667;0.833333;0.85;0.866667;0.883333;0.9;0.916667;0.933333;0.95;0.966667;0.983333;1"
        dur="60s" repeatCount="indefinite" calcMode="discrete"/>
      <line x1="0" y1="0" x2="-20" y2="60" stroke="#C06A30" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    </g>

    <!-- 中心轴 -->
    <circle cx="0" cy="0" r="5" fill="#C06A30"/>
    <circle cx="0" cy="0" r="2" fill="#F2F0ED"/>

    <!-- 底部两只脚 -->
    <path d="M-50,95 Q-55,108 -60,105" fill="none" stroke="#C06A30" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M50,95 Q55,108 60,105" fill="none" stroke="#C06A30" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 领带装饰 — 程序员的骄傲 -->
  <g opacity="0.12">
    <!-- 领带结 -->
    <polygon points="135,130 175,130 180,180 130,180" fill="#C06A30"/>
    <!-- 领带主体 -->
    <path d="M130,180
             L180,180
             L190,340
             Q196,400 205,440
             L155,500
             L105,440
             Q114,400 120,340 Z"
          fill="#C06A30"/>
    <!-- 领带内折阴影 -->
    <path d="M150,180 L155,490" stroke="#F2F0ED" stroke-width="1.5" opacity="0.4" fill="none"/>
    <!-- 领带条纹装饰 -->
    <g stroke="#F2F0ED" stroke-width="0.8" opacity="0.25" fill="none">
      <path d="M134,200 L176,200"/>
      <path d="M132,230 L178,230"/>
      <path d="M130,260 L180,260"/>
      <path d="M128,290 L182,290"/>
      <path d="M126,320 L184,320"/>
      <path d="M124,350 L186,350"/>
      <path d="M120,380 L190,380"/>
      <path d="M114,410 L196,410"/>
    </g>
  </g>

  <!-- 手写邀约 — 老男人的浪漫（写在领带上） -->
  <g opacity="0.50" font-family="KaiTi, STKaiti, 'Noto Serif SC', serif" fill="#FFFFFF">
    <text x="150" y="220" font-size="16" transform="rotate(-3, 150, 220)">晚上</text>
    <text x="156" y="252" font-size="16" transform="rotate(4, 156, 252)">10点</text>
    <text x="145" y="284" font-size="16" transform="rotate(-2, 145, 284)">一起</text>
    <text x="154" y="316" font-size="16" transform="rotate(3, 154, 316)">看</text>
    <text x="150" y="348" font-size="16" transform="rotate(-1, 150, 348)">星星</text>
  </g>

  <!-- 机械键盘 — 画面下方中间，程序员的标志 -->
  <g transform="translate(720, 755) scale(1.2) translate(-720, -835)" opacity="0.10">
    <!-- 键盘底座 -->
    <rect x="630" y="808" width="180" height="54" rx="5" fill="#3A3E42"/>
    <rect x="630" y="808" width="180" height="54" rx="5" fill="none" stroke="#5A5E62" stroke-width="0.5"/>

    <!-- ESC 键（橙色强调） -->
    <rect x="636" y="811" width="10" height="7" rx="1.5" fill="#C06A30"/>

    <!-- 数字行 — 12 个键 -->
    <g stroke="#5A5E62" stroke-width="7" stroke-linecap="round" stroke-dasharray="9.5,2.3" fill="none">
      <line x1="650" y1="820" x2="798" y2="820"/>
    </g>

    <!-- QWERTY 行 — 12 个键（左偏移，模拟阶梯布局） -->
    <g stroke="#5A5E62" stroke-width="7" stroke-linecap="round" stroke-dasharray="9.5,2.3" fill="none">
      <line x1="655" y1="830" x2="798" y2="830"/>
    </g>

    <!-- ASDF 行 — 11 个键 -->
    <g stroke="#5A5E62" stroke-width="7" stroke-linecap="round" stroke-dasharray="10.5,2.5" fill="none">
      <line x1="650" y1="840" x2="798" y2="840"/>
    </g>

    <!-- Shift 行 — 10 个键 -->
    <g stroke="#5A5E62" stroke-width="7" stroke-linecap="round" stroke-dasharray="11.5,2.8" fill="none">
      <line x1="654" y1="850" x2="798" y2="850"/>
    </g>

    <!-- 空格行：Ctrl Win Alt [空格] Alt Fn Ctrl -->
    <g fill="#5A5E62">
      <rect x="636" y="856" width="14" height="6" rx="1.5"/>
      <rect x="652" y="856" width="10" height="6" rx="1.5"/>
      <rect x="664" y="856" width="10" height="6" rx="1.5"/>
      <rect x="676" y="856" width="52" height="6" rx="1.5"/>
      <rect x="730" y="856" width="10" height="6" rx="1.5"/>
      <rect x="742" y="856" width="10" height="6" rx="1.5"/>
      <rect x="754" y="856" width="14" height="6" rx="1.5"/>
    </g>
  </g>

  <!-- =============================================================
       打字动画：fm deb  j rryt C++ r wt ftj（含尾随空格，26键）
       ============================================================= -->
  <style>
    @keyframes press {
      0%, 1.3% { opacity: 0.75; }
      1.7%, 100% { opacity: 0; }
    }
    @keyframes label {
      0%, 1.3% { opacity: 0.85; }
      1.7%, 100% { opacity: 0; }
    }
    /* Shift: f(0%) m(5%) d(21.7%) e(23.3%) b(25%) — 36s周期 */
    @keyframes shift-press {
      0%, 1.3% { opacity: 0.75; }
      1.7%, 4.8% { opacity: 0; }
      5%, 6.3% { opacity: 0.75; }
      6.7%, 21.3% { opacity: 0; }
      21.7%, 23% { opacity: 0.75; }
      23.3%, 23.3% { opacity: 0; }
      23.7%, 25% { opacity: 0.75; }
      25.3%, 25.3% { opacity: 0; }
      25.7%, 27% { opacity: 0.75; }
      27.3%, 100% { opacity: 0; }
    }
    @keyframes shift-label {
      0%, 1.3% { opacity: 0.85; }
      1.7%, 4.8% { opacity: 0; }
      5%, 6.3% { opacity: 0.85; }
      6.7%, 21.3% { opacity: 0; }
      21.7%, 23% { opacity: 0.85; }
      23.3%, 23.3% { opacity: 0; }
      23.7%, 25% { opacity: 0.85; }
      25.3%, 25.3% { opacity: 0; }
      25.7%, 27% { opacity: 0.85; }
      27.3%, 100% { opacity: 0; }
    }
  </style>

  <g>
    <!-- fm deb  -->
    <rect x="677" y="755" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 10s infinite"/>
    <rect x="762" y="767" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 10.6s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 11.2s infinite"/>
    <rect x="663" y="755" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 11.8s infinite"/>
    <rect x="679" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 12.4s infinite"/>
    <rect x="733" y="767" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 13s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 13.6s infinite"/>
    <!-- j rryt C++ -->
    <rect x="719" y="755" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 14.2s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 14.8s infinite"/>
    <rect x="684" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 15.4s infinite"/>
    <rect x="684" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 16s infinite"/>
    <rect x="712" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 16.6s infinite"/>
    <rect x="698" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 17.2s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 17.8s infinite"/>
    <rect x="700" y="767" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 18.4s infinite"/>
    <rect x="790" y="737" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 19s infinite"/>
    <rect x="790" y="737" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 19.6s infinite"/>
    <!-- ' wt ftj ' -->
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 20.2s infinite"/>
    <rect x="684" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 20.8s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 21.4s infinite"/>
    <rect x="670" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 22s infinite"/>
    <rect x="698" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 22.6s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 23.2s infinite"/>
    <rect x="677" y="755" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 23.8s infinite"/>
    <rect x="698" y="743" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 24.4s infinite"/>
    <rect x="719" y="755" width="18" height="12" rx="3" fill="#C06A30" opacity="0" style="animation:press 36s 25s infinite"/>
    <rect x="667" y="780" width="62" height="8" rx="2" fill="#C06A30" opacity="0" style="animation:press 36s 25.6s infinite"/>

    <!-- Shift -->
    <rect x="639" y="767" width="26" height="12" rx="3" fill="#3A3E42" opacity="0" style="animation:shift-press 36s 10s infinite"/>

    <!-- 标签 -->
    <text x="686" y="764" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 10s infinite">f</text>
    <text x="771" y="776" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 10.6s infinite">m</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 11.2s infinite"> </text>
    <text x="672" y="764" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 11.8s infinite">d</text>
    <text x="688" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 12.4s infinite">e</text>
    <text x="742" y="776" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 13s infinite">b</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 13.6s infinite"> </text>
    <text x="728" y="764" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 14.2s infinite">j</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 14.8s infinite"> </text>
    <text x="693" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 15.4s infinite">r</text>
    <text x="693" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 16s infinite">r</text>
    <text x="721" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 16.6s infinite">y</text>
    <text x="707" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 17.2s infinite">t</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 17.8s infinite"> </text>
    <text x="709" y="776" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 18.4s infinite">C</text>
    <text x="799" y="746" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 19s infinite">+</text>
    <text x="799" y="746" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 19.6s infinite">+</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 20.2s infinite"> </text>
    <text x="693" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 20.8s infinite">r</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 21.4s infinite"> </text>
    <text x="679" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 22s infinite">w</text>
    <text x="707" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 22.6s infinite">t</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 23.2s infinite"> </text>
    <text x="686" y="764" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 23.8s infinite">f</text>
    <text x="707" y="752" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 24.4s infinite">t</text>
    <text x="728" y="764" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 25s infinite">j</text>
    <text x="698" y="790" fill="#FFFFFF" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle" opacity="0" style="animation:label 36s 25.6s infinite"> </text>

    <text x="652" y="776" fill="#FFFFFF" font-size="5" font-family="monospace" text-anchor="middle" opacity="0" style="animation:shift-label 36s 10s infinite">Shift</text>
  </g>

</svg>