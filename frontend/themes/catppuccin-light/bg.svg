<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <style>
    @keyframes earTwitchL {
      0%, 100% { transform: rotate(0deg); }
      2%   { transform: rotate(10deg); }
      3%   { transform: rotate(-4deg); }
      4%   { transform: rotate(3deg); }
      5%   { transform: rotate(0deg); }
      7%   { transform: rotate(10deg); }
      8%   { transform: rotate(-4deg); }
      9%   { transform: rotate(3deg); }
      10%  { transform: rotate(0deg); }
    }
    @keyframes earTwitchR {
      0%, 100% { transform: rotate(0deg); }
      2.5% { transform: rotate(-10deg); }
      3.5% { transform: rotate(4deg); }
      4.5% { transform: rotate(-3deg); }
      5.5% { transform: rotate(0deg); }
      7.5% { transform: rotate(-10deg); }
      8.5% { transform: rotate(4deg); }
      9.5% { transform: rotate(-3deg); }
      10.5% { transform: rotate(0deg); }
    }
    @keyframes whiskerFloatL {
      0%, 100% { transform: translateY(0px); }
      25% { transform: translateY(-4px); }
      50% { transform: translateY(0px); }
      75% { transform: translateY(-2px); }
    }
    @keyframes whiskerFloatR {
      0%, 100% { transform: translateY(0px); }
      25% { transform: translateY(4px); }
      50% { transform: translateY(0px); }
      75% { transform: translateY(2px); }
    }
    @keyframes spinEyeCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinEyeCCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    .ear-left { transform-origin: 39px 5px; animation: earTwitchL 16s ease-in-out infinite; }
    .ear-right { transform-origin: 61px 5px; animation: earTwitchR 16s ease-in-out infinite; }
    .whiskers-left { animation: whiskerFloatL 3s ease-in-out infinite; }
    .whiskers-right { animation: whiskerFloatR 3.2s ease-in-out infinite; }
    .eye-spiral-left { transform-origin: 42px 15px; animation: spinEyeCW 6.7s linear infinite; }
    .eye-spiral-right { transform-origin: 58px 15px; animation: spinEyeCCW 6.7s linear infinite; }
  </style>
  <!-- 猫 + 咖啡机 — 右下角（猫在咖啡机内，杯子在外面） -->
  <g fill="none" stroke="#2a7af5" stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== 咖啡机（内部猫） ===== -->
    <g transform="translate(1224, 646)" opacity="0.18" stroke-width="2">
      <!-- 机身 -->
      <rect x="0" y="30" width="80" height="120" rx="6" stroke="#2a7af5" fill="#2a7af5" fill-opacity="0.05"/>
      <!-- 顶部 -->
      <rect x="0" y="15" width="80" height="20" rx="4" stroke="#2a7af5" fill="#2a7af5" fill-opacity="0.06"/>
      <!-- 冲煮头 -->
      <rect x="20" y="35" width="40" height="12" rx="2" stroke="#2a7af5"/>
      <!-- 手柄 -->
      <path d="M65,38 L85,30 L85,50 L65,46" stroke="#2a7af5" fill="none"/>
      <!-- 蒸汽棒 -->
      <path d="M75,48 Q85,50 82,65 Q80,75 75,78" stroke="#2a7af5" stroke-width="1.5"/>
      <!-- 蒸汽 -->
      <g opacity="0.6">
        <path d="M40,8 Q35,0 40,-8 Q45,-16 40,-24" stroke-width="1.2"/>
        <path d="M48,10 Q43,2 48,-6 Q53,-14 48,-20" stroke-width="1"/>
        <path d="M35,8 Q30,0 35,-6" stroke-width="0.8"/>
      </g>
      <!-- 调节旋钮 -->
      <circle cx="70" cy="80" r="5" fill="#2a7af5" fill-opacity="0.04" stroke="#2a7af5" stroke-width="1"/>
      <!-- 猫（放在咖啡机内，原杯子的位置） -->
      <g transform="translate(4, 69) scale(0.748)" stroke-width="3.0">
        <!-- 尾巴 -->
        <path d="M45,110 Q60,100 70,80 Q80,60 68,45" stroke="#2a7af5" fill="none"/>
        <!-- 身体 -->
        <path d="M20,75 Q10,55 22,36 C35,28 65,28 78,36 Q90,55 80,75 Z" fill="#2a7af5" fill-opacity="0.05" stroke="#2a7af5"/>
        <!-- 头部 -->
        <circle cx="50" cy="18" r="20" fill="#2a7af5" fill-opacity="0.04" stroke="#2a7af5"/>
        <!-- 左耳 -->
        <g class="ear-left"><path d="M34,6 L28,-8 L44,4" fill="#2a7af5" fill-opacity="0.04" stroke="#2a7af5"/></g>
        <!-- 右耳 -->
        <g class="ear-right"><path d="M66,6 L72,-8 L56,4" fill="#2a7af5" fill-opacity="0.04" stroke="#2a7af5"/></g>
        <!-- 眼睛（蚊香螺旋，持续旋转） -->
        <path class="eye-spiral-left" d="M 42,15
          A 0.9,0.9 0 0,1 42.9,15
          A 1.8,1.8 0 0,1 42.9,16.8
          A 2.7,2.7 0 0,1 40.2,16.8
          A 3.6,3.6 0 0,1 40.2,13.2
          A 4.5,4.5 0 0,1 44.7,13.2
          A 5.4,5.4 0 0,1 44.7,18.6
          A 6.3,6.3 0 0,1 38.4,18.6
          A 7.2,7.2 0 0,1 38.4,11.4
          A 8.1,8.1 0 0,1 46.5,11.4
          A 9.0,9.0 0 0,1 46.5,20.4"
          fill="none" stroke="#2a7af5" stroke-width="1.2" stroke-linecap="round"/>
        <path class="eye-spiral-right" d="M 58,15
          A 0.9,0.9 0 0,0 57.1,15
          A 1.8,1.8 0 0,0 57.1,16.8
          A 2.7,2.7 0 0,0 59.8,16.8
          A 3.6,3.6 0 0,0 59.8,13.2
          A 4.5,4.5 0 0,0 55.3,13.2
          A 5.4,5.4 0 0,0 55.3,18.6
          A 6.3,6.3 0 0,0 61.6,18.6
          A 7.2,7.2 0 0,0 61.6,11.4
          A 8.1,8.1 0 0,0 53.5,11.4
          A 9.0,9.0 0 0,0 53.5,20.4"
          fill="none" stroke="#2a7af5" stroke-width="1.2" stroke-linecap="round"/>
        <!-- 鼻子 -->
        <path d="M48,22 L50,24 L52,22" fill="#2a7af5" fill-opacity="0.15" stroke="none"/>
        <!-- 胡须 -->
        <g class="whiskers-left">
          <path d="M25,20 L8,16" stroke-width="1" opacity="0.85"/>
          <path d="M25,24 L6,24" stroke-width="1" opacity="0.85"/>
        </g>
        <g class="whiskers-right">
          <path d="M75,20 L92,16" stroke-width="1" opacity="0.85"/>
          <path d="M75,24 L94,24" stroke-width="1" opacity="0.85"/>
        </g>
        <!-- 前腿 -->
        <path d="M32,75 L28,100 L38,100" fill="none" stroke="#2a7af5"/>
        <path d="M68,75 L72,100 L62,100" fill="none" stroke="#2a7af5"/>
        <!-- 后腿 -->
        <path d="M22,68 Q15,80 15,95 L22,100" fill="none" stroke="#2a7af5"/>
        <path d="M78,68 Q85,80 85,95 L78,100" fill="none" stroke="#2a7af5"/>
      </g>
    </g>

    <!-- ===== 咖啡杯（放在外面，与咖啡机底部对齐） ===== -->
    <g transform="translate(1300, 684) scale(0.8)" opacity="0.10" stroke-width="2">
      <!-- 咖啡杯 -->
      <path d="M25,105 L20,140 L60,140 L55,105 Z" fill="#2a7af5" fill-opacity="0.04" stroke="#2a7af5"/>
      <path d="M55,112 Q70,112 70,126 Q70,140 55,140" fill="none" stroke="#2a7af5"/>
      <!-- 咖啡液面 -->
      <line x1="24" y1="118" x2="56" y2="118" stroke="#2a7af5" stroke-width="1.5" stroke-dasharray="2,2"/>
      <!-- 杯内水位线 -->
      <line x1="24" y1="118" x2="56" y2="118" stroke="#2a7af5" stroke-width="1"/>
      <line x1="23" y1="125" x2="57" y2="125" stroke="#2a7af5" stroke-width="1"/>
      <line x1="22" y1="132" x2="58" y2="132" stroke="#2a7af5" stroke-width="1"/>
    </g>
  </g>
</svg>
