<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <!-- DeepSeek · 星辰大海 — 海天成一色 -->

  <!-- 天空渐变 -->
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#EAF0F8"/>
    <stop offset="50%" stop-color="#D6E2EE"/>
    <stop offset="100%" stop-color="#C8D6E8"/>
  </linearGradient>
  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- 大海渐变 -->
  <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C8D6E8"/>
    <stop offset="30%" stop-color="#B0C4DC"/>
    <stop offset="60%" stop-color="#9AB0CC"/>
    <stop offset="100%" stop-color="#7A96B8"/>
  </linearGradient>
  <rect x="0" y="420" width="1440" height="480" fill="url(#sea)"/>

  <!-- 海天交界柔光 -->
  <linearGradient id="merge" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#D6E2EE" stop-opacity="0.5"/>
    <stop offset="50%" stop-color="#C8D6E8" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#B0C4DC" stop-opacity="0"/>
  </linearGradient>
  <rect x="0" y="380" width="1440" height="80" fill="url(#merge)"/>

  <!-- 海鸟 — 天空（0.44 后缓慢拍翅，远去后静止） -->
  <g fill="none" stroke="#5A7AA0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.20" transform="translate(-80, 128)">

    <!-- 鸟1 -->
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1,1;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,1"
        keyTimes="0;0.44;0.45;0.46;0.47;0.48;0.49;0.50;0.51;0.52;0.53;0.54;1"
        dur="28s" repeatCount="indefinite"/>
      <path d="M280,220 Q290,210 300,220 Q310,210 320,220"/>
    </g>

    <!-- 鸟2 -->
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1,1;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,1"
        keyTimes="0;0.445;0.455;0.465;0.475;0.485;0.495;0.505;0.515;0.525;0.535;0.545;1"
        dur="28s" repeatCount="indefinite"/>
      <path d="M340,200 Q348,192 356,200 Q364,192 372,200"/>
    </g>

    <!-- 鸟3 -->
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1,1;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,1"
        keyTimes="0;0.45;0.46;0.47;0.48;0.49;0.50;0.51;0.52;0.53;0.54;0.55;1"
        dur="28s" repeatCount="indefinite"/>
      <path d="M260,240 Q266,233 272,240 Q278,233 284,240"/>
    </g>

    <!-- 鸟4 -->
    <g transform="translate(15, -10)">
      <g>
        <animateTransform attributeName="transform" type="scale"
          values="1,1;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,1"
          keyTimes="0;0.44;0.45;0.46;0.47;0.48;0.49;0.50;0.51;0.52;0.53;0.54;1"
          dur="28s" repeatCount="indefinite"/>
        <path d="M520,180 Q530,170 540,180 Q550,170 560,180"/>
      </g>
    </g>

    <!-- 鸟5 -->
    <g transform="translate(15, -10)">
      <g>
        <animateTransform attributeName="transform" type="scale"
          values="1,1;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,0.94;1,1;1,1"
          keyTimes="0;0.455;0.465;0.475;0.485;0.495;0.505;0.515;0.525;0.535;0.545;0.555;1"
          dur="28s" repeatCount="indefinite"/>
        <path d="M480,195 Q485,189 490,195 Q495,189 500,195"/>
      </g>
    </g>

  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- ★ 燃烧的太阳 — 左侧近景                       -->
  <!-- ════════════════════════════════════════════ -->
  <defs>
    <!-- 太阳光晕（大幅降低透明度避免浅红罩） -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.12"/>
      <stop offset="25%" stop-color="#FF8C00" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#FF4500" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FF2200" stop-opacity="0"/>
    </radialGradient>
    <!-- 太阳本体渐变（核心明亮，向外快速渐隐，到边缘完全透明） -->
    <radialGradient id="sunBodyGrad" cx="38%" cy="35%" r="100%">
      <stop offset="0%" stop-color="#FFFEF0" stop-opacity="1"/>
      <stop offset="20%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FF8C00" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FF4400" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#CC2200" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#881100" stop-opacity="0"/>
    </radialGradient>
    <!-- 核心高亮（减弱亮度） -->
    <radialGradient id="sunCore" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- 气体湍流+强模糊滤镜（轮廓线完全融化） -->
    <filter id="gasTurbulence" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="12"/>
    </filter>
  </defs>
  <g transform="translate(0, 20)">
  <!-- 海岛 — 右下角 -->
  <g opacity="0.35" transform="translate(1245, 695) scale(0.90, 1) rotate(-3) translate(-1245, -695)">
    <!-- 岛身渐变（比海水略深） -->
    <linearGradient id="islandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8AA8C8"/>
      <stop offset="60%" stop-color="#5A7AA0"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
    <!-- 海岛轮廓：四周环海的独立岛屿 -->
    <path d="M1370,791
             C1315,781 1280,758 1070,696
             C1050,684 1060,662 1085,642
             C1105,616 1135,612 1160,606
             C1190,599 1205,597 1215,599
             C1420,716 1410,741 1395,759
             C1400,776 1378,782 1370,791
             Z"
          fill="url(#islandGrad)"/>
  </g>

  <!-- 飞机跑道 — 嵌于岛坡之上 -->
  <!-- 平行四边形：上长边向右拉，下长边向左拉 -->
  <g opacity="0.45" transform="translate(1232, 696.2) scale(0.90) translate(-1232, -696.2)">
    <!-- 跑道基面 -->
    <path d="M1123.1,648.8 L1105.1,684.8 L1340.9,743.6 L1358.9,707.6 Z"
          fill="#7A9AB8"/>
    <!-- 上长边 -->
    <line x1="1123.1" y1="648.8" x2="1358.9" y2="707.6" stroke="#FFFFFF" stroke-width="1.5" opacity="0.70"/>
    <!-- 下长边 -->
    <line x1="1105.1" y1="684.8" x2="1340.9" y2="743.6" stroke="#FFFFFF" stroke-width="1.5" opacity="0.70"/>
    <!-- 虚线中心线 -->
    <line x1="1114.1" y1="666.8" x2="1349.9" y2="725.6" stroke="#FFFFFF" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.55"/>
  </g>

  <!-- 战斗机 — 跑道右端，机头朝左待起飞（含起飞动画） -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,0; -100,-25; -200,-80; -900,-399; -1450,-599; 380,140; 100,25; 10,3; 0,0; 0,0"
      keyTimes="0; 0.25; 0.30; 0.35; 0.48; 0.54; 0.60; 0.78; 0.86; 0.90; 1"
      dur="28s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 1; 1; 1; 0.5; 0; 1; 1; 1; 1"
      keyTimes="0; 0.25; 0.30; 0.35; 0.44; 0.48; 0.60; 0.78; 0.86; 0.90; 1"
      dur="28s" repeatCount="indefinite"/>
    <g transform="translate(1291, 710) scale(0.96) rotate(14)">
      <!-- 机身（从三角翼顶角到尾翼基座） -->
      <rect x="-10" y="-1.8" width="19" height="3.6" rx="1" fill="#E8EEF4" stroke="#8AA8C8" stroke-width="0.4"/>
      <!-- 机头锥（从顶角到针尖，逐渐收窄） -->
      <path d="M-10,-1.8 L-15,-0.3 L-17.5,0 L-15,0.3 L-10,1.8 Z" fill="#E8EEF4" stroke="#8AA8C8" stroke-width="0.4"/>
      <!-- 三角主翼（等腰三角，腰线内凹） -->
      <path d="M-10,0 Q-5,-2 6,-11 L6,11 Q-5,2 -10,0 Z"
            fill="#E8EEF4" stroke="#8AA8C8" stroke-width="0.4"/>
      <!-- 尾翼（缩小版三角翼，直线腰） -->
      <polygon points="5,0 9,-3.5 9,3.5" fill="#E8EEF4" stroke="#8AA8C8" stroke-width="0.4"/>
      <!-- 尾部收窄至喷气口 -->
      <path d="M9,-1.8 L11,-0.6 L11,0.6 L9,1.8 Z" fill="#E8EEF4" stroke="#8AA8C8" stroke-width="0.4"/>
      <!-- 喷气口 -->
      <rect x="11" y="-0.5" width="0.8" height="1" rx="0.3" fill="#CC3333"/>
      <!-- 驾驶舱 -->
      <ellipse cx="-12" cy="0" rx="2.5" ry="1" fill="#8AA8C8" opacity="0.35"/>
    </g>
  </g>
  <!-- ★ 火球渐变：内红→外橙→边缘微蓝 -->
  <radialGradient id="fireGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#DD4444" stop-opacity="0.95"/>
    <stop offset="35%" stop-color="#E08040" stop-opacity="0.80"/>
    <stop offset="65%" stop-color="#EE9933" stop-opacity="0.45"/>
    <stop offset="90%" stop-color="#6688AA" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#6688AA" stop-opacity="0"/>
  </radialGradient>
  <!-- ★ 宏：用 sed 批量替换 r=7→12，尾部路径同步缩放 -->
  <!-- ★ 火球模板（纯球形，忽略仰角） -->
  <!-- 火球模板已内联到各位置（避免 use 兼容性问题） -->
  <!-- ★ 1号火球 — 3号参考点 (1100,630) 角度≈28° -->
  <g transform="translate(1100,630) scale(0.92) rotate(28)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1;1;1.06;1.10;1" keyTimes="0;0.35;0.351;0.39;0.42;1" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.80;0.80;0;0" keyTimes="0;0.35;0.351;0.39;0.41;1" dur="28s" repeatCount="indefinite"/>
      <g transform="scale(0.059) translate(-240, -280)">
        <g>
          <polygon points="240,201 195,208 165,235 155,280 168,328 200,352 250,359 300,362 360,378 490,340 430,325 520,312 560,290 510,270 490,228 420,216 340,208 300,212" fill="#FF4400" fill-opacity="0.30"/>
          <polygon points="240,201 200,210 170,238 160,280 172,325 205,350 250,359 295,360 340,372 450,342 410,326 470,312 500,292 460,274 450,238 395,222 335,212 290,216" fill="#FF8800" fill-opacity="0.33"/>
          <polygon points="240,201 205,213 175,242 165,280 178,320 210,347 250,359 285,358 325,365 410,338 385,324 430,312 450,296 420,278 410,245 370,228 315,216 275,220" fill="#FFCC00" fill-opacity="0.36"/>
        </g>
        <circle cx="240" cy="280" r="68" fill="#FF8800"/>
      </g>
    </g>
  </g>
  <!-- ★ 2号火球 — 6号参考点 (500,360) -->
  <g transform="translate(500,360) scale(0.92) rotate(22)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1;1;1.06;1.10;1" keyTimes="0;0.46;0.461;0.50;0.53;1" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.80;0.80;0;0" keyTimes="0;0.46;0.461;0.50;0.52;1" dur="28s" repeatCount="indefinite"/>
      <g transform="scale(0.059) translate(-240, -280)">
        <g>
          <polygon points="240,201 195,208 165,235 155,280 168,328 200,352 250,359 300,362 360,378 490,340 430,325 520,312 560,290 510,270 490,228 420,216 340,208 300,212" fill="#FF4400" fill-opacity="0.30"/>
          <polygon points="240,201 200,210 170,238 160,280 172,325 205,350 250,359 295,360 340,372 450,342 410,326 470,312 500,292 460,274 450,238 395,222 335,212 290,216" fill="#FF8800" fill-opacity="0.33"/>
          <polygon points="240,201 205,213 175,242 165,280 178,320 210,347 250,359 285,358 325,365 410,338 385,324 430,312 450,296 420,278 410,245 370,228 315,216 275,220" fill="#FFCC00" fill-opacity="0.36"/>
        </g>
        <circle cx="240" cy="280" r="68" fill="#FF8800"/>
      </g>
    </g>
  </g>
  <!-- ★ 3号火球 — 7号参考点 (300,280) -->
  <g transform="translate(300,280) scale(0.92) rotate(15)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1;1;1.06;1.10;1" keyTimes="0;0.49;0.491;0.53;0.56;1" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.80;0.80;0;0" keyTimes="0;0.49;0.491;0.53;0.55;1" dur="28s" repeatCount="indefinite"/>
      <g transform="scale(0.059) translate(-240, -280)">
        <g>
          <polygon points="240,201 195,208 165,235 155,280 168,328 200,352 250,359 300,362 360,378 490,340 430,325 520,312 560,290 510,270 490,228 420,216 340,208 300,212" fill="#FF4400" fill-opacity="0.30"/>
          <polygon points="240,201 200,210 170,238 160,280 172,325 205,350 250,359 295,360 340,372 450,342 410,326 470,312 500,292 460,274 450,238 395,222 335,212 290,216" fill="#FF8800" fill-opacity="0.33"/>
          <polygon points="240,201 205,213 175,242 165,280 178,320 210,347 250,359 285,358 325,365 410,338 385,324 430,312 450,296 420,278 410,245 370,228 315,216 275,220" fill="#FFCC00" fill-opacity="0.36"/>
        </g>
        <circle cx="240" cy="280" r="68" fill="#FF8800"/>
      </g>
    </g>
  </g>
  <!-- 灯塔 — 立于岛顶 -->
  <g opacity="0.56">
    <!-- 灯塔塔身渐变（底深顶亮，与岛面自然过渡） -->
    <linearGradient id="towerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6E2EE"/>
      <stop offset="60%" stop-color="#B0C4DC"/>
      <stop offset="100%" stop-color="#6A8AB0"/>
    </linearGradient>
    <!-- 灯塔塔身（梯形锥体，底端嵌入岛面） -->
    <path d="M1191,624 Q1201,630 1211,624 L1209,592 L1193,592 Z"
          fill="url(#towerGrad)" stroke="#8AA8C8" stroke-width="0.8"/>
    <!-- 塔身横纹装饰 -->
    <line x1="1192" y1="612" x2="1210" y2="612" stroke="#8AA8C8" stroke-width="0.5"/>
    <!-- 中国国旗 -->
    <g>
      <rect x="1193" y="602" width="16" height="12" fill="#DE2910" stroke="#8AA8C8" stroke-width="0.4"/>
      <!-- 大五角星（左侧） -->
      <polygon points="1196,603.5 1196.7,605.2 1198.3,605.2 1197,606.2 1197.5,608 1196,606.9 1194.5,608 1195,606.2 1193.7,605.2 1195.3,605.2" fill="#FFDE00"/>
      <!-- 四颗小星（右侧弧线排列） -->
      <polygon points="1199.5,602.8 1199.7,603.7 1200.5,603.7 1199.8,604.2 1200,605.2 1199.5,604.6 1199,605.2 1199.2,604.2 1198.5,603.7 1199.3,603.7" fill="#FFDE00"/>
      <polygon points="1200.3,604.5 1200.5,605.2 1201.2,605.2 1200.6,605.6 1200.8,606.5 1200.3,606 1199.8,606.5 1200,605.6 1199.4,605.2 1200.1,605.2" fill="#FFDE00"/>
      <polygon points="1199.5,606.2 1199.7,606.9 1200.3,606.9 1199.8,607.3 1200,608 1199.5,607.5 1199,608 1199.2,607.3 1198.7,606.9 1199.3,606.9" fill="#FFDE00"/>
      <polygon points="1198.3,607 1198.5,607.6 1199,607.6 1198.6,608 1198.7,608.5 1198.3,608.2 1197.9,608.5 1198,608 1197.6,607.6 1198.1,607.6" fill="#FFDE00"/>
    </g>
    <line x1="1192" y1="602" x2="1210" y2="602" stroke="#8AA8C8" stroke-width="0.5"/>
    <!-- 灯室（顶部的玻璃房） -->
    <rect x="1193" y="585" width="16" height="7" rx="1" fill="#D6C8A8" stroke="#8AA8C8" stroke-width="0.7"/>
    <!-- 灯室发光（更暖） -->
    <rect x="1194" y="586" width="14" height="5" rx="0.8" fill="#FFE088" opacity="0.50"/>
    <!-- 屋顶 -->
    <path d="M1191,585 L1201,579 L1211,585 Z" fill="#8AA8C8"/>
    <!-- 灯室左侧光晕（光束出口处掺入灯光色） -->
    <line x1="1193" y1="586" x2="1193" y2="591" stroke="#FFE088" stroke-width="0.8" opacity="0.50"/>
    <!-- ★ 光束组（绕灯室底部旋转扫描）  【手工调整区】 -->
    <!-- ★ 旋转中心: (1201, 590) — 光束摆动轴心 -->
    <!-- ★ 光束形状: M1201,585  L858,490  L846,591  L1201,591  Z -->
    <!--    - M1201,585 : 出发点上方（灯室顶部） -->
    <!--    - L858,490  : 上边远端（调X控制长度，调Y控制上边角度） -->
    <!--    - L846,591  : 下边远端（调X控制长度，调Y控制下边角度） -->
    <!--    - L1201,591 : 出发点下方（灯室底部） -->
    <!--    - 旋转角度 ±3 可改为 ±5 等调扫描范围 -->
    <!-- 光束渐变（亮度从近到远递减） -->
    <linearGradient id="beamFade" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFE088" stop-opacity="0.82"/>
      <stop offset="30%" stop-color="#FFEE99" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#FFEEAA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFEEBB" stop-opacity="0.04"/>
    </linearGradient>
    <!-- 光束组（独立于灯塔组透明度） -->
    <g opacity="1">
      <animateTransform attributeName="transform" type="rotate"
        values="-5 1192 590; 5 1192 590; -5 1192 590"
        keyTimes="0; 0.5; 1"
        dur="6s" repeatCount="indefinite"/>
      <!-- 单束光柱（渐变淡出，左缘对齐灯室外壁） -->
      <path d="M1192,586 L858,490 L846,591 L1192,591 Z"
            fill="url(#beamFade)"/>
    </g>
  </g>
  </g>

  <!-- 白色飞沫 — 浪花 -->
  <g fill="#FFFFFF">
    <!-- 远浪飞沫 -->
    <g opacity="0.15">
      <circle cx="200" cy="510" r="1.5"/><circle cx="206" cy="506" r="1"/><circle cx="194" cy="508" r="1.2"/>
      <circle cx="600" cy="495" r="1.5"/><circle cx="608" cy="490" r="1"/><circle cx="594" cy="492" r="1.2"/>
      <circle cx="1000" cy="505" r="1.5"/><circle cx="1008" cy="500" r="1"/><circle cx="994" cy="502" r="1.2"/>
      <circle cx="1300" cy="515" r="1.3"/><circle cx="1308" cy="510" r="1"/><circle cx="1294" cy="512" r="1"/>
    </g>

    <!-- 中浪飞沫 -->
    <g opacity="0.25">
      <circle cx="100" cy="555" r="2"/><circle cx="110" cy="548" r="1.5"/><circle cx="92" cy="550" r="1.8"/><circle cx="106" cy="544" r="1"/><circle cx="116" cy="552" r="1.2"/>
      <circle cx="400" cy="540" r="2"/><circle cx="410" cy="534" r="1.5"/><circle cx="392" cy="536" r="1.8"/><circle cx="406" cy="530" r="1"/><circle cx="416" cy="538" r="1.2"/>
