      0% { opacity: 0.30; }
      28.570% { opacity: 0.30; }
      28.571% { opacity: 0.85; }
      85.713% { opacity: 0.85; }
      85.714% { opacity: 0.30; }
      100% { opacity: 0.30; }
    }
    /* жҫ¶в•ғжӢ  йҲҘ?йҗҸ?0s~25sй”ӣеұјеҜ’ 25s~65sй”ӣеІҖдјғ 65s~70s */
