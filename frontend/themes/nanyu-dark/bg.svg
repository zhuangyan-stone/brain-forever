      0% { opacity: 0.30; }
      7.142% { opacity: 0.30; }
      7.143% { opacity: 0.85; }
      64.285% { opacity: 0.85; }
      64.286% { opacity: 0.30; }
      100% { opacity: 0.30; }
    }
    /* йҗңеӨҺгҖҖ йҲҘ?йҗҸ?0s~10sй”ӣеұјеҜ’ 10s~50sй”ӣеІҖдјғ 50s~70s */
