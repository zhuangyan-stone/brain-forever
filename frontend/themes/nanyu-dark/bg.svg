<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- 南郁老登 · 钢夜 — 工业钢铁风（暗色版）
       作者：南郁，五十岁老程序员的沉稳与力量 -->
  
  <!-- 底色 — 深钢灰 -->
  <rect width="1440" height="900" fill="#1A1C1E"/>

  <!-- 底部熔炉红光 — 像是钢厂炉火的余晖 -->
  <ellipse cx="720" cy="920" rx="800" ry="220" fill="#E8853D" opacity="0.06"/>

  <!-- 工业几何结构 — 两侧垂直钢柱 -->
  <g opacity="0.20">
    <rect x="0" y="0" width="12" height="900" fill="#4A4E53"/>
    <rect x="1428" y="0" width="12" height="900" fill="#4A4E53"/>
  </g>

  <!-- 古典闹钟 — 时间的力量（原齿轮位） -->
  <g transform="translate(1150, 700) scale(0.96)" opacity="0.20">
    <!-- 钟体外壳 -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#E8853D" stroke-width="5"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#E8853D" stroke-width="1.5"/>
    <!-- 钟面内圈 -->
    <circle cx="0" cy="0" r="82" fill="none" stroke="#E8853D" stroke-width="0.8" opacity="0.5"/>

    <!-- 顶部两个铃铛 -->
    <ellipse cx="-30" cy="-95" rx="28" ry="18" fill="none" stroke="#E8853D" stroke-width="3"/>
    <ellipse cx="30" cy="-95" rx="28" ry="18" fill="none" stroke="#E8853D" stroke-width="3"/>

    <!-- 铃锤 -->
    <line x1="0" y1="-95" x2="0" y2="-118" stroke="#E8853D" stroke-width="2.5"/>
    <circle cx="0" cy="-121" r="5" fill="#E8853D"/>

    <!-- 12个钟点刻度 -->
    <g stroke="#E8853D" stroke-width="2.5" stroke-linecap="round">
      <g transform="rotate(0)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(30)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(150)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(210)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-85" x2="0" y2="-77"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
      <g transform="rotate(330)"><line x1="0" y1="-85" x2="0" y2="-80"/></g>
    </g>

    <!-- 时针（短粗，指向约10点） -->
    <line x1="0" y1="0" x2="-25" y2="-40" stroke="#E8853D" stroke-width="4" stroke-linecap="round"/>
    <!-- 分针（细长，指向约2点） -->
    <line x1="0" y1="0" x2="35" y2="-55" stroke="#E8853D" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 秒针（最细，每分钟一圈） -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="60s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="-20" y2="60" stroke="#E8853D" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    </g>

    <!-- 中心轴 -->
    <circle cx="0" cy="0" r="5" fill="#E8853D"/>
    <circle cx="0" cy="0" r="2" fill="#1A1C1E"/>

    <!-- 底部两只脚 -->
    <path d="M-50,95 Q-55,108 -60,105" fill="none" stroke="#E8853D" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M50,95 Q55,108 60,105" fill="none" stroke="#E8853D" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 铆钉装饰 -->
  <g opacity="0.15" fill="#E8853D">
    <circle cx="80" cy="80" r="5"/>
    <circle cx="200" cy="80" r="5"/>
    <circle cx="320" cy="80" r="5"/>
    <circle cx="80" cy="820" r="5"/>
    <circle cx="200" cy="820" r="5"/>
    <circle cx="320" cy="820" r="5"/>
    <circle cx="1120" cy="80" r="5"/>
    <circle cx="1240" cy="80" r="5"/>
    <circle cx="1360" cy="80" r="5"/>
    <circle cx="1120" cy="820" r="5"/>
    <circle cx="1240" cy="820" r="5"/>
    <circle cx="1360" cy="820" r="5"/>
  </g>

  <!-- 领带装饰 — 程序员的骄傲 -->
  <g opacity="0.18">
    <!-- 领带结 -->
    <polygon points="135,130 175,130 180,180 130,180" fill="#E8853D"/>
    <!-- 领带主体 -->
    <path d="M130,180
             L180,180
             L190,340
             Q196,400 205,440
             L155,500
             L105,440
             Q114,400 120,340 Z"
          fill="#E8853D"/>
    <!-- 领带内折阴影 -->
    <path d="M150,180 L155,490" stroke="#1A1C1E" stroke-width="1.5" opacity="0.3" fill="none"/>
    <!-- 领带条纹装饰 -->
    <g stroke="#1A1C1E" stroke-width="0.8" opacity="0.2" fill="none">
      <path d="M134,200 L176,200"/>
      <path d="M132,230 L178,230"/>
      <path d="M130,260 L180,260"/>
      <path d="M128,290 L182,290"/>
      <path d="M126,320 L184,320"/>
      <path d="M124,350 L186,350"/>
      <path d="M120,380 L190,380"/>
      <path d="M114,410 L196,410"/>
    </g>
  </g>

  <!-- 手写邀约 — 老男人的浪漫（写在领带上） -->
  <g opacity="0.40" font-family="KaiTi, STKaiti, 'Noto Serif SC', serif" fill="#FFFFFF">
    <text x="150" y="240" font-size="16" transform="rotate(-3, 150, 240)">我想</text>
    <text x="158" y="290" font-size="16" transform="rotate(4, 158, 290)">约你</text>
    <text x="145" y="340" font-size="16" transform="rotate(-2, 145, 340)">吃饭</text>
  </g>

  <!-- 书堆 — 知识的力量 -->
  <g transform="translate(200,720) scale(0.88) translate(-200,-700)">
  <g opacity="0.40">
    <!-- 第1本 -->
    <g transform="translate(100,838) rotate(-2)">
      <rect x="0" y="0" width="210" height="22" rx="2" fill="#7B9DBF"/>
      <rect x="4" y="1" width="3" height="20" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第2本 -->
    <g transform="translate(108,813) rotate(1.5)">
      <rect x="0" y="0" width="195" height="25" rx="2" fill="#C49A6C"/>
      <rect x="4" y="1" width="3" height="23" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第3本 -->
    <g transform="translate(95,785) rotate(3)">
      <rect x="0" y="0" width="220" height="20" rx="2" fill="#8FB58F"/>
      <rect x="4" y="1" width="3" height="18" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第4本 -->
    <g transform="translate(112,758) rotate(-1.5)">
      <rect x="0" y="0" width="190" height="28" rx="2" fill="#BF7C7C"/>
      <rect x="4" y="1" width="3" height="26" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第5本 -->
    <g transform="translate(102,728) rotate(0.5)">
      <rect x="0" y="0" width="205" height="24" rx="2" fill="#9B8FBF"/>
      <rect x="4" y="1" width="3" height="22" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第6本 -->
    <g transform="translate(118,700) rotate(-2.5)">
      <rect x="0" y="0" width="185" height="22" rx="2" fill="#BF9B7C"/>
      <rect x="4" y="1" width="3" height="20" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第7本 -->
    <g transform="translate(105,672) rotate(1.8)">
      <rect x="0" y="0" width="200" height="26" rx="2" fill="#6CBFBF"/>
      <rect x="4" y="1" width="3" height="24" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第8本 -->
    <g transform="translate(98,644) rotate(-1)">
      <rect x="0" y="0" width="215" height="24" rx="2" fill="#A8A87C"/>
      <rect x="4" y="1" width="3" height="22" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第9本 -->
    <g transform="translate(115,618) rotate(2.2)">
      <rect x="0" y="0" width="188" height="22" rx="2" fill="#BF8F9B"/>
      <rect x="4" y="1" width="3" height="20" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第10本 -->
    <g transform="translate(108,592) rotate(-0.8)">
      <rect x="0" y="0" width="200" height="28" rx="2" fill="#7CA8BF"/>
      <rect x="4" y="1" width="3" height="26" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第11本 -->
    <g transform="translate(100,566) rotate(1.2)">
      <rect x="0" y="0" width="210" height="20" rx="2" fill="#8FBF9B"/>
      <rect x="4" y="1" width="3" height="18" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第12本 -->
    <g transform="translate(110,538) rotate(-1.8)">
      <rect x="0" y="0" width="195" height="26" rx="2" fill="#BF7CA8"/>
      <rect x="4" y="1" width="3" height="24" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第13本（斜靠在右侧） -->
    <g transform="translate(305,710) rotate(18)">
      <rect x="0" y="0" width="22" height="130" rx="2" fill="#C49A6C"/>
      <rect x="1" y="4" width="20" height="3" fill="#1A1C1E" opacity="0.3"/>
    </g>
    <!-- 第14本（斜靠在内侧） -->
    <g transform="translate(288,740) rotate(12)">
      <rect x="0" y="0" width="20" height="110" rx="2" fill="#7B9DBF"/>
      <rect x="1" y="4" width="18" height="3" fill="#1A1C1E" opacity="0.3"/>
    </g>
  </g>
  </g>

  <!-- 机械键盘 — 画面下方中间，程序员的标志 -->
  <g transform="translate(720, 755) scale(1.2) translate(-720, -835)" opacity="0.12">
    <!-- 键盘底座 -->
    <rect x="630" y="808" width="180" height="54" rx="5" fill="#4A4E53"/>
    <rect x="630" y="808" width="180" height="54" rx="5" fill="none" stroke="#6A6E73" stroke-width="0.5"/>

    <!-- ESC 键（熔炉橙强调） -->
    <rect x="636" y="811" width="10" height="7" rx="1.5" fill="#E8853D"/>

    <!-- 数字行 — 12 个键 -->
    <g stroke="#6A6E73" stroke-width="7" stroke-linecap="round" stroke-dasharray="9.5,2.3" fill="none">
      <line x1="650" y1="820" x2="798" y2="820"/>
    </g>

    <!-- QWERTY 行 — 12 个键（左偏移，模拟阶梯布局） -->
    <g stroke="#6A6E73" stroke-width="7" stroke-linecap="round" stroke-dasharray="9.5,2.3" fill="none">
      <line x1="655" y1="830" x2="798" y2="830"/>
    </g>

    <!-- ASDF 行 — 11 个键 -->
    <g stroke="#6A6E73" stroke-width="7" stroke-linecap="round" stroke-dasharray="10.5,2.5" fill="none">
      <line x1="650" y1="840" x2="798" y2="840"/>
    </g>

    <!-- Shift 行 — 10 个键 -->
    <g stroke="#6A6E73" stroke-width="7" stroke-linecap="round" stroke-dasharray="11.5,2.8" fill="none">
      <line x1="654" y1="850" x2="798" y2="850"/>
    </g>

    <!-- 空格行：Ctrl Win Alt [空格] Alt Fn Ctrl -->
    <g fill="#6A6E73">
      <rect x="636" y="856" width="14" height="6" rx="1.5"/>
      <rect x="652" y="856" width="10" height="6" rx="1.5"/>
      <rect x="664" y="856" width="10" height="6" rx="1.5"/>
      <rect x="676" y="856" width="52" height="6" rx="1.5"/>
      <rect x="730" y="856" width="10" height="6" rx="1.5"/>
      <rect x="742" y="856" width="10" height="6" rx="1.5"/>
      <rect x="754" y="856" width="14" height="6" rx="1.5"/>
    </g>

  </g>


  <!-- 零星火花点缀 — 暗色中的微光 -->
  <g opacity="0.25">
    <circle cx="480" cy="350" r="2" fill="#F0A05A"/>
    <circle cx="680" cy="280" r="1.5" fill="#F0A05A"/>
    <circle cx="850" cy="420" r="2.5" fill="#F0A05A"/>
    <circle cx="320" cy="500" r="1.5" fill="#F0A05A"/>
    <circle cx="950" cy="180" r="2" fill="#E8853D"/>
    <circle cx="550" cy="650" r="1.5" fill="#E8853D"/>
    <circle cx="700" cy="520" r="1" fill="#F0A05A"/>
    <circle cx="420" cy="750" r="2" fill="#E8853D"/>
  </g>
</svg>
