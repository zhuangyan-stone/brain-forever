      0% { opacity: 0.30; }
      14.285% { opacity: 0.30; }
      14.286% { opacity: 0.85; }
      71.428% { opacity: 0.85; }
      71.429% { opacity: 0.30; }
      100% { opacity: 0.30; }
    }
    /* жҫ¶в•ӮжҪҲ йҲҘ?йҗҸ?0s~15sй”ӣеұјеҜ’ 15s~55sй”ӣеІҖдјғ 55s~70s */
    @keyframes glow-4 {
      0% { opacity: 0.30; }
      21.428% { opacity: 0.30; }
      21.429% { opacity: 0.85; }
      78.570% { opacity: 0.85; }
      78.571% { opacity: 0.30; }
      100% { opacity: 0.30; }
    }
    /* жҫ¶в•ғеё’ йҲҘ?йҗҸ?0s~20sй”ӣеұјеҜ’ 20s~60sй”ӣеІҖдјғ 60s~70s */
