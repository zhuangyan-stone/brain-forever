    <g transform="translate(150, 580) scale(1.8) translate(-1300, -640)">
      <!-- 涓紡鐭儢鐜荤拑鑼舵澂锛堟澂韬井鏀讹紝灏忓湀瓒筹級 -->
      <g transform="matrix(1 0 0 -1 0 1470)">
        <!-- 鏉韩杞粨锛氬紑鍙ｆ瘮鏉簳鐣ュ锛岀煯鑳?-->
        <path d="M1278,750 L1281,730 L1319,730 L1322,750 Z" stroke-width="1.5" opacity="0.08"/>
        <!-- 鏉韩搴曢儴妯嚎 -->
        <path d="M1281,730 L1319,730" stroke-width="1.5" opacity="0.08"/>
        <!-- 鍦堣冻锛堝簳搴э級 鈥?鏄庢樉鏀剁獎 -->
        <path d="M1281,730 L1289,727 L1311,727 L1319,730" stroke-width="1.5" opacity="0.08"/>
