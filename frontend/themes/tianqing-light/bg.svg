<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- 天青烟雨 -->
  <g fill="none" stroke="#5A7A8A" stroke-linecap="round">
    <!-- 远山含黛 -->
    <path d="M0,500 C200,420 350,480 500,400 C650,320 800,450 1000,380 C1200,310 1400,420 1440,400 L1440,900 L0,900 Z" 
          fill="#5A7A8A" opacity="0.06" stroke="none"/>
    <path d="M0,580 C300,520 500,560 700,500 C900,440 1100,540 1440,500 L1440,900 L0,900 Z" 
          fill="#7A9AAA" opacity="0.04" stroke="none"/>
    
    <!-- 云烟缭绕 -->
    <path d="M200,320 Q300,290 400,320 Q500,350 600,320 Q700,290 800,320" 
          stroke-width="2" opacity="0.08"/>
    <path d="M600,280 Q700,250 800,270 Q900,290 1000,270 Q1100,250 1200,270" 
          stroke-width="1.5" opacity="0.06"/>
    <path d="M100,380 Q200,360 300,380 Q400,400 500,380" 
          stroke-width="1.5" opacity="0.05"/>
    
    <!-- 雨丝 — 若有若无 -->
    <g opacity="0.06" stroke-width="0.5">
      <line x1="200" y1="0" x2="190" y2="100"/>
      <line x1="250" y1="0" x2="240" y2="80"/>
      <line x1="450" y1="0" x2="440" y2="120"/>
      <line x1="700" y1="0" x2="690" y2="90"/>
      <line x1="850" y1="0" x2="840" y2="110"/>
      <line x1="1050" y1="0" x2="1040" y2="70"/>
      <line x1="1250" y1="0" x2="1240" y2="100"/>
      <line x1="350" y1="0" x2="340" y2="60"/>
      <line x1="950" y1="0" x2="940" y2="85"/>
    </g>
  </g>
</svg>
