<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <!-- 彩蝶粉韵 · 昼 — 只留蝴蝶 -->

  <defs>
    <style>
      /* 风筝随风飘荡动画 — 左右 ±18px，上下 ±14px，旋转 ±6° */
      @keyframes kiteFloat {
        0%   { transform: translate(0px, 0px) rotate(0deg); }
        20%  { transform: translate(14px, -10px) rotate(4deg); }
        40%  { transform: translate(-12px, 12px) rotate(-5deg); }
        60%  { transform: translate(18px, -14px) rotate(6deg); }
        80%  { transform: translate(-16px, 8px) rotate(-3deg); }
        100% { transform: translate(0px, 0px) rotate(0deg); }
      }
      .kite-body {
        animation: kiteFloat 9s ease-in-out infinite;
        transform-origin: 790px 130px;
      }
    </style>
  </defs>

  <!-- 透明底色，CSS background-color 可见 -->
  <rect width="1440" height="900" fill="none"/>

  <!-- 风筝 — 简单菱形风筝，与蝴蝶共享同色调 -->
  <g opacity="0.20">
    <!-- 风筝线（SMIL 动画：随风筝摆动牵动控制点与终点） -->
    <path d="M790,215 Q770,420 720,620 Q690,730 660,830" fill="none" stroke="#D63384" stroke-width="0.8" stroke-dasharray="3,4">
      <animate attributeName="d" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" values="
        M790,215 Q770,420 720,620 Q690,730 660,830;
        M804,205 Q782,412 724,618 Q693,728 660,830;
        M778,227 Q760,430 716,625 Q687,732 660,830;
        M808,201 Q786,410 728,617 Q694,727 660,830;
        M774,223 Q758,428 714,624 Q686,731 660,830;
        M790,215 Q770,420 720,620 Q690,730 660,830
      "/>
    </path>
    <!-- 风筝主体（浮动动画组） -->
    <g class="kite-body">
      <g transform="translate(790, 130) rotate(12) scale(1.8)">
        <path d="M0,-35 L24,0 L0,35 L-24,0 Z" fill="#D63384"/>
        <path d="M0,-35 L24,0 L0,35 L-24,0 Z" fill="none" stroke="#D63384" stroke-width="1.2"/>
        <!-- 骨架十字 -->
        <line x1="-24" y1="0" x2="24" y2="0" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
        <line x1="0" y1="-35" x2="0" y2="35" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
        <!-- 尾部飘带结 -->
        <circle cx="0" cy="40" r="3" fill="#F5C842"/>
        <circle cx="0" cy="52" r="2.5" fill="#E84393"/>
        <circle cx="0" cy="62" r="2" fill="#D63384"/>
        <!-- 飘带 -->
        <path d="M0,35 Q-8,45 0,55 Q8,65 0,75" fill="none" stroke="#E84393" stroke-width="1.2"/>
      </g>
    </g>
  </g>

  <!-- 蝴蝶剪影组（半透明彩色） -->
  <g opacity="0.18">
    <!-- 蝴蝶 1 — 左上粉色 -->
    <g transform="translate(180, 120) scale(0.9)">
      <path d="M0,0 C-18,-24 -40,-30 -35,-12 C-30,6 -12,12 0,24 C12,12 30,6 35,-12 C40,-30 18,-24 0,0Z" fill="#D63384"/>
      <line x1="0" y1="24" x2="0" y2="36" stroke="#D63384" stroke-width="1.5"/>
      <path d="M-8,4 Q-18,-6 -28,-4" fill="none" stroke="#D63384" stroke-width="0.8" opacity="0.5"/>
      <path d="M8,4 Q18,-6 28,-4" fill="none" stroke="#D63384" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- 蝴蝶 2 — 右上紫色 -->
    <g transform="translate(1200, 80) scale(0.65) rotate(15)">
      <path d="M0,0 C-18,-24 -40,-30 -35,-12 C-30,6 -12,12 0,24 C12,12 30,6 35,-12 C40,-30 18,-24 0,0Z" fill="#9B59B6"/>
      <line x1="0" y1="24" x2="0" y2="36" stroke="#9B59B6" stroke-width="1.5"/>
      <path d="M-8,4 Q-18,-6 -28,-4" fill="none" stroke="#9B59B6" stroke-width="0.8" opacity="0.5"/>
      <path d="M8,4 Q18,-6 28,-4" fill="none" stroke="#9B59B6" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- 蝴蝶 3 — 中左金色 -->
    <g transform="translate(100, 400) scale(0.55) rotate(-10)">
      <path d="M0,0 C-15,-20 -33,-25 -29,-10 C-25,5 -10,10 0,20 C10,10 25,5 29,-10 C33,-25 15,-20 0,0Z" fill="#F5C842"/>
      <line x1="0" y1="20" x2="0" y2="30" stroke="#F5C842" stroke-width="1.5"/>
    </g>
    <!-- 蝴蝶 4 — 中央粉色 -->
    <g transform="translate(550, 300) scale(0.75) rotate(8)">
      <path d="M0,0 C-18,-24 -40,-30 -35,-12 C-30,6 -12,12 0,24 C12,12 30,6 35,-12 C40,-30 18,-24 0,0Z" fill="#E84393"/>
      <line x1="0" y1="24" x2="0" y2="36" stroke="#E84393" stroke-width="1.5"/>
      <path d="M-8,4 Q-18,-6 -28,-4" fill="none" stroke="#E84393" stroke-width="0.8" opacity="0.5"/>
      <path d="M8,4 Q18,-6 28,-4" fill="none" stroke="#E84393" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- 蝴蝶 5 — 右中橙色 -->
    <g transform="translate(1050, 380) scale(0.6) rotate(-20)">
      <path d="M0,0 C-18,-24 -40,-30 -35,-12 C-30,6 -12,12 0,24 C12,12 30,6 35,-12 C40,-30 18,-24 0,0Z" fill="#FF8C42"/>
      <line x1="0" y1="24" x2="0" y2="36" stroke="#FF8C42" stroke-width="1.5"/>
      <path d="M-8,4 Q-18,-6 -28,-4" fill="none" stroke="#FF8C42" stroke-width="0.8" opacity="0.5"/>
      <path d="M8,4 Q18,-6 28,-4" fill="none" stroke="#FF8C42" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- 蝴蝶 6 — 左下青色 -->
    <g transform="translate(180, 680) scale(0.7) rotate(5)">
      <path d="M0,0 C-18,-24 -40,-30 -35,-12 C-30,6 -12,12 0,24 C12,12 30,6 35,-12 C40,-30 18,-24 0,0Z" fill="#0FA88C"/>
      <line x1="0" y1="24" x2="0" y2="36" stroke="#0FA88C" stroke-width="1.5"/>
      <path d="M-8,4 Q-18,-6 -28,-4" fill="none" stroke="#0FA88C" stroke-width="0.8" opacity="0.5"/>
      <path d="M8,4 Q18,-6 28,-4" fill="none" stroke="#0FA88C" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- 蝴蝶 7 — 右下紫色 -->
    <g transform="translate(1150, 660) scale(0.55) rotate(-12)">
      <path d="M0,0 C-15,-20 -33,-25 -29,-10 C-25,5 -10,10 0,20 C10,10 25,5 29,-10 C33,-25 15,-20 0,0Z" fill="#8E44AD"/>
      <line x1="0" y1="20" x2="0" y2="30" stroke="#8E44AD" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 小光点（花瓣/星光）点缀 -->
  <g opacity="0.10">
    <circle cx="120" cy="250" r="5" fill="#D63384"/>
    <circle cx="650" cy="120" r="4" fill="#F5C842"/>
    <circle cx="400" cy="550" r="6" fill="#E84393"/>
    <circle cx="800" cy="400" r="3" fill="#FF8C42"/>
    <circle cx="320" cy="480" r="4" fill="#0FA88C"/>
    <circle cx="1350" cy="320" r="5" fill="#9B59B6"/>
    <circle cx="700" cy="650" r="3" fill="#F5C842"/>
    <circle cx="1300" cy="480" r="4" fill="#E84393"/>
    <circle cx="250" cy="720" r="3" fill="#D63384"/>
    <circle cx="950" cy="720" r="4" fill="#8E44AD"/>
    <circle cx="500" cy="160" r="2.5" fill="#FF8C42"/>
    <circle cx="880" cy="160" r="3.5" fill="#0FA88C"/>
  </g>
</svg>