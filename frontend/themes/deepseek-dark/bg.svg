      <!-- 流星2（无尾·中速）：起始于 X=720, Y=150 -->
      <g transform="translate(720,150)">
        <circle cx="0" cy="0" r="1.5" opacity="0" class="f02"/>
      </g>
      <!-- 流星3（无尾·慢速）：起始于 X=720, Y=150 -->
      <g transform="translate(720,150)">
        <circle cx="0" cy="0" r="1.5" opacity="0" class="f03"/>
      </g>
  </g>

