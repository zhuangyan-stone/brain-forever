<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- ========== 定义区：动画关键帧、渐变等 ========== -->
  <defs>
    <!-- 粒子上升消散动画：从中心原点向上/侧向飘移，同时放大并淡出 -->
    <style>
      @keyframes s01 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.9}100%{translate:-60px 280px;scale:1.1;opacity:0}}
      @keyframes s02 {0%{translate:0 0;scale:0.6;opacity:0}58%{opacity:1}100%{translate:-100px 320px;scale:1;opacity:0}}
      @keyframes s03 {0%{translate:0 0;scale:0.8;opacity:0}58%{opacity:0.8}100%{translate:-150px 260px;scale:1.2;opacity:0}}
      @keyframes s04 {0%{translate:0 0;scale:0.5;opacity:0}58%{opacity:0.95}100%{translate:-200px 350px;scale:0.9;opacity:0}}
      @keyframes s05 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.85}100%{translate:-250px 300px;scale:1.1;opacity:0}}
      @keyframes s06 {0%{translate:0 0;scale:0.6;opacity:0}58%{opacity:1}100%{translate:-300px 250px;scale:1;opacity:0}}
      @keyframes s07 {0%{translate:0 0;scale:0.5;opacity:0}58%{opacity:0.75}100%{translate:-350px 330px;scale:0.9;opacity:0}}
      @keyframes s08 {0%{translate:0 0;scale:0.8;opacity:0}58%{opacity:0.9}100%{translate:-400px 280px;scale:1.2;opacity:0}}
      @keyframes s09 {0%{translate:0 0;scale:0.6;opacity:0}58%{opacity:0.8}100%{translate:-450px 310px;scale:1;opacity:0}}
      @keyframes s10 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.7}100%{translate:-500px 270px;scale:1.1;opacity:0}}
      @keyframes s11 {0%{translate:0 0;scale:0.5;opacity:0}58%{opacity:0.85}100%{translate:-130px 350px;scale:0.9;opacity:0}}
      @keyframes s12 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.9}100%{translate:-320px 290px;scale:1.1;opacity:0}}
      @keyframes s13 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.9}100%{translate:60px 280px;scale:1.1;opacity:0}}
      @keyframes s14 {0%{translate:0 0;scale:0.6;opacity:0}58%{opacity:1}100%{translate:100px 320px;scale:1;opacity:0}}
      @keyframes s15 {0%{translate:0 0;scale:0.8;opacity:0}58%{opacity:0.8}100%{translate:150px 260px;scale:1.2;opacity:0}}
      @keyframes s16 {0%{translate:0 0;scale:0.5;opacity:0}58%{opacity:0.95}100%{translate:200px 350px;scale:0.9;opacity:0}}
      @keyframes s17 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.85}100%{translate:250px 300px;scale:1.1;opacity:0}}
      @keyframes s18 {0%{translate:0 0;scale:0.6;opacity:0}58%{opacity:1}100%{translate:300px 250px;scale:1;opacity:0}}
      @keyframes s19 {0%{translate:0 0;scale:0.5;opacity:0}58%{opacity:0.75}100%{translate:350px 330px;scale:0.9;opacity:0}}
      @keyframes s20 {0%{translate:0 0;scale:0.8;opacity:0}58%{opacity:0.9}100%{translate:400px 280px;scale:1.2;opacity:0}}
      @keyframes s21 {0%{translate:0 0;scale:0.6;opacity:0}58%{opacity:0.8}100%{translate:450px 310px;scale:1;opacity:0}}
      @keyframes s22 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.7}100%{translate:500px 270px;scale:1.1;opacity:0}}
      @keyframes s23 {0%{translate:0 0;scale:0.5;opacity:0}58%{opacity:0.85}100%{translate:130px 350px;scale:0.9;opacity:0}}
      @keyframes s24 {0%{translate:0 0;scale:0.7;opacity:0}58%{opacity:0.9}100%{translate:320px 290px;scale:1.1;opacity:0}}
      /* 左侧粒子运动轨迹：向左上方飘移（★加速5%：c01 c05 c08 c11） */
      .c01{animation:s01 2.67s ease-in infinite}.c02{animation:s02 3.52s ease-in infinite;animation-delay:0.1s}
      .c03{animation:s03 3.85s ease-in infinite;animation-delay:0.2s}.c04{animation:s04 3.3s ease-in infinite;animation-delay:0.15s}
      .c05{animation:s05 3.14s ease-in infinite;animation-delay:0.3s}.c06{animation:s06 2.75s ease-in infinite;animation-delay:0.25s}
      .c07{animation:s07 4.18s ease-in infinite;animation-delay:0.4s}.c08{animation:s08 2.67s ease-in infinite;animation-delay:0.35s}
      .c09{animation:s09 3.85s ease-in infinite;animation-delay:0.5s}.c10{animation:s10 3.3s ease-in infinite;animation-delay:0.45s}
      .c11{animation:s11 3.05s ease-in infinite;animation-delay:0.6s}.c12{animation:s12 3.96s ease-in infinite;animation-delay:0.55s}
      /* 右侧粒子运动轨迹：向右上方飘移（★加速5%：c13 c17 c20 c23） */
      .c13{animation:s13 2.67s ease-in infinite;animation-delay:0.05s}.c14{animation:s14 3.52s ease-in infinite;animation-delay:0.15s}
      .c15{animation:s15 3.85s ease-in infinite;animation-delay:0.25s}.c16{animation:s16 3.3s ease-in infinite;animation-delay:0.2s}
      .c17{animation:s17 3.14s ease-in infinite;animation-delay:0.35s}.c18{animation:s18 2.75s ease-in infinite;animation-delay:0.3s}
      .c19{animation:s19 4.18s ease-in infinite;animation-delay:0.45s}.c20{animation:s20 2.67s ease-in infinite;animation-delay:0.4s}
      .c21{animation:s21 3.85s ease-in infinite;animation-delay:0.55s}.c22{animation:s22 3.3s ease-in infinite;animation-delay:0.5s}
      .c23{animation:s23 3.05s ease-in infinite;animation-delay:0.65s}.c24{animation:s24 3.96s ease-in infinite;animation-delay:0.6s}
      /* 第二波（延迟批次）左侧粒子（★加速5%：c27） */
      .c25{animation:s01 3.08s ease-in infinite;animation-delay:2s}.c26{animation:s02 3.52s ease-in infinite;animation-delay:2.1s}
      .c27{animation:s03 3.33s ease-in infinite;animation-delay:2.2s}.c28{animation:s04 3.3s ease-in infinite;animation-delay:2.15s}
      .c29{animation:s05 3.63s ease-in infinite;animation-delay:2.3s}.c30{animation:s06 2.75s ease-in infinite;animation-delay:2.25s}
      /* 第二波（延迟批次）右侧粒子（★加速5%：c33） */
      .c31{animation:s13 3.08s ease-in infinite;animation-delay:2s}.c32{animation:s14 3.52s ease-in infinite;animation-delay:2.1s}
      .c33{animation:s15 3.33s ease-in infinite;animation-delay:2.2s}.c34{animation:s16 3.3s ease-in infinite;animation-delay:2.15s}
      .c35{animation:s17 3.63s ease-in infinite;animation-delay:2.3s}.c36{animation:s18 2.75s ease-in infinite;animation-delay:2.25s}
      /* ===== 流星（垂直下落） ===== */
      @keyframes f01 {0%{translate:0 0;opacity:0}3%{opacity:1}15%{translate:-15px 280px;opacity:0}100%{translate:-15px 280px;opacity:0}}
      @keyframes f02 {0%{translate:0 0;opacity:0}3%{opacity:1}17%{translate:12px 310px;opacity:0}100%{translate:12px 310px;opacity:0}}
      @keyframes f03 {0%{translate:0 0;opacity:0}3%{opacity:1}20%{translate:5px 340px;opacity:0}100%{translate:5px 340px;opacity:0}}
      /* 流星1（带尾·快速） 流星2（无尾·中速） 流星3（无尾·慢速）—— 总周期拉长约3倍，降低出现频率 */
      .f01{animation:f01 10s ease-in infinite;animation-delay:4s}.f02{animation:f02 12s ease-in infinite;animation-delay:7s}.f03{animation:f03 15s ease-in infinite;animation-delay:11s}
      /* ===== 斜向流星（从左上向右下） ===== */
      @keyframes m01 {0%{translate:0 0;opacity:0}1.67%{opacity:1}6.67%{translate:950px 670px;opacity:0}100%{translate:950px 670px;opacity:0}}
      @keyframes m04 {0%{translate:0 0;opacity:0}1.67%{opacity:1}10%{translate:850px 600px;opacity:0}100%{translate:850px 600px;opacity:0}}
      .m01{animation:m01 24s ease-in infinite;animation-delay:3s}
      .m04{animation:m04 30s ease-in infinite;animation-delay:11s}
      /* ===== 科技感对话框（总周期 60s，含首尾 15s 间隔） ===== */
      @keyframes b1 {0%,23%{opacity:0}25%{opacity:1}36%{opacity:1}38%{opacity:0}100%{opacity:0}}
      @keyframes b2 {0%,28%{opacity:0}30%{opacity:1}36%{opacity:1}38%{opacity:0}100%{opacity:0}}
      @keyframes b3 {0%,41%{opacity:0}43%{opacity:1}55%{opacity:1}57%{opacity:0}100%{opacity:0}}
      @keyframes b4 {0%,46%{opacity:0}48%{opacity:1}55%{opacity:1}57%{opacity:0}100%{opacity:0}}
      @keyframes b5 {0%,60%{opacity:0}62%{opacity:1}73%{opacity:1}75%{opacity:0}100%{opacity:0}}
      @keyframes b6 {0%,65%{opacity:0}67%{opacity:1}73%{opacity:1}75%{opacity:0}100%{opacity:0}}
      @keyframes b7 {0%,78%{opacity:0}80%{opacity:1}91%{opacity:1}93%{opacity:0}100%{opacity:0}}
      @keyframes b8 {0%,83%{opacity:0}85%{opacity:1}91%{opacity:1}93%{opacity:0}100%{opacity:0}}
      @keyframes blink {0%,49%{opacity:1}50%,100%{opacity:0}}
      .b1{animation:b1 60s ease-in-out infinite}
      .b2{animation:b2 60s ease-in-out infinite}
      .b3{animation:b3 60s ease-in-out infinite}
      .b4{animation:b4 60s ease-in-out infinite}
      .b5{animation:b5 60s ease-in-out infinite}
      .b6{animation:b6 60s ease-in-out infinite}
      .b7{animation:b7 60s ease-in-out infinite}
      .b8{animation:b8 60s ease-in-out infinite}
      .cur{animation:blink 0.6s step-end infinite}
    </style>
    <!-- 粒子拖尾渐变（向左飘移的线条渐变） -->
    <linearGradient id="g01" x1="0" y1="0" x2="5" y2="-23" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#D6E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#D6E8FF" stop-opacity="0"/></linearGradient>
