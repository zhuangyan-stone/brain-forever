    <linearGradient id="tail1" x1="0" y1="0" x2="0" y2="-40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#D6E8FF" stop-opacity="0.9"/><stop offset="100%" stop-color="#D6E8FF" stop-opacity="0"/></linearGradient>
    <linearGradient id="tail2" x1="0" y1="0" x2="0" y2="-30" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#D6E8FF" stop-opacity="0.8"/><stop offset="100%" stop-color="#D6E8FF" stop-opacity="0"/></linearGradient>
    <!-- 斜向流星拖尾渐变 -->
    <linearGradient id="tailM1" x1="0" y1="0" x2="-35" y2="-25" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#D6E8FF" stop-opacity="0.9"/><stop offset="100%" stop-color="#D6E8FF" stop-opacity="0"/></linearGradient>
    <linearGradient id="tailM4" x1="0" y1="0" x2="-33" y2="-23" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#D6E8FF" stop-opacity="0.75"/><stop offset="100%" stop-color="#D6E8FF" stop-opacity="0"/></linearGradient>
