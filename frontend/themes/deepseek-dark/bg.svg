      <circle cx="0" cy="0" r="1.5" opacity="0" class="m04"/>
    </g>
  </g>

  <!-- ========== 科技感对话框（星群流动区域内，60s循环） ========== -->
  <g font-family="'Courier New',monospace" font-size="13" fill="#D6E8FF">
    <!-- ===== 第1组：15s→23s ===== -->
    <g class="b1">
