  <!-- ========== 流星组：从 X 轴中心垂直下落 ========== -->
  <g fill="#D6E8FF">
    <!-- 流星1（带尾·快速）：起始于 X=720, Y=150（与其他星星 Y 坐标相近） -->
      <g transform="translate(720,150)">
        <line x1="0" y1="0" x2="0" y2="-40" stroke="url(#tail1)" stroke-width="1.2" stroke-linecap="round" opacity="0" class="f01"/>
        <circle cx="0" cy="0" r="1.5" opacity="0" class="f01"/>
