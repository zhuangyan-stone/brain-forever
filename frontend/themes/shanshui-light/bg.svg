<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <style>
    @keyframes birdDrift1 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(12px, -4px); }
      50% { transform: translate(24px, 0px); }
      75% { transform: translate(12px, 3px); }
    }
    @keyframes birdDrift2 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(-10px, -3px); }
      50% { transform: translate(-20px, 0px); }
      75% { transform: translate(-10px, 2px); }
    }
    @keyframes birdDrift3 {
      0%, 100% { transform: translate(0px, 0px); }
      33% { transform: translate(8px, -2px); }
      66% { transform: translate(16px, 1px); }
    }
    .bird-1 { animation: birdDrift1 6s ease-in-out infinite; }
    .bird-2 { animation: birdDrift2 7s ease-in-out infinite; }
    .bird-3 { animation: birdDrift3 5s ease-in-out infinite; }
  </style>
  <!-- 远山 — 清墨（极淡） -->
  <path d="M0,480 C120,400 200,420 320,380 C400,360 460,380 540,350 
           C620,320 700,360 800,340 C880,320 960,350 1040,330 
           C1120,310 1200,340 1320,320 C1380,310 1440,330 1440,330 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.04"/>
  <!-- 远山二 — 淡墨 -->
  <path d="M0,460 C140,380 240,400 360,360 C440,340 500,360 580,330 
           C660,300 740,340 840,320 C920,300 1000,330 1080,310 
           C1160,290 1240,320 1360,300 C1420,290 1440,310 1440,310 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.025"/>
  <!-- 中景山 — 淡墨（稍浓） -->
  <path d="M0,550 C100,480 180,500 280,460 C360,440 420,460 500,430 
           C580,400 660,440 760,420 C840,400 920,430 1000,410 
           C1080,390 1160,420 1260,400 C1340,390 1440,420 1440,420 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.07"/>
  <!-- 中景山二 — 重墨 -->
  <path d="M0,530 C120,450 220,470 340,430 C420,410 480,430 560,400 
           C640,370 720,410 820,390 C900,370 980,400 1060,380 
           C1140,360 1220,390 1340,370 C1400,360 1440,380 1440,380 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.05"/>
  <!-- 近景山/岸 — 浓墨 -->
  <path d="M0,650 C80,600 160,620 240,580 C320,560 400,600 500,570 
           C600,540 700,580 800,560 C880,540 960,570 1040,550 
           C1120,530 1200,560 1320,540 C1380,530 1440,550 1440,550 
           L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.12"/>
  <!-- 最近岸 — 焦墨 -->
  <path d="M0,750 C100,700 200,720 300,680 C400,660 500,700 600,670 
           C700,640 800,680 900,660 C1000,640 1100,670 1200,650 
           C1300,630 1400,660 1440,640 L1440,900 L0,900 Z" 
        fill="#000000" opacity="0.08"/>
  <!-- 极淡墨晕 — 似远峰余韵 -->
  <path d="M1100,280 C1120,250 1160,240 1180,260 C1200,280 1160,300 1140,290 
           C1120,280 1100,290 1100,280 Z" 
        fill="#000000" opacity="0.02"/>
  <!-- 飞鸟 — 焦墨点笔 -->
  <g class="bird-1">
    <path fill="none" stroke="#000000" stroke-width="1.2" opacity="0.15">
      <animate attributeName="d" dur="2.5s" repeatCount="indefinite"
        values="M850,220 Q860,210 870,220 Q880,210 890,220;
                M850,220 Q860,220 870,220 Q880,220 890,220;
                M850,220 Q860,210 870,220 Q880,210 890,220"/>
    </path>
  </g>
  <g class="bird-2">
    <path fill="none" stroke="#000000" stroke-width="1.2" opacity="0.12">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="M1050,180 Q1060,170 1070,180 Q1080,170 1090,180;
                M1050,180 Q1060,180 1070,180 Q1080,180 1090,180;
                M1050,180 Q1060,170 1070,180 Q1080,170 1090,180"/>
    </path>
  </g>
  <g class="bird-4">
    <path fill="none" stroke="#000000" stroke-width="1.2" opacity="0.10">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="M780,250 Q790,240 800,250;
                M780,250 Q790,250 800,250;
                M780,250 Q790,240 800,250"/>
    </path>
  </g>
  <g class="bird-3">
    <path fill="none" stroke="#000000" stroke-width="1" opacity="0.08">
      <animate attributeName="d" dur="2.5s" repeatCount="indefinite"
        values="M920,200 Q930,192 940,200 Q950,192 960,200;
                M920,200 Q930,200 940,200 Q950,200 960,200;
                M920,200 Q930,192 940,200 Q950,192 960,200"/>
    </path>
  </g>
</svg>
