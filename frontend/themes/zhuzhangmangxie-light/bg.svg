<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <defs>
    <!-- 闃冲厜鍏夋枒鍙戝厜婊ら暅 -->
    <filter id="sun-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 绔瑰瓙缁勪欢 v1锛氬彾绋嶄笂浠?-->
    <g id="bamboo">
      <rect x="-3" y="0" width="6" height="300" rx="2" fill="#5C9E5C" opacity="0.15"/>
      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <g transform="rotate(6, 3, 30)">
        <path d="M3,30 Q22,20 42,28 Q22,36 3,30" fill="#70B070" opacity="0.13"/>
      </g>
      <g transform="rotate(-10, -3, 80)">
        <path d="M-3,80 Q-22,70 -42,78 Q-22,86 -3,80" fill="#70B070" opacity="0.11"/>
      </g>
      <g transform="rotate(-4, 3, 140)">
        <path d="M3,140 Q22,130 42,138 Q22,146 3,140" fill="#70B070" opacity="0.13"/>
      </g>
      <g transform="rotate(8, -3, 200)">
        <path d="M-3,200 Q-22,190 -42,198 Q-22,206 -3,200" fill="#70B070" opacity="0.11"/>
      </g>
    </g>

    <!-- 绔瑰瓙缁勪欢 v2锛氬彾绋嶄笅鍨?-->
    <g id="bamboo2">
      <rect x="-3" y="0" width="6" height="300" rx="2" fill="#5C9E5C" opacity="0.15"/>
      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <g transform="rotate(-5, 3, 30)">
        <path d="M3,30 Q22,20 42,28 Q22,36 3,30" fill="#70B070" opacity="0.13"/>
      </g>
      <g transform="rotate(8, -3, 80)">
        <path d="M-3,80 Q-22,70 -42,78 Q-22,86 -3,80" fill="#70B070" opacity="0.11"/>
      </g>
      <g transform="rotate(7, 3, 140)">
        <path d="M3,140 Q22,130 42,138 Q22,146 3,140" fill="#70B070" opacity="0.13"/>
      </g>
      <g transform="rotate(-6, -3, 200)">
        <path d="M-3,200 Q-22,190 -42,198 Q-22,206 -3,200" fill="#70B070" opacity="0.11"/>
      </g>
    </g>

    <!-- 绔瑰瓙缁勪欢 v3锛氬彾绋嶅ぇ瑙掑害 -->
    <g id="bamboo3">
      <rect x="-3" y="0" width="6" height="300" rx="2" fill="#5C9E5C" opacity="0.15"/>
      <rect x="-4" y="40" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="100" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="160" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="220" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <rect x="-4" y="280" width="8" height="2" rx="1" fill="#7E9A74" opacity="0.12"/>
      <g transform="rotate(12, 3, 30)">
        <path d="M3,30 Q22,20 42,28 Q22,36 3,30" fill="#70B070" opacity="0.13"/>
      </g>
      <g transform="rotate(-15, -3, 80)">
        <path d="M-3,80 Q-22,70 -42,78 Q-22,86 -3,80" fill="#70B070" opacity="0.11"/>
      </g>
      <g transform="rotate(10, 3, 140)">
        <path d="M3,140 Q22,130 42,138 Q22,146 3,140" fill="#70B070" opacity="0.13"/>
      </g>
      <g transform="rotate(-12, -3, 200)">
        <path d="M-3,200 Q-22,190 -42,198 Q-22,206 -3,200" fill="#70B070" opacity="0.11"/>
      </g>
    </g>
  </defs>

  <!-- 棰樿瘝锛氳嫃杞笺€婂畾椋庢尝銆嬪乏涓婅 -->
  <g font-family="'FangSong', 'KaiTi', 'STKaiti', 'SimSun', 'Noto Serif SC', serif" fill="#5C9E5C" opacity="0.28">
    <!-- 绗竴琛岋細鑾惉绌挎灄鎵撳彾澹?-->
    <text x="34" y="216" font-size="38">鑾?/text>
    <text x="76" y="206" font-size="22">鍚?/text>
    <text x="100" y="204" font-size="32">绌?/text>
    <text x="126" y="222" font-size="48">鏋?/text>
    <text x="174" y="216" font-size="28">鎵?/text>
    <text x="194" y="214" font-size="20">鍙?/text>
    <text x="218" y="216" font-size="32">澹?/text>
    <!-- 绗簩琛岋細浣曞Θ鍚熷暩涓斿緪琛?-->
    <text x="34" y="248" font-size="28">浣?/text>
    <text x="60" y="245" font-size="34">濡?/text>
    <text x="94" y="238" font-size="26">鍚?/text>
    <text x="116" y="256" font-size="28">鍟?/text>
    <text x="150" y="248" font-size="30">涓?/text>
    <text x="180" y="251" font-size="48">寰?/text>
    <text x="226" y="251" font-size="22">琛?/text>
  </g>

  <!-- 绔规灄锛氱枏鐤忚惤钀斤紝杩滆繎浜ら敊 -->
  <g>
    <!-- 杩戜笡锛堝乏渚э紝杈冨ぇ锛夆€斺€?寰杞绘憜 -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-0.6, 106, 890; 0.6, 106, 890; -0.6, 106, 890"
        dur="3.5s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
        keyTimes="0; 0.5; 1"/>
      <use href="#bamboo" x="46" y="540" transform="scale(1.3)" />
      <use href="#bamboo2" x="106" y="560" transform="scale(1.1)" />
      <use href="#bamboo3" x="166" y="580" transform="scale(1.15)" />
    </g>

    <!-- 鏇磋繙澶?-->
    <use href="#bamboo" x="3400" y="660" transform="scale(0.4)" />
    <use href="#bamboo2" x="3800" y="640" transform="scale(0.35)" />
    <use href="#bamboo3" x="4250" y="680" transform="scale(0.3)" />
  </g>


  <!-- 闃冲厜鍏夋枒锛氱┛杩囩鍙剁紳闅欑殑浜偣锛屽甫鍙戝厜鏁堟灉锛屽ぇ灏忚剦鍔?-->
  <g opacity="0.85" filter="url(#sun-glow)">
    <circle cx="84" cy="710" r="5" fill="#FFFFFF">
      <animate attributeName="r" values="5; 6.5; 5" dur="4s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
    </circle>
    <circle cx="134" cy="680" r="3.5" fill="#FFFFFF">
      <animate attributeName="r" values="3.5; 2; 3.5" dur="3s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
    </circle>
    <circle cx="64" cy="760" r="4" fill="#FFFFFF">
      <animate attributeName="r" values="4; 5.5; 4" dur="5s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
    </circle>
    <circle cx="184" cy="730" r="2.5" fill="#FFFFFF">
      <animate attributeName="r" values="2.5; 1.5; 2.5" dur="3.5s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
    </circle>

    <circle cx="284" cy="750" r="3" fill="#FFFFFF">
      <animate attributeName="r" values="3; 4.5; 3" dur="4.5s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
    </circle>
    <circle cx="354" cy="780" r="2" fill="#FFFFFF">
      <animate attributeName="r" values="2; 3; 2" dur="3s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0; 0.5; 1"/>
    </circle>
  </g>
</svg>
