<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- author: d2school -->
  <!-- 暮色烟紫 — 天青染紫的夜 -->
  <g fill="none" stroke="#7A6D90" stroke-linecap="round">
    <!-- 暮山沉影，染紫 — 呼吸起伏 -->
    <path d="M0,480 C200,400 350,460 500,380 C650,300 800,430 1000,360 C1200,290 1400,400 1440,380 L1440,900 L0,900 Z"
          fill="#6A5A8A" opacity="0.12" stroke="none">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="
          M0,480 C200,400 350,460 500,380 C650,300 800,430 1000,360 C1200,290 1400,400 1440,380 L1440,900 L0,900 Z;
          M0,480 C200,385 350,445 500,365 C650,285 800,415 1000,345 C1200,275 1400,385 1440,380 L1440,900 L0,900 Z;
          M0,480 C200,400 350,460 500,380 C650,300 800,430 1000,360 C1200,290 1400,400 1440,380 L1440,900 L0,900 Z
        "
        keyTimes="0; 0.667; 1"/>
    </path>
    <path d="M0,560 C300,500 500,540 700,480 C900,420 1100,520 1440,480 L1440,900 L0,900 Z"
          fill="#4A3A6A" opacity="0.07" stroke="none"/>
    
    <!-- 暮云含紫 -->
    <path d="M200,300 Q300,270 400,300 Q500,330 600,300 Q700,270 800,300" 
          stroke-width="2" opacity="0.12"/>
    <path d="M600,260 Q700,230 800,250 Q900,270 1000,250 Q1100,230 1200,250" 
          stroke-width="1.5" opacity="0.08"/>
    
    <!-- 雨丝，暮色中微紫 -->
    <g opacity="0.08" stroke-width="0.5">
      <line x1="150" y1="0" x2="140" y2="120"/>
      <line x1="220" y1="0" x2="210" y2="90"/>
      <line x1="380" y1="0" x2="370" y2="130"/>
      <line x1="550" y1="0" x2="540" y2="100"/>
      <line x1="720" y1="0" x2="710" y2="110"/>
      <line x1="880" y1="0" x2="870" y2="80"/>
      <line x1="1050" y1="0" x2="1040" y2="120"/>
      <line x1="1200" y1="0" x2="1190" y2="70"/>
      <line x1="1350" y1="0" x2="1340" y2="95"/>
      <line x1="300" y1="0" x2="290" y2="65"/>
      <line x1="960" y1="0" x2="950" y2="85"/>
    </g>
  </g>
</svg>