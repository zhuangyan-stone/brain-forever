<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>登录 - 第2大脑 AI 助手</title>
    <link rel="icon" type="image/svg+xml" href="/static/brain-forever.svg">

    <!-- 防主题闪烁：CSS 渲染前从 localStorage 读取主题 -->
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('brainforever_settings');
                if (raw) {
                    var settings = JSON.parse(raw);
                    var theme = settings.theme;
                    var themeStr;
                    if (theme >= 2) {
                        // theme=2(系统亮) 或 3(系统暗)，跟随系统
                        themeStr = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    } else {
                        themeStr = theme === 1 ? 'dark' : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', themeStr);
                    console.log('[theme] init theme:', theme);
                } else {
                    // 无已保存的设置时，默认跟随系统
                    var themeStr = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', themeStr);
                    console.log('[theme] init theme: none (follow system)');
                }
            } catch (e) {
                console.log('[theme] init theme: error reading settings');
            }
        })();
    </script>

    <!-- 主题变量 + 公共样式 -->
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="/static/signin.css">
</head>
<body>
    <div class="signin-page">
        <!-- 主题切换按钮（右上角） -->
        <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" title="切换亮/暗主题">
            <svg id="themeIconSvg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <!-- 内容由 updateThemeIcon() 根据当前主题动态填充 -->
            </svg>
        </button>

        <!-- 登录卡片 -->
        <div class="signin-card">
            <!-- Logo + 品牌 -->
            <div class="signin-brand">
                <div class="signin-logo-circle">
                    <img class="signin-logo" src="/static/brain-forever.svg" alt="第2大脑" width="56" height="56">
                </div>
                <div class="signin-brand-name">第2大脑</div>
            </div>

            <!-- 口号 -->
            <div class="signin-tagline">我们会永远活着</div>

            <!-- 手机号输入 -->
            <div class="signin-field">
                <div class="phone-input-wrap">
                    <span class="phone-prefix">+86</span>
                    <input class="signin-input phone-input" id="phoneInput" type="tel" maxlength="11"
                        placeholder="请输入手机号" autocomplete="tel">
                </div>
            </div>

            <!-- 验证码输入 -->
            <div class="signin-field signin-code-field">
                <input class="signin-input code-input" id="codeInput" type="text" maxlength="6"
                    placeholder="请输入验证码" inputmode="numeric" autocomplete="one-time-code">
                <button class="code-send-btn" id="codeSendBtn" onclick="onSendCode()">发送验证码</button>
            </div>

            <!-- 图形验证码弹层 -->
            <div class="captcha-overlay" id="captchaOverlay">
                <div class="captcha-box">
                    <div class="captcha-header">
                        <span>安全验证</span>
                        <button class="captcha-close-btn" onclick="closeCaptcha()">&times;</button>
                    </div>
                    <div class="captcha-body">
                        <p class="captcha-question" id="captchaQuestion">请点击图片中的目标位置</p>
                        <div class="captcha-img-wrap">
                            <img class="captcha-img" id="captchaImg" src="" alt="验证码">
                        </div>
                        <button class="captcha-reload-btn" style="margin-top: 1px; margin-bottom: -1px;" onclick="reloadCaptcha()">换一张</button>
                    </div>
                </div>
            </div>

            <!-- 协议小字 -->
            <div class="signin-agreement">
                登录即代表已阅读并同意我们的
                <a href="/terms" target="_blank" class="agreement-link">用户协议</a>
                与
                <a href="/privacy" target="_blank" class="agreement-link">隐私政策</a>
                ，未注册的用户将自动注册。
            </div>

            <!-- 登录按钮 -->
            <button class="signin-login-btn" id="loginBtn" onclick="onLogin()">登录</button>
        </div>

        <!-- 底部信息 -->
        <div class="signin-footer">
            中国 · 厦门程知信息 · 第2学堂（d2school）作品<br>
            闽ICP备xxxxx号
        </div>
    </div>

    <!-- Toast 消息容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // 主题切换（与 index.html 共用 localStorage key）
        // ============================================================
        // SVG path 常量：月亮（暗色主题）
        var ICON_MOON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        // SVG path 常量：太阳（亮色主题）
        var ICON_SUN_PATH =
            '<circle cx="12" cy="12" r="5"/>' +
            '<line x1="12" y1="1" x2="12" y2="3"/>' +
            '<line x1="12" y1="21" x2="12" y2="23"/>' +
            '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>' +
            '<line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>' +
            '<line x1="1" y1="12" x2="3" y2="12"/>' +
            '<line x1="21" y1="12" x2="23" y2="12"/>' +
            '<line x1="4.22" y1="19.78" x2="5.64" y2="18.32"/>' +
            '<line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

        function getCurrentTheme() {
            // 直接从 data-theme 属性读取当前实际主题，避免 localStorage 中 theme=2（跟随系统）
            // 时与 data-theme 实际值不一致导致切换失效
            return document.documentElement.getAttribute('data-theme') || 'light';
        }

        function setTheme(mode) {
            document.documentElement.setAttribute('data-theme', mode);
            try {
                var raw = localStorage.getItem('brainforever_settings');
                var settings = raw ? JSON.parse(raw) : {};
                // 保留 bit 1（是否跟随系统），只改 bit 0（亮暗）
                // 注意：无已保存设置时（settings.theme === undefined），默认视为跟随系统（base=2）
                var base = (!settings || settings.theme === undefined || settings.theme >= 2) ? 2 : 0;
                settings.theme = base + (mode === 'dark' ? 1 : 0);
                localStorage.setItem('brainforever_settings', JSON.stringify(settings));
                console.log('[theme] theme:', settings.theme);
            } catch(e) {
                console.log('[theme] theme: fallback', mode === 'dark' ? 1 : 0);
            }
            updateThemeIcon(mode);
        }

        function toggleTheme() {
            var current = getCurrentTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        function updateThemeIcon(mode) {
            // 更新按钮的 title
            var btn = document.getElementById('themeToggle');
            if (btn) {
                btn.title = mode === 'dark' ? '切换到亮色主题' : '切换到暗色主题';
            }
            // 更新 SVG 图标：亮色→太阳，暗色→月亮
            var svg = document.getElementById('themeIconSvg');
            if (svg) {
                svg.innerHTML = mode === 'dark' ? ICON_MOON_PATH : ICON_SUN_PATH;
            }
        }

        // 初始化主题图标
        updateThemeIcon(getCurrentTheme());

        // 监听系统主题变化（跟随系统模式下自动切换）
        (function() {
            var darkMq = window.matchMedia('(prefers-color-scheme: dark)');
            darkMq.addEventListener('change', function(e) {
                try {
                    var raw = localStorage.getItem('brainforever_settings');
                    var shouldFollow = true;
                    var currentTheme;
                    if (raw) {
                        var s = JSON.parse(raw);
                        currentTheme = s.theme;
                        if (s.theme < 2) {
                            shouldFollow = false; // 手动模式（0/1），不自动跟随系统
                        }
                    }
                    if (shouldFollow) {
                        var mode = e.matches ? 'dark' : 'light';
                        document.documentElement.setAttribute('data-theme', mode);
                        updateThemeIcon(mode);
                        console.log('[theme] system change — follow system, mode:', mode);
                    } else {
                        console.log('[theme] system change — ignored (manual mode', currentTheme, ')');
                    }
                } catch(e) {
                    console.log('[theme] system change — error reading settings');
                }
            });
        })();

        // ============================================================
        // Toast 消息
        // ============================================================
        function showToast(message, type, duration) {
            if (!type) type = 'error';
            if (!duration) duration = 4000;
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);

            // 触发进入动画
            requestAnimationFrame(function() {
                toast.classList.add('toast-visible');
            });

            setTimeout(function() {
                toast.classList.remove('toast-visible');
                setTimeout(function() {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 300);
            }, duration);
        }

        // ============================================================
        // 发送验证码
        // ============================================================
        var sendCodeTimer = null;
        var sendCodeCountdown = 0;

        // ============================================================
        // 图形验证码状态
        // ============================================================
        var captchaAction = 'login';
        var captchaPhone = ''; // 打开验证码时的手机号
        var captchaPendingResolve = null; // 用于 Promise 回调
        var captchaClickX = null;  // 用户点击坐标 X（映射到原始尺寸）
        var captchaClickY = null;  // 用户点击坐标 Y（映射到原始尺寸）
        var captchaImgName = '';   // 当前验证码图片名
        var captchaQuestionCn = ''; // 当前中文问题

        function openCaptcha() {
            var overlay = document.getElementById('captchaOverlay');
            overlay.classList.add('show');
            // 重置点击状态
            captchaClickX = null;
            captchaClickY = null;
            captchaImgName = '';
            // 加载验证码图片
            fetchCaptchaImage();
        }

        function closeCaptcha() {
            var overlay = document.getElementById('captchaOverlay');
            overlay.classList.remove('show');
            if (captchaPendingResolve) {
                captchaPendingResolve(false);
                captchaPendingResolve = null;
            }
        }

        function fetchCaptchaImage() {
            var img = document.getElementById('captchaImg');
            var questionEl = document.getElementById('captchaQuestion');
            // 清除点击标记和验证状态
            removeClickMarker();
            img.classList.remove('captcha-verifying');
            // 添加 loading 状态：隐藏图片占位区，防止误点击
            img.classList.add('captcha-loading');
            captchaClickX = null;
            captchaClickY = null;
            captchaImgName = '';
            // 恢复默认提示文本
            questionEl.textContent = '请点击图片中的目标位置';

            fetch('/api/verify/captcha?action=' + captchaAction)
                .then(function(resp) {
                    if (resp.ok) {
                        return resp.json();
                    }
                    throw new Error('获取验证码失败');
                })
                .then(function(data) {
                    if (data.src) {
                        // 新响应格式：{ src, action, q_cn, q_en }
                        captchaImgName = data.src;
                        captchaQuestionCn = data.q_cn || '';
                        // 优先显示中文问题
                        if (captchaQuestionCn) {
                            questionEl.textContent = captchaQuestionCn;
                        }
                        // 先绑定 onload，等图片加载完成再移除 loading 状态
                        img.onload = function() {
                            img.classList.remove('captcha-loading');
                            img.onload = null;
                            img.onerror = null;
                        };
                        img.onerror = function() {
                            img.classList.remove('captcha-loading');
                            img.onload = null;
                            img.onerror = null;
                            showToast('图片加载失败，请点击换一张重试', 'error');
                        };
                        // 给图片 URL 添加时间戳防缓存
                        img.src = data.src + '?t=' + Date.now();
                    } else {
                        img.classList.remove('captcha-loading');
                        showToast('获取验证码失败，请重试', 'error');
                    }
                })
                .catch(function() {
                    img.classList.remove('captcha-loading');
                    showToast('网络错误，请稍后重试', 'error');
                });
        }

        function reloadCaptcha() {
            fetchCaptchaImage();
        }

        // 移除点击标记
        function removeClickMarker() {
            var old = document.querySelector('.captcha-click-marker');
            if (old) old.remove();
        }

        // 图片点击处理 — 捕获点击坐标 → 映射到原始尺寸 → 直接触发验证
        function setupCaptchaClick() {
            var img = document.getElementById('captchaImg');
            img.addEventListener('click', function(e) {
                // 图片未加载完成或正在验证中，忽略点击
                if (!this.complete || this.naturalWidth === 0) return;
                if (this.classList.contains('captcha-verifying')) return;
                if (this.classList.contains('captcha-loading')) return;

                var rect = this.getBoundingClientRect();
                var clickX = e.clientX - rect.left;   // 显示区域坐标
                var clickY = e.clientY - rect.top;

                // 映射到原始图片尺寸
                var mappedX = Math.round((clickX / this.clientWidth)  * this.naturalWidth);
                var mappedY = Math.round((clickY / this.clientHeight) * this.naturalHeight);

                // 显示点击标记（视觉反馈）
                removeClickMarker();
                var wrap = this.parentElement;
                var marker = document.createElement('div');
                marker.className = 'captcha-click-marker';
                marker.style.left = clickX + 'px';
                marker.style.top  = clickY + 'px';
                wrap.appendChild(marker);

                // 立即调用验证 + 发短信接口
                this.classList.add('captcha-verifying');
                doCaptchaVerify(mappedX, mappedY);
            });
        }
        // DOM 加载完成后绑定点击事件
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupCaptchaClick);
        } else {
            setupCaptchaClick();
        }

        // 返回一个 Promise，用户确认 captcha 后 resolve(true)，取消则 resolve(false)
        function waitForCaptcha(action) {
            captchaAction = action || 'login';
            return new Promise(function(resolve) {
                captchaPendingResolve = resolve;
                openCaptcha();
            });
        }

        // 点击图片后直接调用发短信接口（带上点击坐标）
        function doCaptchaVerify(clickX, clickY) {
            var phone = captchaPhone;
            if (!phone) {
                showToast('请先输入手机号', 'error');
                return;
            }

            fetch('/api/verify/sms?tel=' + encodeURIComponent(phone) +
                  '&action=' + encodeURIComponent(captchaAction) +
                  '&img_name=' + encodeURIComponent(captchaImgName) +
                  '&click_x=' + clickX +
                  '&click_y=' + clickY)
            .then(function(resp) {
                if (resp.ok) {
                    // 图形验证码正确 & 短信验证码已生成（或发送）
                    // 注意：必须在 closeCaptcha() 之前 resolve Promise，
                    // 因为 closeCaptcha 会 resolve(false) 并清空 captchaPendingResolve
                    if (captchaPendingResolve) {
                        captchaPendingResolve(true);
                        captchaPendingResolve = null;
                    }
                    closeCaptcha();
                } else if (resp.status === 401) {
                    // 图形验证码过期或位置错误 → 自动换一张
                    resp.text().then(function(text) {
                        showToast(text || '图形校验码错误，请重试', 'error');
                    });
                    fetchCaptchaImage();
                } else {
                    // 其他错误（如短信发送失败）→ 自动换一张
                    resp.text().then(function(text) {
                        showToast(text || '验证失败，请重试', 'error');
                    });
                    fetchCaptchaImage();
                }
            })
            .catch(function() {
                showToast('网络错误，请稍后重试', 'error');
                // 网络错误也刷新，让用户重试
                fetchCaptchaImage();
            });
        }

        function onSendCode() {
            var phone = document.getElementById('phoneInput').value.trim();
            if (!/^1\d{10}$/.test(phone)) {
                showToast('请输入正确的11位手机号', 'error');
                return;
            }

            var btn = document.getElementById('codeSendBtn');
            btn.disabled = true;

            // 存储手机号，供 confirmCaptcha 使用
            captchaPhone = phone;

            // 弹出图形验证码，确认后直接调用发短信接口（含图形验证码）
            waitForCaptcha('login').then(function(ok) {
                if (!ok) {
                    // 用户取消了验证码
                    btn.disabled = false;
                    return;
                }

                // 图形验证码已验证且短信已发送 → 显示成功并开始倒计时
                showToast('已向指定手机发送验证码，请查收并及时登录', 'success');
                startCodeCountdown(60);
            });
        }

        function startCodeCountdown(seconds) {
            var btn = document.getElementById('codeSendBtn');
            sendCodeCountdown = seconds;
            btn.textContent = sendCodeCountdown + 's 后重发';
            btn.disabled = true;

            if (sendCodeTimer) clearInterval(sendCodeTimer);
            sendCodeTimer = setInterval(function() {
                sendCodeCountdown--;
                if (sendCodeCountdown <= 0) {
                    clearInterval(sendCodeTimer);
                    sendCodeTimer = null;
                    btn.textContent = '重新发送';
                    btn.disabled = false;
                } else {
                    btn.textContent = sendCodeCountdown + 's 后重发';
                }
            }, 1000);
        }

        // ============================================================
        // 登录（手机号 + 验证码）
        // ============================================================
        async function onLogin() {
            var phone = document.getElementById('phoneInput').value.trim();
            var code = document.getElementById('codeInput').value.trim();

            if (!/^1\d{10}$/.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }
            if (!/^\d{4,6}$/.test(code)) {
                showToast('请输入正确的验证码', 'error');
                return;
            }

            var btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中…';

            try {
                var response = await fetch('/api/user/login/sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify({
                        tel: phone,
                        code: code,
                    }),
                });

                if (response.ok) {
                    var data = await response.json();
                    // 持久化用户信息
                    if (data.user_sn) {
                        localStorage.setItem('brainforever_user_no', data.user_sn);
                    }
                    if (data.avatar) {
                        localStorage.setItem('brainforever_user_avatar', data.avatar);
                    }
                    // 主题同步：持久化 sync 标记
                    if (data.theme && data.theme.sync) {
                        if (data.theme.light) {
                            localStorage.setItem('brainforever_theme_light', data.theme.light);
                        }
                        if (data.theme.dark) {
                            localStorage.setItem('brainforever_theme_dark', data.theme.dark);
                        }
                        // 映射 active 到数字：light→0, dark→1, system→2 或 3
                        var themeNum = 0;
                        if (data.theme.active === 'dark') {
                            themeNum = 1;
                        } else if (data.theme.active === 'system') {
                            // bit 1 置 1（跟随系统），bit 0 根据当前系统偏好
                            themeNum = 2 + (window.matchMedia('(prefers-color-scheme: dark)').matches ? 1 : 0);
                        }
                        try {
                            var raw = localStorage.getItem('brainforever_settings');
                            var settings = raw ? JSON.parse(raw) : {};
                            settings.theme = themeNum;
                            settings.themeSync = true; // 持久化同步标记
                            localStorage.setItem('brainforever_settings', JSON.stringify(settings));
                        } catch(e) {}
                        // 立即应用主题到当前页面（避免跳转后闪烁）
                        var themeStr = themeNum >= 2
                            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                            : (themeNum === 1 ? 'dark' : 'light');
                        document.documentElement.setAttribute('data-theme', themeStr);
                        // 同步外源主题 CSS
                        var link = document.querySelector('link[href^="/themes/"]');
                        if (!link) {
                            link = document.createElement('link');
                            link.rel = 'stylesheet';
                            link.id = 'external-theme-css';
                            document.head.appendChild(link);
                        }
                        link.href = '/themes/' + encodeURIComponent(themeStr === 'dark' ? data.theme.dark : data.theme.light) + '/theme.css';
                    } else if (data.theme) {
                        // 有 theme 但 sync=false：显式清除同步标记
                        try {
                            var raw = localStorage.getItem('brainforever_settings');
                            var settings = raw ? JSON.parse(raw) : {};
                            settings.themeSync = false;
                            localStorage.setItem('brainforever_settings', JSON.stringify(settings));
                        } catch(e) {}
                    }
                    // 跳转到首页
                    window.location.href = '/';
                } else {
                    // 读取后端返回的错误消息并显示
                    var errorText = '';
                    try {
                        errorText = await response.text();
                    } catch(e) {}
                    if (response.status === 401) {
                        showToast(errorText || '验证码错误', 'error');
                    } else if (response.status === 400) {
                        showToast(errorText || '参数错误', 'error');
                    } else {
                        showToast(errorText || '登录失败', 'error');
                    }
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (e) {
                showToast('网络错误，请稍后重试', 'error');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        // ============================================================
        // Enter 键触发登录
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            var codeInput = document.getElementById('codeInput');
            codeInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onLogin();
                }
            });
            var phoneInput = document.getElementById('phoneInput');
            phoneInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('codeInput').focus();
                }
            });
        });
    </script>
</body>
</html>
