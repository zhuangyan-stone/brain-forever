<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第2大脑 AI 助手</title>
    <link rel="icon" type="image/svg+xml" href="/static/brain-forever.svg">
    <!-- 防主题闪烁：在 CSS 渲染前从 localStorage 读取主题并设置 data-theme -->
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('brainforever_settings');
                if (raw) {
                    var settings = JSON.parse(raw);
                    var theme = settings.theme;
                    var themeStr;
                    if (theme === 2) {
                        themeStr = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    } else {
                        themeStr = theme === 1 ? 'dark' : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', themeStr);
                }
            } catch (e) { }
        })();
    </script>
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/input.css">
    <link rel="stylesheet" href="/static/reasoning.css">
    <link rel="stylesheet" href="/static/message.css">
    <link rel="stylesheet" href="/static/components/swipe-pager.css">
    <link rel="stylesheet" href="/static/components/sources-panel.css">
    <link rel="stylesheet" href="/static/dialogs/dialog.css">
    <link rel="stylesheet" href="/static/dialogs/msg-delete-dialog.css">
    <link rel="stylesheet" href="/static/dialogs/title-edit-dialog.css">
    <link rel="stylesheet" href="/static/components/msgbox.css">
    <link rel="stylesheet" href="/static/responsive.css">
    <link rel="stylesheet" href="/static/components/toast.css">
    <link rel="stylesheet" href="/static/components/buttons.css">
    <link rel="stylesheet" href="/static/components/tick.css">
    <link rel="stylesheet" href="/static/components/tooltip.css">
    <link rel="stylesheet" href="/static/components/sticky-ai-title.css">
    <link rel="stylesheet" href="/static/chat-list.css">
    <!-- highlight.js — 代码语法高亮（暗色主题） -->
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/atom-one-dark.min.css" id="hljs-theme-dark" disabled>
    <!-- highlight.js — 代码语法高亮（亮色主题，默认） -->
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/atom-one-light.min.css" id="hljs-theme-light">
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js -->
    <script src="/static/lib/highlight.min.js"></script>
    <!-- highlight.js 额外语言包: dos (cmd), powershell -->
    <script src="/static/lib/dos.min.js"></script>
    <script src="/static/lib/powershell.min.js"></script>
    <!-- remarkable.js — Markdown 渲染（替代 marked） -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/remarkable/dist/remarkable.min.js -->
    <script src="/static/lib/remarkable.min.js"></script>
    <!-- KaTeX — 数学公式渲染 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/katex.min.css">
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
    <!-- KaTeX 集成由 chat-markdown.js 中的 remarkableKatex 插件处理（不再需要 marked-katex-extension） -->
    <!-- turndown.js — HTML 转 Markdown（用于剪贴板多格式复制） -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/turndown/dist/turndown.min.js -->
    <script src="/static/lib/turndown.min.js"></script>

    <!-- Alpine Store 注册 — 必须在 Alpine.js 处理 DOM 前注册全局 store，
        使 HTML 中 $store.* 引用立即可用。
        此文件为普通 <script>（非 ES Module），因为 Alpine 的 DOM 扫描
        时机早于 ES Module 的加载。 -->
    <script src="/static/alpine-store.js"></script>

    <!-- Alpine 组件注册 — 通过 Alpine.data() 注册 x-data 组件，
        监听 alpine:init 事件，在 Alpine 初始化时完成注册。
        必须作为普通 <script> 在 Alpine.js 之前加载，
        若用 ES Module 则执行时机晚于 Alpine 的 DOM 扫描。 -->
    <script src="/static/components/buttons.js"></script>
    <script src="/static/components/chat-container.js"></script>
    <script src="/static/components/dialogs/dialogs.js"></script>
    <script src="/static/components/sources-panel.js"></script>
    <script src="/static/components/format.js"></script>

    <!-- SVG 图标常量 — 必须在 Alpine.js 之前加载（普通<script>），
        将 svg_icons.js 中的所有图标字符串常量注册到 window 上，
        供 Alpine 模板中的 x-html 表达式使用。
        若用 ES Module，执行时机晚于 Alpine 的 DOM 扫描，
        会导致 "ICON_CLOSE is not defined" 等 ReferenceError。 -->
    <script src="/static/svg_icons.js"></script>

    <!-- Alpine.js — 渐进式响应式框架 -->
    <!--
        Store 由 alpine-store.js 在 alpine:init 事件中注册，
        组件函数已由上方普通 <script> 加载到全局（window.toggleBtn 等），
        Alpine x-data 表达式及 $store.* 引用在 Alpine 处理 DOM 时立即可用。
    -->
    <script defer src="/static/lib/alpine.min.js"></script>
</head>

<body>
    <div class="app-container" id="appContainer">
        <!-- 左栏 -->
        <aside class="left-sidebar hidden" id="leftSidebar">
            <div class="sidebar-header">
                <div class="left-brand-area" id="leftBrandContainer"></div>
                <div class="sidebar-new-chat-area" id="sidebarNewChatArea"></div>
                <button class="icon-btn icon-btn--normal sidebar-close-btn" id="sidebarCloseBtn"
                    x-data="iconBtn({ size: 'normal' })" aria-label="关闭侧栏">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" x-html="ICON_CLOSE"></svg>
                </button>
            </div>

            <!-- 侧边栏 Tab 切换 -->
            <div class="sidebar-tabs" x-data>
                <button class="sidebar-tab" :class="{ active: $store.chats.sidebarTab === 'timeline' }"
                    :style="{ flex: $store.chats.sidebarTab === 'timeline' ? '1.618' : '1' }"
                    @click="$store.chats.switchSidebarTab('timeline')">
                    <span class="sidebar-tab-icon">&#x1F4C5;</span>
                    <span>时间</span>
                </button>
                <button class="sidebar-tab" :class="{ active: $store.chats.sidebarTab === 'category' }"
                    :style="{ flex: $store.chats.sidebarTab === 'category' ? '1.618' : '1' }"
                    @click="$store.chats.switchSidebarTab('category')">
                    <span class="sidebar-tab-icon">🏷️</span>
                    <span>类别</span>
                </button>
            </div>

            <!-- 时间线 Tab 内容 -->
            <div class="sidebar-content" id="sidebarContent" x-data x-show="$store.chats.sidebarTab === 'timeline'">
                <!-- 空状态 -->
                <template x-if="$store.chats.chatsTimeline && $store.chats.chatsTimeline.length === 0">
                    <div class="chat-list-empty">暂无对话记录</div>
                </template>

                <!-- 分组列表 -->
                <template x-for="group in ($store.chats.chatsTimeline || [])" :key="group.label">
                    <div class="chat-group">
                        <!-- 普通分组（置顶、今天、昨天、7天内、30天内） -->
                        <template x-if="group.type === 'normal'">
                            <div>
                                <div class="chat-group-header"
                                    @click="$store.chats.toggleCollapse(group.label)"
                                    @mouseenter="$store.chats.closeContextMenu()">
                                    <span class="collapse-arrow"
                                        :class="{ collapsed: $store.chats.isCollapsed(group.label) }">&#x276F;</span>
                                    <span x-text="group.label"></span>
                                </div>
                                <div class="chat-group-body"
                                    :class="{ collapsed: $store.chats.isCollapsed(group.label) }">
                                    <template x-for="chat in group.items" :key="chat.sn">
                                    <div class="chat-item"
                                        :class="{ active: chat.sn === $store.chats.activeChatSN }"
                                        :data-sn="chat.sn"
                                        @click="$store.chats.selectChat(chat.sn)"
                                        @mouseenter="$store.chats.maybeCloseContextMenu(chat)">
                                        <svg class="chat-item-loading" x-show="$store.chats.isStreamingBySN(chat.sn)"
                                            viewBox="0 0 24 24" width="14" height="14" fill="none"
                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                            x-html="ICON_LOADING">
                                        </svg>
                                        <div class="chat-item-title" x-text="chat.title || '新对话'"></div>
                                        <button class="chat-item-more-btn"
                                            @mouseenter="$store.chats.showContextMenu($event, chat)"
                                            @click.stop="$store.chats.showContextMenu($event, chat)">
                                            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"
                                                x-html="ICON_DOTS"></svg>
                                        </button>
                                    </div>
                                </template>
                                </div>
                            </div>
                        </template>

                        <!-- 更早分组（含日期子分组） -->
                        <template x-if="group.type === 'earlier'">
                            <div>
                                <div class="chat-group-header"
                                    @click="$store.chats.toggleCollapse(group.label)"
                                    @mouseenter="$store.chats.closeContextMenu()">
                                    <span class="collapse-arrow"
                                        :class="{ collapsed: $store.chats.isCollapsed(group.label) }">&#x276F;</span>
                                    <span x-text="group.label"></span>
                                </div>
                                <div class="chat-group-body"
                                    :class="{ collapsed: $store.chats.isCollapsed(group.label) }">
                                    <template x-for="sub in group.subGroups" :key="sub.dateLabel">
                                        <div class="chat-date-group">
                                            <div class="chat-date-header"
                                                @click="$store.chats.toggleCollapse(group.label + '|' + sub.dateLabel)"
                                                @mouseenter="$store.chats.closeContextMenu()">
                                                <span class="collapse-arrow date-arrow"
                                                    x-text="$store.chats.isCollapsed(group.label + '|' + sub.dateLabel) ? '+' : '−'"></span>
                                                <span x-text="sub.dateLabel"></span>
                                            </div>
                                            <div class="chat-date-body"
                                                :class="{ collapsed: $store.chats.isCollapsed(group.label + '|' + sub.dateLabel) }">
                                                <template x-for="chat in sub.items" :key="chat.sn">
                                                    <div class="chat-item"
                                                        :class="{ active: chat.sn === $store.chats.activeChatSN }"
                                                        :data-sn="chat.sn"
                                                        @click="$store.chats.selectChat(chat.sn)"
                                                        @mouseenter="$store.chats.maybeCloseContextMenu(chat)">
                                                        <svg class="chat-item-loading" x-show="$store.chats.isStreamingBySN(chat.sn)"
                                                            viewBox="0 0 24 24" width="14" height="14" fill="none"
                                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                                            x-html="ICON_LOADING">
                                                        </svg>
                                                        <div class="chat-item-title" x-text="chat.title || '新对话'"></div>
                                                        <button class="chat-item-more-btn"
                                                            @mouseenter="$store.chats.showContextMenu($event, chat)"
                                                            @click.stop="$store.chats.showContextMenu($event, chat)">
                                                            <svg viewBox="0 0 16 16" width="14" height="14"
                                                                fill="currentColor" x-html="ICON_DOTS"></svg>
                                                        </button>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- 回收站分组 — 始终在时间线最底部 -->
                        <template x-if="group.type === 'trash'">
                            <div class="chat-group chat-group-trash">
                                <div class="chat-group-header"
                                    @click="$store.chats.toggleTrash()"
                                    @mouseenter="$store.chats.closeContextMenu()">
                                    <span class="collapse-arrow"
                                        :class="{ collapsed: !$store.chats.trashExpanded }">&#x276F;</span>
                                    <span>回收站</span>
                                    <span class="trash-count" x-show="group.count > 0"
                                        x-text="'(' + group.count + ')'"></span>
                                    <button class="trash-clear-btn" x-show="group.count > 0"
                                        @click.stop="$store.chats.emptyTrash()"
                                        data-tooltip="清空回收站"
                                        title="清空回收站">
                                        <svg viewBox="0 0 24 24" width="12" height="12" fill="none"
                                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                            stroke-linejoin="round" x-html="ICON_TRASH"></svg>
                                    </button>
                                </div>
                                <div class="chat-group-body"
                                    :class="{ collapsed: !$store.chats.trashExpanded }">
                                    <template x-if="group.items.length === 0">
                                        <div class="chat-list-empty trash-empty">回收站为空</div>
                                    </template>
                                    <template x-for="chat in group.items" :key="chat.sn">
                                        <div class="chat-item chat-item-trash"
                                            :data-sn="chat.sn"
                                            @mouseenter="$store.chats.maybeCloseContextMenu(chat)">
                                            <div class="chat-item-title trash-item-title"
                                                x-text="chat.title || '新对话'"></div>
                                            <button class="chat-item-more-btn"
                                                @mouseenter="$store.chats.showTrashContextMenu($event, chat)"
                                                @click.stop="$store.chats.showTrashContextMenu($event, chat)">
                                                <svg viewBox="0 0 16 16" width="14" height="14"
                                                    fill="currentColor" x-html="ICON_DOTS"></svg>
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- 分类 Tab 内容 — 只显示一级分类 -->
            <div class="sidebar-content" x-data x-show="$store.chats.sidebarTab === 'category'">
                <template x-if="$store.chats.chatCategories && $store.chats.chatCategories.length === 0">
                    <div class="chat-list-empty">暂无分类</div>
                </template>

                <div class="chat-list">
                    <template x-for="catGroup in ($store.chats.chatCategories || [])" :key="catGroup.label">
                        <div class="chat-group">
                            <div class="chat-group-header"
                                @click="$store.chats.toggleCollapse('cat|' + catGroup.label)"
                                @mouseenter="$store.chats.closeContextMenu()">
                                <span class="collapse-arrow"
                                    :class="{ collapsed: $store.chats.isCollapsed('cat|' + catGroup.label) }">&#x276F;</span>
                                <span x-text="catGroup.label"></span>
                            </div>
                            <div class="chat-group-body"
                                :class="{ collapsed: $store.chats.isCollapsed('cat|' + catGroup.label) }">
                                <template x-for="chat in catGroup.items" :key="chat.sn">
                                    <div class="chat-item" :class="{ active: chat.sn === $store.chats.activeChatSN }"
                                        :data-sn="chat.sn"
                                        @click="$store.chats.selectChat(chat.sn)"
                                        @mouseenter="$store.chats.maybeCloseContextMenu(chat)">
                                        <svg class="chat-item-loading" x-show="$store.chats.isStreamingBySN(chat.sn)"
                                            viewBox="0 0 24 24" width="14" height="14" fill="none"
                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                            x-html="ICON_LOADING">
                                        </svg>
                                        <div class="chat-item-title" x-text="chat.title || '新对话'"></div>
                                        <button class="chat-item-more-btn"
                                            @mouseenter="$store.chats.showContextMenu($event, chat)"
                                            @click.stop="$store.chats.showContextMenu($event, chat)">
                                            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"
                                                x-html="ICON_DOTS"></svg>
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </aside>

        <!-- 主栏 -->
        <main class="main-content">
            <div class="main-header">
                <div class="main-brand-area" id="mainBrandContainer"></div>
                <button id="newChatBtn" class="text-btn" x-data="textBtn({ disabled: () => false })"
                    :disabled="disabled" data-tooltip="开启新对话">
                    <svg class="text-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" x-html="ICON_NEW_CHAT"></svg>
                    <span class="text-btn-label">新对话</span>
                </button>
                <span class="main-title" id="headerTitle"></span>
                <button id="aiTitleBtn" class="icon-btn icon-btn--small ai-title-btn"
                    x-data="iconBtn({ size: 'small', disabled: () => $store.chats.active?.isStreaming })"
                    :disabled="disabled" x-show="$store.chats.active?.sn" data-tooltip="让 AI 重新生成标题">
                    <svg viewBox="0 0 50 50" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" x-html="ICON_AI_TITLE"></svg>
                </button>
                <div class="main-header-right">
                    <button id="themeToggle" class="icon-btn icon-btn--normal" x-data="iconBtn({ size: 'normal' })"
                        @click="$store.settings.toggleTheme()"
                        :data-tooltip="$store.settings.theme === 1 ? '切换到亮色主题' : '切换到暗色主题'">
                        <template x-if="$store.settings.theme === 1">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" x-html="ICON_MOON"></svg>
                        </template>
                        <template x-if="$store.settings.theme !== 1">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" x-html="ICON_SUN"></svg>
                        </template>
                    </button>
                    <!-- 未登录时显示登录按钮 -->
                    <button id="loginBtn" class="text-btn"
                        x-data="textBtn({ disabled: () => $store.chats.active?.isStreaming })" :disabled="disabled"
                        data-tooltip="登录"
                        x-show="!$store.chats.currentUserNo">登录</button>
                    <!-- 已登录时显示用户头像 + 下拉菜单 -->
                    <!-- ★ 修复：将 x-show 和 x-data 分离到不同层级。
                         x-data 放在外层 div，x-show 放在内层包装 div。
                         避免 Alpine 在同一元素上同时处理 x-show 和 x-data 时，
                         因 x-show 从 false→true 的转换导致 x-data 被意外重新求值，
                         使 open 错误地变为 true 而自动显示下拉菜单。 -->
                    <div x-data="{ open: false }"
                        @click.outside="open = false">
                        <div class="user-avatar-dropdown"
                            x-show="$store.chats.currentUserNo">
                            <button class="user-avatar-btn" @click="open = !open"
                                :data-tooltip="$store.chats.currentUserNo">
                                <img class="user-avatar-img" :src="$store.chats.currentUserAvatar || '/static/img/avatar/avatar1.png'"
                                    alt="头像" width="32" height="32">
                            </button>
                            <!-- x-if：open=false 时 DOM 完全不存在，彻底杜绝显示问题 -->
                            <template x-if="open">
                                <div class="user-dropdown-menu"
                                    @click="open = false">
                                    <div class="dropdown-item dropdown-item--disabled"
                                        x-text="$store.chats.currentUserNo"></div>
                                    <button class="dropdown-item dropdown-item--danger" id="logoutBtn"
                                        @click="onChatLogout">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                            x-html="ICON_LOGOUT"></svg>
                                        退出登录
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-body" id="mainBody">
                <!-- scroll-container 初始为欢迎状态（welcome-state），
                    当用户切换到已有对话时由 Alpine 的 :class 移除该 class。
                    注意：welcome-state 必须作为静态 class 存在，因为 Alpine 的 :class
                    绑定在初始化时可能因时序问题无法正确添加。 -->
                <div class="scroll-container welcome-state" id="scrollContainer"
                    :class="{ 'welcome-state': $store.chats.activeIndex === -1 }">
                    <!-- 未来热点内容容器，由 JS 动态填充，位于欢迎面板上方 -->
                    <!-- ★ 空 x-data 自建 Alpine 作用域，确保 x-show 的响应式绑定生效。
                         不写 x-data 时，该元素位于 Alpine 根作用域，但作为 #chatContainer
                         （x-data="chatContainer()"）的兄弟元素，其 Alpine 指令可能不被处理。 -->
                    <div class="hotContent" x-data x-show="$store.chats.activeIndex === -1">
                    </div>
                    <!-- 聊天区域 — Alpine x-for 数据驱动渲染 -->
                    <main class="chat-container" id="chatContainer" x-data="chatContainer()" x-init="init($el)">
                        <!-- 欢迎消息（Alpine 响应式驱动，activeIndex === -1 时显示）
                            注意：不能在此元素上使用 x-text，因为 JS 会动态将 .input-area 移入此元素，
                            x-text 的 textContent 赋值会覆盖所有子节点导致输入面板丢失。
                            改用独立的 <p> 元素显示文本。 -->
                        <div class="welcome-message" x-show="$store.chats.activeIndex === -1">
                            <p class="welcome-text" x-text="$store.chats.welcomeMessage || '你好！我是「第2大脑」AI助手'">
                            </p>
                        </div>
                        <!-- 消息组列表 -->
                        <template x-for="(group, idx) in $store.chats.active?.groups ?? []" :key="group.id">
                            <div class="message-group" :data-msg-id="group.msgId">
                                <!-- 删除按钮（Alpine 响应式 disabled） -->
                                <button class="msg-action-btn delete-msg-btn group-delete-btn"
                                    :disabled="$store.chats.active?.isStreaming ?? false" data-tooltip="删除本组对话"
                                    @click="showDeleteModal(idx)">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                                        x-html="ICON_DELETE"></svg>

                                </button>

                                <!-- 用户消息 -->
                                <div class="message user" x-show="group.user">
                                    <div class="message-inner">
                                        <div class="role-label"
                                            x-text="'我' + (group.user?.createdAt ? ' (' + formatMessageTime(group.user.createdAt) + ')' : '')">
                                        </div>
                                        <div class="bubble" x-html="group.user?.contentHTML ?? ''"></div>
                                        <div class="message-actions">
                                            <button class="msg-action-btn copy-msg-btn" data-tooltip="复制当前消息内容">
                                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                                    stroke-linejoin="round" x-html="ICON_COPY_MSG"></svg>
                                                <span class="copy-btn-label">复制为 Markdown</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- 助手消息（统一模板）
                                    ★ 方案B：同一 group.assistant 贯穿流式中→已完成。
                                    流式期间：contentHTML/reasoningHTML 持续增长，createdAt=null
                                    完成之后：createdAt 被设置 → 角色标签显示时间、操作按钮出现
                                    模板完全由数据驱动，无需感知 isStreaming。 -->
                                <div class="message assistant" :class="{
                                        interrupted: group.assistant.interrupted === 1,
                                        failed: group.assistant.interrupted === 2
                                    }" x-show="group.assistant" x-data="{ collapsed: group.assistant.createdAt ? true : false }">
                                    <div class="message-inner">
                                        <!-- ★ 统一角色标签：始终显示，根据 reasoningState 自适应文本。
                                            有 reasoning 时外层标签直接充当折叠切换手柄，▶ 箭头通过 CSS rotate 统一大小。
                                            无 reasoning → "🤖 AI (时间)"
                                            reasoning 进行中 → "🤖 AI 正在思考……"
                                            reasoning 完成 → "🤖 AI 思考完成 (时间)"
                                            （中断也归入"思考完成"，因后端已追加 broken message 标记） -->
                                        <div class="role-label role-label-ai"
                                            :class="{ clickable: group.assistant.reasoningHTML }"
                                            @click="group.assistant.reasoningHTML && (collapsed = !collapsed)">
                                            <span class="collapse-arrow" x-show="group.assistant.reasoningHTML"
                                                :class="{ expanded: !collapsed }">▶</span>
                                            <span x-text="assistantLabel(group.assistant)"></span>
                                        </div>
                                        <!-- reasoning 区域（Alpine 数据驱动，默认折叠）
                                            注意：active/done class 用于控制 CSS 动画和样式，
                                            reasoningState 在流式期间为 undefined/'thinking'，
                                            完成后由 SSEResponser.onReasoningEnd 设为 'done'。
                                            ★ 折叠状态由外层 .message.assistant 的 x-data 管理，
                                            通过 @click 在角色标签上切换。 -->
                                        <div class="reasoning-area"
                                            :class="{ collapsed: collapsed, active: group.assistant.reasoningHTML && group.assistant.reasoningState !== 'done', done: group.assistant.reasoningState === 'done' }"
                                            x-show="group.assistant.reasoningHTML">
                                            <div class="reasoning-content" x-html="group.assistant.reasoningHTML"></div>
                                        </div>
                                        <!-- 气泡：contentHTML 贯穿流式中→已完成 -->
                                        <div class="bubble" :class="{ streaming: !group.assistant.createdAt }"
                                            x-html="group.assistant.contentHTML" x-show="group.assistant.contentHTML">
                                        </div>
                                        <!-- 操作按钮（仅已完成，以 createdAt 为标志） -->
                                        <div class="message-actions" x-show="group.assistant.createdAt">
                                            <button class="msg-action-btn copy-msg-btn" data-tooltip="复制当前消息内容">
                                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                                    stroke-linejoin="round" x-html="ICON_COPY_MSG"></svg>
                                                <span class="copy-btn-label">复制为 Markdown</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Sources panel — Alpine 响应式数据驱动（仅联网搜索）
                                    数据流：group.assistant.sources 由 JS 维护，
                                    Alpine 负责响应式渲染 + 折叠控制，
                                    SwipePager 触摸翻页由 JS 组件管理。
                                    x-data 参数 assistant = group.assistant
                                    用于保持折叠状态和 SwipePager 数据引用。 -->
                                <div class="sources-panel" x-show="group.assistant.sources?.length > 0"
                                    x-data="sourcesPanel(group.assistant)" data-source-type="web">
                                    <div class="sources-section">
                                        <div class="sources-title sources-collapsible"
                                            :class="{ expanded: !collapsed, collapsed: collapsed }" role="button"
                                            tabindex="0" @click="toggle($event)" @keydown.enter.prevent="toggle($event)"
                                            @keydown.space.prevent="toggle($event)">
                                            <svg class="sources-icon" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                                stroke-linejoin="round" x-html="ICON_GLOBE"></svg>
                                            <span x-text="'参考了 ' + (group.assistant.sources?.length ?? 0) + ' 个联网搜索结果'"></span>
                                        </div>
                                        <div class="sources-body" :class="{ 'sources-body--open': !collapsed }">
                                            <div class="sources-items-container swipe-container"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </main>
                </div>
                <!-- 刻度导航 -->
                <nav class="tick-nav" id="tickNav"></nav>
            </div>

            <!-- 输入区域 -->
            <!--
                注意：input-area 的 .streaming class 由 Alpine 通过
                $store.chats.active?.isStreaming 响应式控制（per-chat）。
                同时输入面板折叠（.collapsed class）由 chat-ui.js 的
                collapseInputArea() / restoreInputArea() 管理，两者互不冲突。

                优化：使用阻塞式内联脚本在 Alpine 处理 DOM 之前就将 input-area
                移入 welcome-message，消除刷新时输入面板从底部跳到中间的视觉跳动。
            -->
            <footer class="input-area" x-data :class="{ streaming: $store.chats.active?.isStreaming }">
                <div class="send-mode-corner">
                    <span class="send-mode-text send-mode-text--left" id="sendModeTextLeft">回车键发送</span>
                    <label class="send-mode-switch">
                        <input type="checkbox" id="sendModeToggle">
                        <span class="switch-slider"></span>
                    </label>
                    <span class="send-mode-text send-mode-text--right" id="sendModeTextRight">Shift+回车键发送</span>
                </div>
                <div class="input-wrapper">
                    <!--
                        messageInput 的 disabled 状态已由 Alpine 通过
                        $store.chats.active?.isStreaming 响应式管理（per-chat）。
                        Alpine 未加载时，由 setInputEnabled() 的降级路径控制。
                    -->
                    <textarea id="messageInput" class="message-input" placeholder="说点什么？" rows="1" autofocus
                        :disabled="$store.chats.active?.isStreaming ?? false"></textarea>
                    <!-- 中断按钮：仅折叠状态 + 流式输出时显示，展开状态时隐藏（由 sendBtn 承担停止功能）
                        添加 x-cloak 防止 Alpine 初始化前红色按钮闪现 -->
                    <button id="stopStreamingBtn" class="stop-streaming-btn" x-data x-cloak
                        x-show="($store.chats.inputCollapsed ?? false) && ($store.chats.active?.isStreaming ?? false)"
                        data-tooltip="停止生成">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" x-html="ICON_STOP"></svg>
                    </button>
                </div>
                <div class="input-footer">
                    <div class="input-footer-left">
                        <button id="deepThinkBtn" class="toggle-btn"
                            x-data="toggleBtn({ active: () => $store.settings.deepThink, onToggle: () => $store.settings.toggleDeepThink() })"
                            :data-active="active ? 'true' : 'false'" @click="onToggle"
                            :data-tooltip="active ? '已开启思考过程，单击关闭' : '已关闭思考过程，单击开启'">
                            <svg class="toggle-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                                x-html="ICON_DEEP_THINK"></svg>
                            <span>深度思考</span>
                        </button>
                        <button id="webSearchBtn" class="toggle-btn"
                            x-data="toggleBtn({ active: () => $store.settings.webSearch, onToggle: () => $store.settings.toggleWebSearch() })"
                            :data-active="active ? 'true' : 'false'" @click="onToggle"
                            :data-tooltip="active ? '必要时搜索互联网，单击关闭' : '已关闭联网搜索，单击开启'">
                            <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                                x-html="ICON_GLOBE"></svg>
                            <span>智能搜索</span>
                        </button>
                    </div>
                    <div class="input-footer-right">
                        <input type="file" id="fileInput" style="display:none" multiple>
                        <button id="attachBtn" class="attach-btn" x-data="attachBtn()" data-tooltip="上传附件">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                x-html="ICON_ATTACH"></svg>
                        </button>
                        <button id="sendBtn" class="send-btn"
                            x-data="sendBtn({ active: () => ($store.chats.active?.isStreaming ?? false) && !($store.chats.inputCollapsed ?? false) })"
                            :class="{ 'stop-btn': active }" :data-tooltip="active ? '停止生成' : '发送'">
                            <template x-if="!active">
                                <svg viewBox="0 0 24 24" width="20" height="20" x-html="ICON_SEND"></svg>
                            </template>
                            <template x-if="active">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"
                                    x-html="ICON_STOP"></svg>
                            </template>
                        </button>
                    </div>
                </div>
            </footer>

            <!-- 阻塞式内联脚本：在 Alpine 处理 DOM 之前就将 input-area 移入 welcome-message，
                消除刷新时输入面板从底部跳到中间的视觉跳动。
                此脚本会在 Alpine（defer）执行之前运行，因为 inline script 是同步执行的。 -->
            <script>
                (function () {
                    var inputArea = document.querySelector('.input-area');
                    var welcomeMsg = document.querySelector('.welcome-message');
                    if (inputArea && welcomeMsg && inputArea.parentNode !== welcomeMsg) {
                        welcomeMsg.appendChild(inputArea);
                        inputArea.style.marginTop = '12px';
                    }
                })();
            </script>
        </main>
    </div>

    <!-- Toast 消息容器（Alpine 组件：通过 $store.ui 共享状态） -->
    <!--
        注意：此处 x-data 为空对象（无本地状态），toast 数据由 Alpine.store('ui')
        管理，模板中通过 $store.ui.toasts 访问。这种方式避免了 CustomEvent
        事件监听机制的时序问题——showToast() 直接操作 Alpine.store，响应式系统
        自动触发 x-for/x-show 更新。
    -->
    <div class="toast-container" id="toastContainer" x-data="{}">
        <template x-for="toast in $store.ui.toasts" :key="toast.id">
            <div class="toast" :class="'toast-' + toast.type"
                x-show="toast.visible"
                :style="toast.onClick ? 'cursor:pointer' : ''"
                @click="toast.onClick ? toast.onClick($event) : null"
                x-html="toast.message"
                x-transition:enter="toast-enter-active" x-transition:enter-start="toast-enter-from"
                x-transition:enter-end="" x-transition:leave="toast-leave-active" x-transition:leave-start=""
                x-transition:leave-end="toast-leave-to">
            </div>
        </template>
    </div>

    <!-- 删除确认对话框 -->
    <div class="dialog-overlay" id="deleteModal" x-data="deleteDialog()" :class="{ show: show }" @click.self="close">
        <div class="dialog-box">
            <div class="dialog-header">
                <h3 id="modalTitle">删除对话消息组</h3>
                <button class="dialog-close-btn" id="modalCloseBtn" @click="close">&times;</button>
            </div>
            <div class="dialog-body" id="modalBody"></div>
            <div class="del-preview-note" id="modalDeleteNote" style="display:none">提醒：<br>① 消息（用户和助手）将成组删除<br>②
                下一轮对话会有大段词元缓存失效</div>
            <div class="dialog-footer">
                <button class="dialog-btn dialog-btn-cancel" id="modalCancelBtn" @click="close">取消</button>
                <button class="dialog-btn dialog-btn-delete" id="modalConfirmBtn"
                    @click="window.confirmDelete">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 修改对话框标题对话框 -->
    <div class="dialog-overlay" id="titleEditDialog" x-data="titleEditDialog()" :class="{ show: show }"
        @click.self="cancel">
        <div class="dialog-box">
            <div class="dialog-header">
                <h3>修改对话标题</h3>
                <button class="dialog-close-btn" @click="cancel" aria-label="关闭">&times;</button>
            </div>
            <div class="dialog-body">
                <div class="title-edit-original" x-text="displayTitle"></div><label
                    class="title-edit-label" for="titleEditInput">新标题</label><input type="text" class="title-edit-input" id="titleEditInput"
                    name="title" x-model="editingTitle" maxlength="50" @keydown.enter="confirm" @keydown.escape="cancel">
            </div>
            <div class="dialog-footer">
                <button class="dialog-btn dialog-btn-cancel" @click="cancel">取消</button>
                <button class="dialog-btn dialog-btn-confirm" @click="confirm"
                    :disabled="!editingTitle.trim() || submitting" x-text="submitting ? '提交中…' : '确认'">确认</button>
            </div>
        </div>
    </div>

    <!-- AI 生成免责声明 — 页面加载后由 JS 动态插入模型名称 -->
    <div class="ai-disclaimer" id="aiDisclaimer">内容由 AI 生成，请仔细甄别</div>

    <script type="module" src="/static/chat.js"></script>
</body>

</html>
