<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力永恒 AI 助手</title>
    <link rel="icon" type="image/svg+xml" href="/static/brain-forever.svg">
    <!-- 防主题闪烁：在 CSS 渲染前从 localStorage 读取主题并设置 data-theme -->
    <script>
        (function() {
            try {
                var raw = localStorage.getItem('brainforever_settings');
                if (raw) {
                    var settings = JSON.parse(raw);
                    var theme = settings.theme;
                    var themeStr;
                    if (theme === 2) {
                        themeStr = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    } else {
                        themeStr = theme === 1 ? 'dark' : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', themeStr);
                }
            } catch(e) {}
        })();
    </script>
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/input.css">
    <link rel="stylesheet" href="/static/reasoning.css">
    <link rel="stylesheet" href="/static/message.css">
    <link rel="stylesheet" href="/static/components/swipe-pager.css">
    <link rel="stylesheet" href="/static/components/sources-panel.css">
    <link rel="stylesheet" href="/static/components/modal-overlay.css">
    <link rel="stylesheet" href="/static/responsive.css">
    <link rel="stylesheet" href="/static/components/toast.css">
    <link rel="stylesheet" href="/static/components/tick.css">
    <!-- highlight.js — 代码语法高亮（暗色主题） -->
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/atom-one-dark.min.css" id="hljs-theme-dark" disabled>
    <!-- highlight.js — 代码语法高亮（亮色主题，默认） -->
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/atom-one-light.min.css" id="hljs-theme-light">
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js -->
    <script src="/static/lib/highlight.min.js"></script>
    <!-- marked.js — Markdown 渲染 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/marked/marked.min.js -->
    <script src="/static/lib/marked.min.js"></script>
    <!-- KaTeX — 数学公式渲染 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
    <!-- marked-katex-extension — marked 的 KaTeX 扩展插件 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.5/lib/index.umd.js" crossorigin="anonymous"></script>
    <!-- turndown.js — HTML 转 Markdown（用于剪贴板多格式复制） -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/turndown/dist/turndown.min.js -->
    <script src="/static/lib/turndown.min.js"></script>
</head>
<body>
    <!-- 隐藏的 SVG 定义区，供各按钮通过 <use> 引用 -->
    <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;">
        <defs>
            <svg id="icon-new-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- 聊天气泡，左下角尖角，内含 + 号 -->
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
        </defs>
    </svg>

    <div class="app-container" id="appContainer">
        <!-- 左栏 -->
        <aside class="left-sidebar hidden" id="leftSidebar">
            <div class="sidebar-header">
                <div class="left-brand-area" id="leftBrandContainer"></div>
                <div class="sidebar-new-chat-area" id="sidebarNewChatArea"></div>
                <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="关闭侧栏">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="3" x2="13" y2="13"/>
                        <line x1="13" y1="3" x2="3" y2="13"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-content" id="sidebarContent">
            </div>
        </aside>

        <!-- 主栏 -->
        <main class="main-content">
            <div class="main-header">
                <div class="main-brand-area" id="mainBrandContainer"></div>
                <button id="newChatBtn" class="new-chat-btn" title="开启新对话">
                    <svg class="new-chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <use href="#icon-new-chat"/>
                    </svg>
                    <span class="new-chat-label">新对话</span>
                </button>
                <span class="main-title" id="headerTitle">欢迎开始新对话</span>
                <div class="main-header-right">
                    <button id="themeToggle" class="theme-toggle" title="切换主题">
                        <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="main-body" id="mainBody">
                <div class="scroll-container" id="scrollContainer">
                    <!-- 聊天区域 -->
                    <main class="chat-container" id="chatContainer">
                        <!-- 消息由 JS 动态渲染 -->
                    </main>
                </div>
                <!-- 刻度导航 -->
                <nav class="tick-nav" id="tickNav"></nav>
            </div>

            <!-- 输入区域 -->
            <footer class="input-area">
                <div class="send-mode-corner">
                    <label class="send-mode-switch">
                        <input type="checkbox" id="sendModeToggle">
                        <span class="switch-slider"></span>
                    </label>
                    <span class="send-mode-label" id="sendModeLabel"></span>
                </div>
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="想说点什么？"
                        rows="1"
                        autofocus
                    ></textarea>
                    <span class="newline-hint" id="newlineHint"></span>
                </div>
                <div class="input-footer">
                    <div class="input-footer-left">
                        <button id="deepThinkBtn" class="toggle-btn" data-active="false" title="深度思考">
                            <svg class="toggle-icon" viewBox="0 0 86 89" fill="none" stroke="currentColor" stroke-width="1.8">
                                <use href="/static/img/deep-think.svg#brain-path"/>
                            </svg>
                            <span>深度思考</span>
                        </button>
                        <button id="webSearchBtn" class="toggle-btn" data-active="true" title="智能搜索">
                            <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M2 12h20"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                            <span>智能搜索</span>
                        </button>
                    </div>
                    <div class="input-footer-right">
                        <input type="file" id="fileInput" style="display:none" multiple>
                        <button id="attachBtn" class="attach-btn" title="上传附件">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <button id="sendBtn" class="send-btn" title="发送">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <!-- Toast 消息容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">是否删除以下对话？</h3>
                <button class="modal-close-btn" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">取消</button>
                <button class="modal-btn modal-btn-delete" id="modalConfirmBtn">确认删除</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/chat.js"></script>
</body>
</html>
