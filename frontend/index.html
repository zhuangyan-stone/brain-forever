<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainOnline AI 助手</title>
    <link rel="icon" type="image/svg+xml" href="/static/brain-online.svg">
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/message.css">
    <link rel="stylesheet" href="/static/components/sources-panel.css">
    <link rel="stylesheet" href="/static/components/modal-overlay.css">
    <link rel="stylesheet" href="/static/responsive.css">
    <link rel="stylesheet" href="/static/components/toast.css">
    <link rel="stylesheet" href="/static/components/tick.css">

    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/atom-one-dark.min.css" id="hljs-theme-dark" disabled>
    <!-- highlight.js — 代码语法高亮（亮色主题，默认） -->
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css -->
    <link rel="stylesheet" href="/static/lib/styles/atom-one-light.min.css" id="hljs-theme-light">
    <!-- CDN 备用: https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js -->
    <script src="/static/lib/highlight.min.js"></script>
    <!-- marked.js — Markdown 渲染 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/marked/marked.min.js -->
    <script src="/static/lib/marked.min.js"></script>
    <!-- KaTeX — 数学公式渲染 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
    <!-- marked-katex-extension — marked 的 KaTeX 扩展插件 -->
    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.5/lib/index.umd.js" crossorigin="anonymous"></script>

    <!-- CDN 备用: https://cdn.jsdelivr.net/npm/turndown/dist/turndown.min.js -->
    <script src="/static/lib/turndown.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <h1>BrainOnline AI 助手</h1>
                <p class="subtitle">基于 RAG 知识库的智能对话</p>
            </div>
            <button id="themeToggle" class="theme-toggle" title="切换主题">
                <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>

        <!-- 聊天区域 -->
        <main class="chat-container" id="chatContainer">
            <!-- 消息由 JS 动态渲染 -->
        </main>

        <!-- 右侧刻度导航 -->
        <nav class="tick-nav" id="tickNav"></nav>

        <!-- Toast 消息容器 -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- 删除确认模态框 -->
        <div class="modal-overlay" id="deleteModal">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 id="modalTitle">是否删除以下对话？</h3>
                    <button class="modal-close-btn" id="modalCloseBtn">&times;</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">取消</button>
                    <button class="modal-btn modal-btn-delete" id="modalConfirmBtn">确认删除</button>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <footer class="input-area">
            <div class="send-mode-corner">
                <label class="send-mode-switch">
                    <input type="checkbox" id="sendModeToggle">
                    <span class="switch-slider"></span>
                </label>
                <span class="send-mode-label" id="sendModeLabel">回车键发送，Shift+回车键换行</span>
            </div>
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    class="message-input"
                    placeholder="想说点什么？"
                    rows="1"
                    autofocus
                ></textarea>
            </div>
            <div class="input-footer">
                <div class="input-footer-left">
                    <button id="deepThinkBtn" class="toggle-btn" data-active="false" title="深度思考">

                        <span>深度思考</span>
                    </button>
                    <button id="forceSearchBtn" class="toggle-btn" data-active="false" title="智能搜索">
                        <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>

                </div>
                <div class="input-footer-right">
                    <input type="file" id="fileInput" style="display:none" multiple>
                    <button id="attachBtn" class="attach-btn" title="上传附件">

                        </svg>
                    </button>
                    <button id="sendBtn" class="send-btn" title="发送">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="/static/chat.js"></script>
</body>
</html>
