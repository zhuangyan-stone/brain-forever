[description]
other = """Search the user's personal trait database (preferences, habits, abilities, states, etc.) by query text for personalized responses.

When to call: you should proactively call this tool when the user's question involves subjective evaluation (delicious/good-looking/fun/like/dislike), asks for recommendations, requests personalized suggestions, or asks about what suits them. Even if the query text does not explicitly contain "I" or "my", as long as the question implies a need for personal judgment (e.g., "recommend a good coffee" — the word "good" implies personal taste), you should call this tool.

Typical scenarios:
- Food/drink recommendations → Query dietary preferences
- Movie/music/book recommendations → Query hobbies and interests
- Product selection → Query usage preferences and habits
- Health advice → Query health status and habits
- Travel suggestions → Query hobbies, interests, and current state"""

[param_text_desc]
other = """Query text. It is recommended to transform the core need of the user's question into a concrete semantic query phrase, rather than directly copying the user's original text. For example:
- User asks "Recommend a good coffee to drink" → Pass "coffee taste preference like Americano or latte iced or hot"
- User asks "Recommend a good movie to watch" → Pass "favorite movie genres viewing preferences"
- User asks "What's good to eat" → Pass "dietary taste preference favorite cuisine"
This leverages vector semantic search to find the most relevant user trait records."""

[param_category_desc]
other = """Feature category number (0=search all categories). Category definitions and typical examples:

1=Demographic Attributes: The user's natural or social attributes, such as name, age, gender, height, weight, residence, nationality, ethnicity, education, occupation, income, etc. Must be externally verifiable. Examples: User height 180cm; User holds a bachelor's degree; User monthly salary 8,000

2=Associated Entities: Information about external entities closely associated with the user, typically entities owned by the user. Entities must be concrete objects (including animals, plants, etc.), but cannot be time, cannot be locations, and cannot be humans. Examples: Phone is iPhone 15; Owns a dog; Lives in 150sqm house; Car is Huawei Smart Drive

3=Achievements & Attainment: Significantly above-average deep knowledge, creative or appreciation ability and achievements (published books, published papers, formal competition rankings) demonstrated by the user in humanities, science, or engineering fields, including phenomenal works. Examples: Published "Vernacular C++"; Wrote widely circulated lyrics/compositions

4=Hobbies: Activities the user engages in voluntarily, not for career purposes (non-academic/non-utilitarian). Examples: Loves playing chess; Hiking; Playing guitar (amateur)

5=Abilities/Skills: Practical knowledge or skills beyond categories 3 and 4 (professional, life, sports, crafts, etc.), whether good or bad. Examples: Can program in Python; Class A driver's license; Poor memory; Excellent at arguing

6=Preferences/Idiosyncrasies: Likes or dislikes toward external things unrelated to morality: dietary, aesthetic, unconscious behaviors, etc. Examples: Dislikes cilantro; Lucky color purple; Bites lips; Prefers budget hotels when traveling

7=Behavioral Habits: Stable, recurring behavioral patterns, or habits developed in certain activities, including daily routines, addictions, dependencies. Examples: Ten-year smoker; Must brush teeth before bed; Night owl

8=Health & Illness: Diseases, sub-health conditions, surgeries, injuries, allergies, sleep issues, and other health-related traits. Examples: Hay fever; Chronic insomnia; Gains weight easily; Arrhythmia

9=Situational States: Temporary, changeable states (short-lived). Examples: Recently under a lot of work pressure; Preparing for civil service exam; Just went through a breakup

10=Personality/Character Traits: Stable personality tendencies, interpersonal styles, emotional patterns, thinking habits (excluding values). Examples: Highly responsible; Prone to anxiety; Introverted; Procrastinates

11=Values/Beliefs: Moral views, life philosophy, worldview, political/religious inclinations, correctness of understanding of science/society. Examples: Environmentalist; Atheist; Distrusts traditional Chinese medicine; Feminist

12=Related Persons: People who have common interpersonal relationships with the user (relatives, colleagues, friends, business partners, romantic partners, etc.), including the personal characteristics of those related persons. Examples: Child; Boss is very stingy; First love is from Yunnan; Spouse is a primary school teacher; Childhood friend works as a programmer

13=Life Experiences: Past non-health-related objective events possessing at least one of: ① Significant long-term impact on the user; ② Some uniqueness; ③ Accidental or unexpected occurrence. Examples: Participated in flood relief; Served in the military; Had a car accident; Taught in rural areas for a year in college

14=Goals/Plans: Past or present goals, ideals, plans, wishes, fantasies (whether achieved, given up, or not). Examples: Wants to lose weight; Plans to go to Japan in the second half of the year"""

