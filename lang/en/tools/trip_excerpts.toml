[description]
other = "Extract brilliant fragments from user messages and output structured results"

[param_excerpts_desc]
other = "List of excerpt entries, each containing the excerpt text, value type labels, context summary, reason, and message ID"

[param_excerpt_text_desc]
other = "The original text of the excerpt, must come from the user's message"

[param_value_types_desc]
other = "List of value type labels. Options: insight, humor, vent, methodology, rule, confession, nostalgia, regret, self_discovery, conviction, touching, deed, privacy, literary"

[param_context_summary_desc]
other = "Context summary in 20-80 characters, used to naturally introduce this excerpt in future references"

[param_reason_desc]
other = "Reason why this excerpt is worth collecting"

[param_msg_id_desc]
other = "Message ID (chat_messages.id) that the excerpt comes from, read directly from the [N] tag before the message"

