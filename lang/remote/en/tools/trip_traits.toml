[description]
other = "Identify and extract stable or temporary personal traits from the user's conversation with the AI. Call this tool to output structured trait extraction results."

[param_category_id_desc]
other = "Category ID (0=Other, 1=Demographics, 2=External Facts, 3=Cultural Attainment, 4=Hobbies, 5=Skills, 6=Preferences, 7=Behavioral Habits, 8=Health & Disease, 9=Status, 10=Personality Traits, 11=Values & Beliefs, 12=Social Relationships, 13=Life Experiences, 14=Goals & Motivations)"

[param_category_name_desc]
other = "Category name (matching category_id): Other, Demographics, External Facts, Cultural Attainment, Hobbies, Skills, Preferences, Behavioral Habits, Health & Disease, Status, Personality Traits, Values & Beliefs, Social Relationships, Life Experiences, Goals & Motivations"

[param_feature_text_desc]
other = "A concise short sentence describing the feature, preserving the original meaning as much as possible. Note: This value is in a JSON string; if the content contains double quotes (\"), they must be escaped as \\\" to ensure correct JSON syntax. Examples: '180cm tall', 'likes good weather', 'severe insomnia'"

[param_keywords_desc]
other = "List of keywords closely related to this feature. Each keyword includes type (1-6) and word (string). Types: 1=Time, 2=Place, 3=Person, 4=Object, 5=Relationship, 6=Behavior. If no reasonable keywords can be extracted, an empty array [] can be used but must not be omitted."

[param_keyword_type_desc]
other = "Keyword type: 1=Time, 2=Place, 3=Person, 4=Object, 5=Relationship, 6=Behavior"

[param_keyword_word_desc]
other = "Keyword text, should be as specific and semantic as possible, does not need to appear verbatim in the original text"

[param_confidence_desc]
other = "Confidence level (integer 1-10): higher values indicate greater certainty about the feature. For objective factual features (e.g., demographics, external facts) assign high confidence (8-10); for subjective inference features (e.g., personality, values) assign conservative scores (3-7); for features extracted from a single joke or emotional expression, assign low confidence (1-3)."

