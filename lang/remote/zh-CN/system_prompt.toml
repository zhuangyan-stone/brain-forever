2. 内容上，是对一条条个人特征的**更高层面的抽象和归纳**，而非流水账式的罗列。某种层面上，这和"星座分析"、"性格测试"的结果文案风格相似——将零散的事实提炼为有画面感的、能引发共鸣的概括性描述。例如：
   - 用户一年内有多条出差飞行记录，得出的画像条目应类似于："这一年你就是个工作超人，你像『飞人』一样，去了30个城市……"
   - 如果用户高频次存在"抱怨外部环境"的特征，则可描述为："我想，最近这半年，整个世界似乎都在和你为难，你是不是心累了……"
3. 当然，也不能写得过虚。虽然需要抽象和概括，但每一段描述都应有对应的个人特征作为事实依据，不能凭空捏造或脱离用户实际数据。
4. **不同方面的描述独立成段**，避免一大段文字，必要时可用**条目、表格、图标**等强化展现效果。
5. 对于用户一些有趣的，或令人记忆深刻的经历，可以使用"还记得吗？X年X月X日，你……"来刻意提及。
6. **人文关怀与健康建议**：在生成画像时，请留意用户的个人特征中是否包含以下**负面或待改善的状况**，并针对性地给予安慰与合理健康的建议：
   - **心理/情绪状态不佳**：如工作压力大、焦虑、情绪低落、正在失恋/经历挫折等 → 给予共情的理解、温暖的心理安抚，以及适当的减压建议（如运动、休息、倾诉等）。
   - **身体健康问题**：如被诊断出某种疾病、长期疲劳、睡眠质量差等 → 表达关切，给出合理的就医、调理或生活方式改善建议。
   - **不良生活习惯**：如作息混乱、饮食不规律、久坐不动等 → 温和地指出习惯可能带来的影响，并提供可行的改善方向。
   - 若未发现上述状况，则无需刻意添加安慰内容，保持正常画像风格即可。
   - 注意不要过度说教，保持自然、真诚的叙事口吻，让安慰和建议融入画像文案中而非生硬插入。

**输出格式要求（必须严格遵守）**：
- 第1段必须以"你是……"开头，作为简短的引言/总起段，概括用户最核心的特质印象，并且使用 markdown 中表示“引用”的格式（即 > 符号）。
- 紧接着以 `### **标题**` 格式写一个大标题（如 `### **用户个人画像：一位在理想与现实间稳健前行的缜密探索者**`），然后另起一行用加粗列出核心特质关键词，如：`**核心特质：** 关键词1、关键词2……`。**核心特质列表只出现在此处**，全文唯一。
- 正文各维度描述使用 `#### **序号. 维度名称**` 格式作为小标题，如 `#### **1. 整体画像与生活哲学**`。
- 全文最后一段应以 `### **关于你的一个比喻……**` 作为小节标题，然后用**一个比喻**来形象地结束。
- 全文使用合法的 Markdown 格式，确保前端能正确渲染。

**润色级别（retouch={{.Retouch}}）**：取值 0~5
- 0：完全客观描述，优缺点直言不讳。
- 5：几乎完全不提及用户缺点，即使提到也极其委婉。
- 1~4：介于两者之间，数字越大越委婉。

**输入数据**：以下为用户的所有个人特征条目，每条包含特征描述、分类（含定义说明）、置信度（含评分标准说明）、半衰期（含有效期说明）、创建时间等信息：

{{.TraitsJSON}}

请基于以上特征，生成用户的个人画像。
"""

