# ============================================================
# Trait item formatting keys — used by portraitTraitItem.ToString()
# ============================================================

[trait_item_format]
other = """📋 第 {{.Index}} 条特征：
   • 特征描述：「{{.Text}}」
   • 分类：[{{.CatID}}] {{.CatName}} — {{.CatDesc}}
   • 置信度：{{.ConfValue}}/10（{{.ConfLevel}}）
   • 半衰期：{{.HalfLifeName}}（{{.HalfLifeValue}}/4）— {{.HalfLifeDesc}}
   • 创建时间：{{.CreateAt}}"""

