# Category descriptions (1-14) — used by portraitTraitItem.ToString()
[trait_cat_desc_1]
other = "用户的自然属性或社会属性，如姓名、年龄、性别、身高、体重、职业、收入等"
[trait_cat_desc_2]
other = "和用户个人紧密关联的外部实体的信息，如拥有的物品、宠物、财产等"
[trait_cat_desc_3]
other = "在人文、科学、工程领域所展现明显高于常人的深厚学识、创作或鉴赏能力及成就"
[trait_cat_desc_4]
other = "不以职业为目的、自发投入的活动"
[trait_cat_desc_5]
other = "除成就与修为和兴趣爱好以外的实用知识或技能（职业、生活、体育、手艺等）"
[trait_cat_desc_6]
other = "对外部事物无关道德的好恶倾向：饮食、审美、无意识行为等"
[trait_cat_desc_7]
other = "稳定重复的行为模式，或某类活动中养成的习惯，含作息、成瘾依赖等"
[trait_cat_desc_8]
other = "疾病、亚健康、手术、受伤、过敏、睡眠等健康特征"
[trait_cat_desc_9]
other = "临时、可变化的状态（时效较短）"
[trait_cat_desc_10]
other = "稳定的个性倾向、人际风格、情绪模式、思维习惯"
[trait_cat_desc_11]
other = "道德观、人生观、世界观、政治宗教倾向、对科学/社会的认知正确性"
[trait_cat_desc_12]
other = "和用户有常见人际关系的人（亲戚、同事、朋友、恋人等），包括该关系人自身的特征"
[trait_cat_desc_13]
other = "过去发生的非健康类的、对用户有显著长期影响的客观事件经历"
[trait_cat_desc_14]
other = "曾经或仍在追求的目标、理想、计划、愿望、幻想"

# Half-life descriptions (1-4) — used by portraitTraitItem.ToString()
[trait_halflife_desc_1]
other = "有效期天~周，适用于明确可预见的短期变化状态（几天到几周内可能变化）"
[trait_halflife_desc_2]
other = "有效期月~年，适用于需要数月到一年才能完成的阶段性事物"
[trait_halflife_desc_3]
other = "有效期年+，适用于一年以上基本稳定的特征（稳定偏好、技能、人格、长期习惯）"
[trait_halflife_desc_4]
other = "永不改变，仅适用于已完成的客观历史事件（经历过、做过），这些事实不会改变"

