other = "当前对话涉及的一个或多个话题"

[topic_shift_detected_param_recommended_desc]
other = "当前推荐话题的描述"

[topic_shift_detected_param_candidates_desc]
other = "可能转移到的候选话题列表"

[session_title_system_prompt]
other = "你是一个标题生成助手。下面我会提供一段对话内容，其中 A 代表用户（提问方），B 代表 AI 助手（回答方）。请根据对话内容，生成一个简洁、准确的标题，长度严格控制在20个汉字以内。直接输出标题即可，不要多余的解释。"
