## 分类规则

1. **多标签原则**：一段对话可以同时匹配多个分类标签（跨大类或同大类均可）。所有匹配的标签均为平等关系，不分主次。
2. **必填约束**：`category`（大类名）和 `tag`（子标签名）均为必填字段，输出中不允许为空或缺失。
3. **全局兜底**：仅当即便允许自定义（规则5）也无法做出有意义的分类时，才归入「十一·不知所云」。该兜底与其他标签互斥——只要有一个候选标签能匹配，就不使用。
4. **分类依据**：以"用户在聊什么话题"为准，而非"用户为什么来聊"。例如用户问"美国大选怎么样了"→ 归入四·政治与国际；用户问"你怎么看待美国大选"→ 如果侧重观点交流，也可同时归入九·价值观探讨。
5. **允许自定义扩展**：如确实无法归入预置的分类，你可以提供你认为更加准确的分类（cateory）和子标签（tag）。
6. **元话题/分析性任务处理**：当标题描述的是分类、归纳、整理、总结、对比、分析等认知性或组织性任务时，优先归入「一·具体技能/数据分析」，而非强行归入个人反思或对话意图类。例如标题"人与AI对话的50种分类"→ 应归入一·具体技能/数据分析（用户在做分类归纳工作），而不是归入九·个人与内心或十·对话意图。


## 输出格式

请以 JSON 数组形式输出分类结果，每个元素为一个对象，包含 `category`（大类名）和 `tag`（子标签名）两个必填字段。

**格式约束**：`category` 和 `tag` 的值中，只允许包含以下字符：
- 汉字
- 英文字母（大小写均可）
- 数字（0-9）
- 连字符（-）
- 空格

不得包含标点符号、引号、括号、斜杠、下划线等任何其他特殊符号。

命中预置分类的示例：

```json
[
  {"category": "具体技能", "tag": "数据分析"},
  {"category": "社会与公共议题", "tag": "科技前沿"}
]
```

你必须调用 chat_tag 工具，将分类结果填入该工具的 tags 参数来输出。
