### 十、对话意图
当你（LLM）能明确判断出用户本次对话的意图时，可附加为该对话设定一个分类：对话意图，并使用 tag 加上具体的意图，优先使用预置的选择。
1. 闲聊寒暄 — 没具体事，纯唠嗑
2. 测试玩梗 — 测试AI、整活、玩梗
