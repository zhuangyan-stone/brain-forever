### 十一、不知所云
仅当即便允许自定义（规则5）也无法做出有意义的分类时，才归入此类。该兜底与其他标签互斥——只要有一个候选标签能匹配，就不使用。

常见场景：对话内容过短，或对话无法正确表达有意义的内容。例如用户只发了一个消息"嗯"；或者一串明显无意义或LLM觉得难以理解的内容，如"天，这的OK无一只闰年可以试试长江与黄河"。

1. 语焉不详 — 表达不清、信息模糊，无法确定话题
2. 内容过短 — 仅有只言片语，不足以判断意图
3. 缺少逻辑 — 内容混乱、缺乏条理
4. 其他 — 以上皆无法描述的不知所云情况

