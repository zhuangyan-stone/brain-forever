[description]
other = """根据查询文本从用户个人知识库中检索相关的个人特征（偏好、习惯、能力、状态等），用于个性化回答。

调用时机：当用户问题涉及主观评价（好喝/好吃/好看/喜欢/讨厌）、请求推荐、要求个性化建议、或询问适合其自身情况的问题时，应主动调用此工具查询用户相关特征。即使查询文本中不显式包含"我"或"我的"，只要问题隐含了对用户个人的判断需求（如"推荐好喝的咖啡"中的"好喝"），就应调用。

典型场景：
- 饮食推荐 → 查询饮食偏好
- 电影/音乐/书籍推荐 → 查询兴趣爱好
- 商品选择 → 查询使用偏好和习惯
- 健康建议 → 查询健康状况和习惯
- 旅行建议 → 查询兴趣爱好和近况"""

[param_text_desc]
other = """查询文本。建议将用户问题的核心需求转化为具体的语义查询短语传入，而非直接复制用户原文。例如：
- 用户问"瑞幸有什么好喝的咖啡推荐" → 传入"咖啡口味偏好 喜欢美式还是拿铁 冰饮还是热饮"
- 用户问"推荐一部好看的电影" → 传入"喜欢的电影类型 观影偏好"
- 用户问"有什么好吃的" → 传入"饮食口味偏好 喜欢的菜系"
这样可以利用向量语义搜索找到最相关的用户特征记录。"""

[param_category_desc]
other = """特征分类编号（0=搜索所有分类）。各分类定义和典型示例如下：

1=人口学特征：用户的自然属性或社会属性，如姓名、年龄、性别、身高、体重、居住地、国籍、民族、学历、职业、收入等，必须可通过外部查证。示例：用户身高180cm、用户学历本科、用户月薪八千

2=外部客观事实：用户拥有或使用的外部实体，如物品品牌/型号、财产、宠物、读过的书、看过的电影等（不含去过的地方）。示例：手机是iPhone15、养一条狗、住150平房子、车是华为智驾

3=文化修为：用户在人文、科学、工程领域展现明显高于常人的深厚学识、创作或鉴赏能力及成就（出书、论文发表、正规赛事名次），包括现象级作品。示例：出版过《白话C++》；作词作曲广泛流传

4=兴趣爱好：不以职业为目的、自发投入的活动（非学术/非功利），不含因成就高而归入3的内容。示例：爱下象棋；爬山；弹吉他（业余）

5=能力技能：除3和4以外的实用知识或技能（职业、生活、体育、手艺等），无论好坏。示例：会Python编程；A类驾驶证；记忆力差；吵架一流

6=偏好/癖好：对外部事物无关道德的好恶倾向：饮食、审美、无意识行为等。示例：讨厌香菜；幸运色紫色；爱咬嘴唇；出门喜欢住快捷酒店

7=行为习惯：稳定重复的行为模式，或某类活动中养成的习惯，含作息、成瘾依赖等。示例：十年烟民；睡前必刷牙；晚睡晚起

8=健康与疾病：疾病、亚健康、手术、受伤、过敏、睡眠等健康特征。示例：花粉过敏；总是失眠；喝水都胖；心率不齐

9=近况和状态：临时、可变化的状态（时效较短）。示例：最近工作压力大；正在准备考公；刚刚失恋了

10=人格/性格：稳定的个性倾向、人际风格、情绪模式、思维习惯（不含价值观）。示例：责任心很强；易焦虑；性格内向；做事拖拉

11=价值观与信仰：道德观、人生观、世界观、政治宗教倾向、对科学/社会的认知正确性。示例：环保主义；无神论；不信中医；女权主义

12=社交关系：与他人的关系（必须是人）及关系人的特征。示例：两个孩子的爸；老板很抠门；初恋是云南人；爱人是小学老师

13=人生事件：过去发生的非健康类的客观事件经历，具备以下至少一项特征：①对用户有显著长期影响；②有一定独特性；③偶然或意外才发生。示例：参加过抗洪；当过兵；驾车发生过车祸；大学支教过一年

14=目标与计划：曾经或仍在追求的目标、理想、计划、愿望、幻想（不管是否已实现或已放弃）。示例：想减肥；计划下半年去日本"""

