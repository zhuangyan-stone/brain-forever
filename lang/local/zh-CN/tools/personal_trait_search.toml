[description]
other = "根据查询文本和分类筛选条件，从用户个人知识库中检索相关的个人特征。当需要了解用户相关信息时调用此工具。"

[param_text_desc]
other = "查询文本。LLM可根据它所关心的具体问题或指定概念填入此参数，用于在用户个人特征集合中进行相似度搜索。"

[param_category_desc]
other = "特征分类编号（0=搜索所有分类，1=人口学特性,2=外部客观事实,3=文化修为,4=兴趣爱好,5=能力技能,6=偏好/癖好,7=行为习惯,8=健康与疾病,9=情况和状态,10=人格/性格特征,11=价值观与信仰,12=社交关系,13=人生经历,14=目标与动机）。指定为 0 则搜索所有分类。"

