[description]
other = "AI 完成用户个人特征提取后调用，记录从对话中提取到的用户个人特征。每次调用可记录多条特征。"

[pending]
other = "正在提取个人特征..."

[param_traits_desc]
other = "从对话中提取到的用户个人特征列表"

[param_topic_desc]
other = "用户当前正在讨论的话题"

[param_inference_method_desc]
other = "推断方式：显式表达 explicit-traits / 隐式表达 implicit-traits"

[param_nature_desc]
other = "特征性质：陈述客观事实 objective-traits / 表达主观感受 subjectivity-traits"

[param_conclusion_desc]
other = "用一句话描述一个特征"

[param_scenario_desc]
other = "应用场景：闲聊 casual / 工作 work / 学习 study / 生活 life / 健康 health / 其他 other"

[param_domain_desc]
other = "特征本身所属的内容领域"

[param_category_desc]
other = "顶层分类：人口统计 demographic / 心理 psychological / 偏好 predilection / 爱好 avocation / 能力 capability / 习惯 habit / 状态 state / 社交 social / 其他 other"

[param_source_desc]
other = "用于推导用户特征的原文直接引用(显式语句)或相关概括(跨段落归纳、缩写)"

[param_confidence_desc]
other = "可信度，范围 0.1 ~ 1.0"

[param_half_life_desc]
other = "特征数据的时效性和变化频率：短 short / 中 medium / 长 long"
