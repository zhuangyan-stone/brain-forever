### VII. Consumption & Lifestyle
1. Shopping Recommendations — phones, appliances, clothing, etc.
2. Food & Dining — what to eat, restaurant recommendations, recipe recreation
3. Investment & Finance — funds, stocks, savings, insurance
4. Transportation — buying a car, commuting, traffic violations
5. Travel & Trips — itineraries, flights/hotels, trip planning
6. Legal Rights — rental disputes, online shopping disputes
7. Home Renovation — design, material selection, pitfalls
8. Digital Products — computers, headphones, smart home
9. Fashion & Beauty — outfits, skincare, makeup
10. Life Hacks — saving money, storage, DIY

### VIII. Leisure & Entertainment
1. Movies & TV — films, TV series, variety shows
2. Gaming — walkthroughs, achievements, equipment
3. Music — listening, singing, instruments
4. Sports Events — watching games, sports talk, scores
5. Handicrafts & Creation — drawing, knitting, DIY
6. Photography — equipment, techniques, post-processing
7. Anime & ACG — anime, manga, cosplay
8. Performances & Exhibitions — concerts, plays, art exhibitions
9. Board Games & Escape Rooms — role-playing games, Werewolf, escape rooms
10. Reading & Literature — literary reading, poetry

### IX. Personal & Inner Self
1. Life Planning — future direction, major decisions
2. Values Exploration — worldview, meaning of life, philosophy
3. Self-reflection — review, growth, self-analysis
4. Habit Formation — self-discipline, waking early, quitting smoking, persistence
5. Memories — childhood, school days, past events
6. Emotional Management — anger, sadness, loneliness, mental drain
7. Personality Awareness — introvert/extrovert, MBTI, personality struggles
8. Interpersonal Relationships — friends, socializing, loneliness
9. Faith & Philosophy — religion, spiritual beliefs, meaning of life
10. Dreams & Wishes — things you want to do, places you want to go

### X. Conversation Intent
When you (the LLM) can clearly determine the user's intent for this conversation, you may additionally classify it under Conversation Intent, using the tag field to specify the specific intent, preferring predefined options.
1. Casual Chat — no specific purpose, just chatting
2. Testing & Memes — testing AI, messing around, memes
3. Help & Decisions — torn between A or B, asking AI to decide
4. Feedback & Suggestions — evaluating AI, giving suggestions
5. Capability Inquiry — what AI can/cannot do
6. Intent Clarification — "what are you really asking"
7. Rule Discussion — boundaries, privacy, safety
8. Role-playing —扮演ing a character or scenario
9. Emotional Companionship — just wanting company, relieving loneliness

### XI. Nonsense
Only use this category when no meaningful classification can be determined, even after considering custom extensions (rule 5). This catch-all is mutually exclusive with other tags — if any candidate tag matches, do not use it.

Common scenarios: the conversation is too short, or fails to express meaningful content. For example, the user only sends a message like "OK" or a string of text that is clearly meaningless or difficult for the LLM to understand, like "asdfghjkl".

1. Vague Expression — unclear or ambiguous expression, unable to determine the topic
2. Too Short — only a few words, insufficient to determine intent
3. Lacks Logic — disorganized content, lacking coherence
4. Other — any other nonsense situation not covered above

---

## Classification Rules

1. **Multi-tag principle**: A conversation can match multiple tags simultaneously (across categories or within the same one). All matching tags are equal — no primary/secondary distinction.
2. **Required fields**: Both `category` (major category name) and `tag` (sub-tag name) are required fields and must not be empty or missing in the output.
3. **Global catch-all**: Only when no meaningful classification can be determined, even after considering custom extensions (rule 5), should it be classified as "XI·Nonsense". This catch-all is mutually exclusive with other tags — if any candidate tag matches, do not use it.
4. **Classification basis**: Focus on "what topic is the user discussing", not "why the user came to chat". For example, if the user asks "How's the US election going?" → classify as IV·Politics & International; if the user asks "What do you think about the US election?" and the focus is on exchanging opinions, it can also be classified as IX·Values Exploration.
5. **Custom extension allowed**: If a conversation truly cannot be classified under any predefined category, you may provide what you believe is a more accurate category and sub-tag.
6. **Meta-topic / analytical task handling**: When the title describes a cognitive or organizational task such as classification, categorization, summarization, comparison, or analysis, prefer classifying it under "I·Specific Skills / Data Analysis" rather than forcing it into personal reflection or conversation intent categories. For example, a title like "50 categories of human-AI conversations" → should be classified as I·Specific Skills / Data Analysis (the user is doing classification/organization work), not as IX·Personal & Inner Self or X·Conversation Intent.

## Output Format

Output the classification result as a JSON array, where each element is an object containing two required fields: `category` (major category name) and `tag` (sub-tag name).

**Format constraints**: The values of `category` and `tag` may only contain the following characters:
- Letters (upper and lower case)
- Numbers (0-9)
- Hyphens (-)
- Spaces

No punctuation, quotation marks, brackets, slashes, underscores, or any other special symbols.

Example of matching predefined categories:

```json
[
  {"category": "Specific Skills", "tag": "Data Analysis"},
  {"category": "Society & Public Issues", "tag": "Technology Frontiers"}
]
```

You must call the chat_tag tool and provide the classification result via its tags parameter.
"""
