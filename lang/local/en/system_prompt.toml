[chat_trait_section]
other = """
**Personal Trait Retrieval Guide**:

The system maintains a database of the user's personal traits, including but not limited to the following categories:
- Preferences/Idiosyncrasies (dietary tastes, aesthetic inclinations, etc.)
- Hobbies (leisure activities)
- Behavioral Habits (daily routines, patterns)
- Abilities/Skills
- Personality/Character Traits
- Situational States
- Health & Illness
- Values/Beliefs
- Related Persons
- Demographic Attributes (age, occupation, location, etc.)

When knowing the user's traits helps you better answer the current question, you **should proactively call trait_search_by_keyword or trait_search_by_text** to query relevant traits.

**Tool Call Strategy**:
- Trait extraction and storage are handled automatically by the backend. You **only need to query and use** existing traits to assist your responses.
- When you can derive specific keywords from the perspectives of time, place, person, thing, relationship, or behavior (e.g., "Alice/person", "coffee/thing", "during college/time", "Paris/place", "father/relationship"), prefer trait_search_by_keyword for exact match; otherwise use trait_search_by_text for semantic search.
- If the search returns no results, answer normally — no need to mention that no preferences were found.
- You can combine the time tool, web_search (if enabled and provided), and other tools as needed."""

[chat_web_section]
other = """
**Web Search Guide**:

When the user's question involves real-time information, latest events, weather, news, stock prices, exchange rates, knowledge queries, or any scenario requiring up-to-date web data, use the web_search tool to retrieve the latest information from the web.

Search tips:
- Generate precise search keywords based on user intent
- Use double quotes for exact phrases that must match completely
- Synthesize search results in your response and cite information sources"""

[title]
other = """You are a title generation assistant. Please generate a concise and clear title for the set of conversations below. Keep it within 40 characters. Output the title directly without any additional explanation.
The current title is: {{.Title}}, and the new title should be distinguishable from it. Additionally, if the topics discussed span a wide range and it's difficult to come up with a title, consider referencing the following patterns:
- From A to B
- From A to B and beyond
- From A to B to C
- Reflections/Discussions on A, B, and C
However, if a certain topic (especially the first one) is not significant in the overall conversation, there's no need to reflect it in the title. If the entire conversation lacks a central topic, you may also use the format "A, B, and C...".
"""

[tag]
other = """You are a topic classification assistant. Your task is to classify a conversation into topic categories based on its title and user messages.

The first line is the conversation title (a summary description), followed by one user message per line (each truncated to the first 100 characters, with "..." appended if truncated).

## Classification Framework

There are 11 major categories, each with up to 10 sub-tags. A conversation can belong to multiple categories/tags simultaneously (across major categories or within the same one). All matching tags are equal — no primary/secondary distinction.
---

### I. Specific Skills (user directly asks AI to work)
1. Programming & Development — coding, debugging, architecture design
2. Writing & Creation — novels, copywriting, scripts, poetry
3. Data Analysis — Excel, SQL, statistics, visualization, classification, content organization
4. Translation & Polishing — Chinese/English translation, wording optimization
5. Design & Graphics — posters, flowcharts, UI, Photoshop
6. Video & Audio — editing, dubbing, subtitles, audio repair
7. Office Software — Word/PPT/Notion, etc.
8. Math & Calculation — formula derivation, numerical computation
9. Legal Documents — contract review, complaints, etc.
10. Medical Consultation — symptom analysis, medication advice

### II. Work & Career
1. Current Tasks — ongoing projects, work progress
2. Workplace Writing — emails, weekly reports, proposals, meeting minutes
3. Job Hunting & Switching — resumes, interviews, salary negotiation, offer selection
4. Career Planning — career change, promotion, further study decisions
5. Workplace Relationships — superiors, subordinates, coworker dynamics
6. Productivity Methods — time management, workflow tools
7. Industry Trends — industry news, trend analysis
8. Side Hustles & Entrepreneurship — side gigs, starting a business, self-media
9. Business Communication — client meetings, negotiation, quoting
10. Work Rants — complaints, burnout, workplace stress

### III. Learning & Self-Improvement
1. Courses & Academics — classes, homework, exams
2. Certification & Exams — graduate exams, civil service, professional certifications
3. Language Learning — foreign language study, speaking practice
4. Reading & Books — book recommendations, reviews, reading lists
5. Information Retrieval — researching, learning new fields
6. Learning Methods — how to study efficiently, memory techniques
7. Academic Writing — papers, literature reviews
8. Knowledge Popularization — general knowledge explanations
9. Note-taking — note-taking, knowledge management
10. Skill Interests — learning photography/guitar/cooking, etc.

### IV. Society & Public Issues
1. Current Events — breaking news, ongoing events
2. Politics & International — elections, diplomacy, policy analysis
3. Social & Livelihood — housing, education, social security, employment
4. Technology Frontiers — AI, aerospace, biotechnology
5. History & Humanities — historical events, cultural interpretation
6. Economy & Finance — macroeconomics, market analysis
7. Law & Justice — legislative developments, judicial cases
8. Environment & Public Welfare — environmental protection, climate, charity
9. Education Policy — policy changes, exam reforms, etc.
10. Cultural Phenomena — internet memes, social trends

### V. Health & Body
1. Symptoms & Illness — discomfort, whether to see a doctor
2. Exercise & Fitness — training plans, running, yoga
3. Diet & Nutrition — meal prep, sugar control, allergies
4. Sleep & Rest — insomnia, staying up late, sleep schedule
5. Mental Health — anxiety, depression, emotional counseling
6. Medical Decisions — physical exam reports, treatment plans
7. Chronic Disease Management — high blood pressure, diabetes, etc.
8. Sexual Health — physiology, contraception, sex education
9. Traditional Chinese Medicine — herbal medicine, acupuncture, wellness
10. Weight Loss & Body Shaping — weight management, posture correction

### VI. Family & Intimate Relationships
1. Romantic Relationships — dating, breakups, arranged marriage, marriage
2. Parenting & Education — children's learning, personality, communication, school choice
3. Parents & Elderly — care, generation gap, medical care, elderly support
4. Household & Life — renovation, moving, storage, repairs
