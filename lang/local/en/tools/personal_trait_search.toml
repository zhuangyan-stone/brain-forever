[description]
other = "Search personal traits from the user's knowledge base by query text and optional category filter. Call this tool when you need to retrieve relevant user information."

[param_text_desc]
other = "Query text. The LLM fills this with the specific question or concept it cares about, used for similarity search against the user's personal trait collection."

[param_category_desc]
other = "Feature category ID (0=search all categories, 1=Demographic Attributes, 2=External Objective Facts, 3=Cultural Attainment, 4=Hobbies, 5=Abilities/Skills, 6=Preferences/Idiosyncrasies, 7=Behavioral Habits, 8=Health & Illness, 9=Situational States, 10=Personality/Character Traits, 11=Values/Beliefs, 12=Social Relationships, 13=Life Experiences, 14=Goals/Motivations). Specify 0 to search across all categories."

