[description]
other = "Search personal traits from the user's knowledge base by query text and optional category filter. Call this tool when you need to retrieve relevant user information."

[param_text_desc]
other = "Query text. The LLM fills this with the specific question or concept it cares about, used for similarity search against the user's personal trait collection."

[param_category_desc]
other = """Feature category ID (0=search all categories). Definitions and typical examples for each category:

1=Demographic Attributes: The user's natural or social attributes, such as name, age, gender, height, weight, residence, nationality, ethnicity, education, occupation, income, etc. Must be externally verifiable. Examples: The user is 180cm tall; The user has a bachelor's degree; The user earns 8,000/month

2=External Objective Facts: External entities owned or used by the user, such as item brands/models, property, pets, books read, movies watched (excluding places visited). Examples: Uses iPhone 15; Owns a dog; Lives in a 150sqm house; Drives a Huawei Smart EV

3=Cultural Attainment: Deep knowledge, creative/appreciative ability, or achievements (published books, academic papers, competition rankings) in humanities, science, or engineering that significantly exceed ordinary levels. Examples: Published a programming book; Wrote widely circulated songs

4=Hobbies: Self-motivated, non-professional activities pursued voluntarily (non-academic, non-utilitarian). Excludes those with high achievement belonging to category 3. Examples: Enjoys chess; Hiking; Playing guitar (amateur)

5=Abilities/Skills: Practical knowledge or skills beyond categories 3 and 4 (professional, life, sports, crafts, etc.), whether good or bad. Examples: Knows Python programming; Class A driver's license; Poor memory; Excellent at arguing

6=Preferences/Idiosyncrasies: Moral-neutral likes and dislikes about external things: food preferences, aesthetic tastes, unconscious habits, etc. Examples: Hates cilantro; Lucky color is purple; Bites lips; Prefers budget hotels when traveling

7=Behavioral Habits: Stable recurring behavior patterns, or habits formed in certain activities, including daily routines, addictions, dependencies. Examples: Ten-year smoker; Must brush teeth before bed; Stays up late and wakes up late

8=Health & Illness: Diseases, sub-health conditions, surgeries, injuries, allergies, sleep issues, and other health-related traits. Examples: Hay fever; Chronic insomnia; Gains weight easily; Arrhythmia

9=Situational States: Temporary, changeable states (short validity). Examples: Recently stressed at work; Preparing for an exam; Just went through a breakup

10=Personality/Character Traits: Stable personality tendencies, interpersonal style, emotional patterns, thinking habits (excluding values). Examples: Highly responsible; Prone to anxiety; Introverted; Procrastinates

11=Values/Beliefs: Moral views, life outlook, worldview, political/religious leanings, correctness of scientific/social understanding. Examples: Environmentalist; Atheist; Doesn't believe in TCM; Feminist

12=Social Relationships: Relationships with other people (must be persons) and characteristics of those relations. Examples: Father of two; Boss is very stingy; First love is from Yunnan; Spouse is an elementary school teacher

13=Life Experiences: Past non-health-related objective events possessing at least one: ① Significant lasting impact on the user; ② Some uniqueness (not everyday routine); ③ Accidental or unexpected. Examples: Participated in flood relief; Served in the military; Was in a car accident; Taught in rural areas for a year

14=Goals/Motivations: Past or present goals, ideals, plans, wishes, fantasies (whether achieved, given up, or not). Examples: Wants to lose weight; Plans to visit Japan in the second half of the year"""

