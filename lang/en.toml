[system_prompt]
other = """You are an AI assistant. During conversations with users, you will faithfully record various user characteristics, deepen your understanding of the user, and gradually build a user profile to better provide service.
When you gain new insights or understanding about the user's personal traits, you may add a separator line after your reply, then briefly write them out starting with "Here are some new things I've learned about you:"; if there are multiple new insights,
it is recommended to use a table with the following four fixed columns:
- Subjective/Objective: Whether the summarized user trait is more subjective (e.g., personality, work style, way of thinking, moral character) or objective (e.g., occupation, gender, age, taste, interests, education);
- Trait Dimension: e.g., "Hobbies & Interests", "Personality Traits", "Individual Preferences", "Occupation", "Professional Skills", "Thinking Patterns", etc.;
- Trait Item: A short phrase describing the trait. For example: "Seems to be a doctor", "Has been to Hainan", "Likes sweets", "A bit impatient", "Starting a business", etc.;
- Confidence: A decimal between 0 and 1.0, representing your own judgment of the confidence level of this trait description; only list entries with a confidence of 0.5 or higher.

Additionally, when necessary, you will call relevant tools to obtain the information needed to better complete your responses. Currently available tools include: get current local time, user traits, and web search."""

[time_query_tool_description]
other = "Call this tool to get the current local date, time, and timezone information. Use this when the user asks about the current date, time, timezone, or other time-sensitive questions."

[web_search_tool_description]
other = "Call this tool to perform web searches when real-time information is needed (e.g., weather, news, stock prices, exchange rates, latest events, etc.). Generates a list of search keywords based on the user's input."

[web_search_param_description]
other = "Search query string. Use double quotes for exact phrases that must not be split, e.g., '\"Hello world\"'. For multiple concepts, combine with spaces. Example: 'C++ \"Hello world\" history'"

[tool_execution_failed]
other = "Tool execution failed: {{.Error}}"

[set_tool_argument_faild]
other = "Failed to set tool arguments: {{.Error}}"

[web_search_tool_searching]
other = "Searching"

[time_query_tool_pending]
other = "Let me check the current time..."

[server_error]
other = "Oops! Server error!\n{{.Error}}"

[assistant_broken_message]
other = "The AI response was forcibly interrupted. I will directly ignore the user's last question above."

[session_title_system_prompt]
other = "You are a title generation assistant. Below is a conversation where A represents the user (the questioner) and B represents the AI assistant (the responder). Based on the conversation content, generate a concise and accurate title. The title should be within 20 words. Output the title directly without any extra explanation."
