[description]
other = "从用户与AI的对话中，识别并提取与用户本人相关的稳定或临时特征。调用此工具以输出特征提取的结构化结果"

[param_category_id_desc]
other = "特征类别编号（0=其他,1=人口学特征,2=关联实体,3=成就与修为,4=兴趣爱好,5=能力技能,6=偏好/癖好,7=行为习惯,8=健康与疾病,9=近况和状态,10=人格/性格,11=价值观与信仰,12=关系人,13=人生事件,14=目标与计划）"

[param_category_name_desc]
other = "中文类别名（与category_id对应）：其他,人口学特征,关联实体,成就与修为,兴趣爱好,能力技能,偏好/癖好,行为习惯,健康与疾病,近况和状态,人格/性格,价值观与信仰,关系人,人生事件,目标与计划"

[param_feature_text_desc]
other = "简洁描述该特征的短句，尽量保留原意，可概括。注意：该值在 JSON 字符串中，如果内容包含双引号（\"），必须转义为 \\\"，以保证 JSON 语法正确。例如：'身高180cm', '喜欢好天气', '失眠严重'"

[param_keywords_desc]
other = "与该特征紧密相关的关键词列表。每个关键词包含 type（A-F）和 word（字符串）。type: A=时间, B=地点, C=人, D=事物, E=关系, F=行为。如果无法提取合理关键词可为空数组 []，但不能省略"

[param_keyword_type_desc]
other = "关键词类型：A=时间, B=地点, C=人, D=事物, E=关系, F=行为"

[param_keyword_word_desc]
other = "关键词文本，应尽量具体化、语义化，不必须直接出现在原文中"

[param_confidence_desc]
other = "置信度（1-10 整数）：值越大代表对该特征的确信程度越高。对于客观事实类特征（如人口学特征、关联实体）给予较高置信度（8-10）；对于主观推断类特征（如人格/性格、价值观与信仰）需谨慎评分（3-7）；仅凭单次调侃或情绪化表达提取的特征，置信度应较低（1-3）"

[param_half_life_desc]
other = "该特征的有效期/半衰期，取值为 short（短期，天~周）、medium（中期，月~年）、long（长期，年+）、permanent（永久，已完成的客观事件永不改变）。应根据特征的实际性质判断，而非机械映射 category_id"

[param_privacy_level_desc]
other = """隐私层级。分为三级：
  - private（0）：高度私密，如个人健康、情感经历、家庭矛盾等，仅限用户本人可见
  - protected（1）：一般敏感，如职业规划、兴趣爱好等，可在受控范围内分享
  - public（2）：公开信息，如公开作品、公开观点等，可被广泛传播
"""

[pending]
other = "正在提取用户特征..."
