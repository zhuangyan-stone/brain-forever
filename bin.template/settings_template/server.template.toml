# ============================================================
# BrainForever server 运行时配置模板
#
# 复制此文件到 bin/settings/server.toml 并按需修改配置项。
# 大部分配置项已有合理的默认值（定义在 cmd/server/main.go 中），
# 仅在此处列出需要显式关注的配置项。
#
# 敏感信息（数据库密码等）请使用环境变量传递，不要写入此文件！
# ============================================================

[server]
# 服务标识，用于日志
name = "brain-forever"
# 本地监听地址
addr = "[::]:8080"
# 以下超时配置单位为秒，0 表示不超时
read_timeout = 30
read_header_timeout = 10
# write_timeout 必须设为 0（不限时），因为 SSE 流式响应是长连接，
# LLM 流式输出可能持续数分钟（尤其是启用联网搜索 + 深度思考时）。
# 设为有限值会导致 SSE 写入超时，触发 i/o timeout 错误。
write_timeout = 0
idle_timeout = 60

[logger]
# 日志文件路径（留空则仅输出到 stdout）
file = "log/brain-forever.log"
# 日志级别：TRACE | DEBUG | INFO | WARN | ERROR | FATAL
level = "TRACE"

# ============================================================
# PostgreSQL 数据库配置
# 所有数据统一存储在 PostgreSQL 中（含 pgvector 扩展）。
# 请通过环境变量 PG_DSN 设置连接字符串，格式：
#   PG_DSN="postgres://user:password@127.0.0.1:5432/d2brain?sslmode=disable"
# 不要在此文件中写入密码！
# ============================================================
[database]
# PostgreSQL 数据源名称（必须设置，否则程序无法启动）
# 或通过环境变量 PG_DSN 指定（优先级高于此文件中的 dsn 值）
#
# 连接字符串格式（URL 格式）：
#   dsn = "postgres://user:password@127.0.0.1:5432/d2brain?sslmode=disable"
#
# 键值对格式（pgx 原生）：
#   dsn = "host=127.0.0.1 port=5432 user=devxxx password=xxx dbname=d2brain sslmode=disable"
#
dsn = ""

# ============================================================
# Redis 配置（可选）
# 启用后，登录状态将存储在 Redis 中，支持：
#   - 服务重启后保留登录态
#   - 多实例水平扩展
# 如果留空或 Redis 不可用，Session 管理降级为纯内存模式。
# ============================================================
[redis]
# Redis 服务器地址，如 "127.0.0.1:6379"
# 或通过环境变量 REDIS_ADDR 指定
addr = ""
# Redis 密码（如无认证则留空）
# 或通过环境变量 REDIS_PASSWORD 指定
password = ""

[captcha]
# 验证码图片索引文件所在的目录（必须以 / 结束）
# 目录中包含 index.dat 文件和对应的验证码图片
dir = "./frontend/static/img/captchas/"

[frontend]
# 前端静态文件目录
dir = "./frontend"
# 禁用浏览器缓存（开发环境设为 true）
cache_disable = false

# ============================================================
# 系统共享 API Key 池（可选）
#
# 配置全局共享的 API Key，供系统中所有用户使用（当用户未设置
# 自己的私有 Key 时使用）。支持为同一用途配置多个 Key 以实现
# 负载均衡（GetOne 随机选取一个）。
#
# 格式："用途@提供商" = ["key1", "key2", ...]
#   用途：llm | websearch | embedding
#   提供商：deepseek | ali | zhipu | bocha
#
# 默认提供商（用户未设置时使用）：
#   default_llm_provider       = "deepseek"
#   default_web_search_provider = "zhipu"
#   default_embedding_provider  = "zhipu"
#
# 示例：
#
#   [api-keys]
#   default_llm_provider        = "deepseek"
#   default_web_search_provider = "zhipu"
#   default_embedding_provider  = "zhipu"
#   "llm@deepseek" = ["sk-xxx1", "sk-xxx2"]
#   "websearch@zhipu" = ["key-111"]
#   "embedding@ali" = ["key-222"]
# ============================================================
[api-keys]
# 默认提供商（用户未显式设置 provider 时使用）
default_llm_provider        = "deepseek"
default_web_search_provider = "zhipu"
default_embedding_provider  = "zhipu"

# LLM 对话（DeepSeek）
"llm@deepseek" = []

# 联网搜索（智谱/博查）
"websearch@zhipu" = []
"websearch@bocha" = []

# 文本嵌入（阿里 DashScope/智谱）
"embedding@ali" = []
"embedding@zhipu" = []

# ============================================================
# 周期性 Session GC 任务（可选）
# 控制内存中 session 对象的自动清理，防止长时间运行后内存泄漏。
# 注册到 bktask 后台任务队列，与 trait-task、excerpt-task 共享调度。
# 如果未配置此节，使用 DefaultConfig() 中的内置默认值。
# ============================================================
[session-gc-task]
# 是否启用
enabled = true
# 匿名 session 无活动超过此时间（分钟）则从内存中清除
anonymous_ttl_minutes = 60
# 已登录 session 无活动超过此时间（分钟）则从内存中清除
logged_in_ttl_minutes = 1440
# GC 扫描间隔（分钟）
interval_minutes = 10

# ============================================================
# 后台慢任务队列（可选）
# 用于处理非实时、耗时较长的后台任务，如标签生成、特征提取等。
# 队列以固定间隔检查到期任务，并限制最大并发数以避免资源耗尽。
# 如果未配置此节，使用 DefaultConfig() 中的内置默认值。
# ============================================================
[bkgnd-task-queue]
# 是否启用后台任务队列
enabled = true
# 检查到期任务的时间间隔（秒）
check_interval_seconds = 30
# 最大并发执行的任务数
worker_count = 3
# 排队任务的最大数量
queue_size = 100

# ============================================================
# 周期性个人特征提取任务（可选）
# 用于定期扫描 chat_sessions 表中未提取或需要重新提取特征的对话，
# 自动调用 LLM 提取个人特征（作为前端主动提取的辅助手段）。
# 如果未配置此节，使用 DefaultConfig() 中的内置默认值。
# ============================================================
[trait-task]
# 是否启用
enabled = true
# 检查间隔（秒），默认 3600（1 小时）
interval_seconds = 3600
# 重新提取阈值（小时）：extracted_at 早于 update_at 减去此小时数则重新提取，默认 20
extract_delay_hours = 20
# 每轮最多处理多少个 chat，默认 50
batch_limit = 50
# 允许执行的时间窗口（半开区间 [start, stop)）。每个窗口为 ["HH:MM", "HH:MM"] 对。
# 空数组（默认）= 全天允许。支持跨午夜窗口，如 ["22:00", "06:00"]。
# 示例：
#   allowed_windows = [["02:00", "06:00"], ["22:00", "23:59"]]
allowed_windows = []

# trait 入库去重开关（可选）
# 启用后，新提取的 trait 会与同 chat 下已有 trait 做 embedding 相似度比对，
# 相似度超过 deduplicate_threshold 时视为重复，跳过入库。
# 默认 false（关闭去重）。
deduplicate_enabled = false

# embedding 相似度去重阈值（0.0-1.0），仅 deduplicate_enabled = true 时生效。
# 建议值：0.95。
deduplicate_threshold = 0.95

# ============================================================
# 周期性语录摘录任务（可选）
# 用于定期扫描所有对话，调用 LLM 从用户消息中摘录精彩片段
# （即"用户语录"），并存储到 excerpts 表。
# 如果未配置此节，使用 DefaultConfig() 中的内置默认值。
# ============================================================
[excerpt-task]
# 是否启用
enabled = true
# 检查间隔（秒），默认 86400（每天一次）
interval_seconds = 86400
# 重新提取阈值（小时）：processed_at 早于 update_at 减去此小时数则重新提取，默认 24
extract_delay_hours = 24
# 每轮最多处理多少个 chat，默认 100
batch_limit = 100
# 允许执行的时间窗口（半开区间 [start, stop)）。每个窗口为 ["HH:MM", "HH:MM"] 对。
# 空数组（默认）= 全天允许。支持跨午夜窗口，如 ["22:00", "06:00"]。
# 示例：
#   allowed_windows = [["02:00", "06:00"]]
allowed_windows = []
