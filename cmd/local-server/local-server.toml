# ============================================================
# BrainForever local-server 配置文件
# 优先级: --config CLI 参数 > CONFIG_PATH 环境变量 > 本文件
# ============================================================

[server]
addr = ":8080"

[logger]
file = "log/local-server.log"
level = "TRACE"

[data]
dir = "./data"
brain_db = "brain.db"
users_db = "users.db"
anonymous_db = "anonymous.db"

[frontend]
dir = "./frontend"
cache_disable = false
